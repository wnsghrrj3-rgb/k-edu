<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>서비스 이용약관 | K-edu 케이에듀</title>
<meta name="description" content="케이에듀(K-edu) 서비스 이용약관. 회원, 이용자가 서비스를 이용함에 있어 권리·의무·책임 사항을 규정합니다.">
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked@11.1.0/marked.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:#F5F7FA;min-height:100vh;color:#1A202C;display:flex;flex-direction:column}

/* TOP BAR */
.top-bar{background:#fff;border-bottom:1px solid #E2E8F0;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;gap:10px}
.top-bar a.home-link{display:flex;align-items:center;gap:8px;text-decoration:none;color:#1A202C}
.top-bar .home-logo{font-family:'Jua',sans-serif;font-size:22px;background:linear-gradient(135deg,#5B8EF8 0%,#FF85A1 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-1px}
.top-bar .home-sub{font-size:12px;color:#A0AEC0}
.top-actions{display:flex;gap:8px}
.btn-print{height:34px;padding:0 16px;background:#fff;color:#5B8EF8;border:1.5px solid #5B8EF8;border-radius:50px;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
.btn-print:hover{background:#EBF4FF}
.btn-back{height:34px;padding:0 16px;background:#5B8EF8;color:#fff;border:none;border-radius:50px;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:opacity .15s;text-decoration:none;display:inline-flex;align-items:center}
.btn-back:hover{opacity:.85}

/* HERO */
.hero{max-width:820px;margin:0 auto;padding:48px 28px 16px;width:100%;text-align:center}
.hero-eyebrow{font-family:'Jua',sans-serif;font-size:14px;color:#5B8EF8;letter-spacing:2px;margin-bottom:8px}
.hero-title{font-family:'Jua',sans-serif;font-size:36px;color:#1A202C;letter-spacing:-1px;margin-bottom:10px}
.hero-meta{font-size:13px;color:#718096}

/* CONTENT */
main{flex:1;max-width:820px;margin:0 auto;padding:28px 28px 64px;width:100%}
.policy-card{background:#fff;border-radius:18px;padding:48px 44px;box-shadow:0 2px 16px rgba(0,0,0,.06);line-height:1.85}

.policy-card h1{font-family:'Jua',sans-serif;font-size:30px;letter-spacing:-1px;color:#1A202C;margin:0 0 18px;border-bottom:2px solid #E2E8F0;padding-bottom:14px}
.policy-card h2{font-family:'Jua',sans-serif;font-size:21px;color:#2B6CB0;margin:32px 0 12px;letter-spacing:-.5px}
.policy-card h3{font-size:16px;font-weight:700;color:#1A202C;margin:22px 0 10px}
.policy-card p{margin:10px 0;color:#2D3748;font-size:15px}
.policy-card ul,.policy-card ol{margin:10px 0;padding-left:22px;color:#2D3748;font-size:15px}
.policy-card li{margin:6px 0}
.policy-card strong{color:#1A202C;font-weight:700}
.policy-card hr{border:none;border-top:1px solid #E2E8F0;margin:28px 0}
.policy-card a{color:#5B8EF8;text-decoration:underline}
.policy-card code{background:#F0F4F8;padding:2px 6px;border-radius:4px;font-size:.92em;color:#2B6CB0;font-family:'Menlo','Consolas',monospace}
.policy-card blockquote{border-left:4px solid #5B8EF8;background:#EBF4FF;padding:14px 18px;margin:14px 0;border-radius:0 10px 10px 0;color:#2B6CB0;font-size:14px}
.policy-card blockquote p{color:inherit;margin:4px 0}
.policy-card table{width:100%;border-collapse:collapse;margin:14px 0;font-size:14px;border:1px solid #E2E8F0;border-radius:10px;overflow:hidden}
.policy-card th{background:#F5F7FA;padding:10px 12px;text-align:left;font-weight:700;color:#1A202C;border-bottom:1px solid #E2E8F0;border-right:1px solid #E2E8F0}
.policy-card td{padding:10px 12px;color:#2D3748;border-bottom:1px solid #EDF2F7;border-right:1px solid #EDF2F7;vertical-align:top}
.policy-card th:last-child,.policy-card td:last-child{border-right:none}
.policy-card tr:last-child td{border-bottom:none}

/* LOADING / ERROR */
.loading{text-align:center;padding:60px 20px;color:#A0AEC0;font-size:14px}
.loading-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#5B8EF8;margin:0 3px;animation:bounce 1.4s infinite ease-in-out both}
.loading-dot:nth-child(1){animation-delay:-.32s}
.loading-dot:nth-child(2){animation-delay:-.16s}
@keyframes bounce{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
.error-box{background:#FFF5F5;border:1px solid #FED7D7;border-radius:10px;padding:18px;color:#C53030;font-size:14px;text-align:center}

/* FOOTER */
footer{text-align:center;padding:18px 24px;border-top:1px solid #E2E8F0;background:#fff}
.footer-text{font-size:12px;color:#A0AEC0;letter-spacing:.3px}
.footer-text strong{color:#718096;font-weight:500}
.footer-text a{color:#5B8EF8;text-decoration:none;margin-left:10px}
.footer-text a:hover{text-decoration:underline}

@media(max-width:600px){
  .top-bar{padding:0 16px}
  .top-bar .home-sub{display:none}
  .hero{padding:32px 18px 8px}
  .hero-title{font-size:26px}
  main{padding:18px 16px 48px}
  .policy-card{padding:28px 20px;border-radius:14px}
  .policy-card h1{font-size:22px}
  .policy-card h2{font-size:18px}
  .policy-card p,.policy-card li{font-size:14px}
  .policy-card table{font-size:13px}
  .policy-card th,.policy-card td{padding:8px 8px}
}

/* PRINT */
@media print{
  .top-bar,footer,.btn-print,.btn-back,.top-actions{display:none!important}
  body{background:#fff}
  .hero{padding:0 0 12px}
  main{padding:0;max-width:none}
  .policy-card{box-shadow:none;border-radius:0;padding:0}
  .policy-card a{color:#1A202C;text-decoration:none}
  .policy-card blockquote{background:#fff;border:1px solid #E2E8F0;color:#2D3748}
  @page{margin:18mm 14mm}
}
</style>
</head>
<body>

<div class="top-bar">
  <a href="/" class="home-link">
    <span class="home-logo">K-edu</span>
    <span class="home-sub">케이에듀</span>
  </a>
  <div class="top-actions">
    <button class="btn-print" onclick="window.print()">🖨️ 인쇄</button>
    <a class="btn-back" href="/">← 홈으로</a>
  </div>
</div>

<div class="hero">
  <div class="hero-eyebrow">TERMS OF SERVICE</div>
  <div class="hero-title">서비스 이용약관</div>
  <div class="hero-meta">버전 v1.0 · 회원·이용자의 권리·의무·책임 사항을 규정합니다</div>
</div>

<main>
  <article class="policy-card" id="policy-content">
    <div class="loading" id="loading">
      <span class="loading-dot"></span>
      <span class="loading-dot"></span>
      <span class="loading-dot"></span>
      <p style="margin-top:14px">이용약관을 불러오는 중...</p>
    </div>
  </article>
</main>

<footer>
  <p class="footer-text">
    Copyright © 2025 <strong>K-edu</strong> · Developed by Choe Jun-ho (Kumsung Elementary School) · All rights reserved.
    <a href="/privacy/">개인정보 처리방침</a>
    <a href="/terms/">서비스 이용약관</a>
  </p>
</footer>

<script>
(async function loadTerms(){
  const target = document.getElementById('policy-content');
  try {
    const res = await fetch('/terms/terms-of-service-v1.md', { cache: 'no-cache' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const md = await res.text();

    // marked 옵션 (안전한 HTML — 이용약관 .md는 신뢰할 수 있는 자체 문서)
    if (typeof marked !== 'undefined') {
      marked.setOptions({ gfm: true, breaks: false });
      target.innerHTML = marked.parse(md);
    } else {
      // marked CDN 차단 시 폴백: 원문 그대로 pre로 표시
      const pre = document.createElement('pre');
      pre.style.whiteSpace = 'pre-wrap';
      pre.style.fontFamily = "'Noto Sans KR',sans-serif";
      pre.style.fontSize = '14px';
      pre.style.lineHeight = '1.7';
      pre.textContent = md;
      target.innerHTML = '';
      target.appendChild(pre);
    }
  } catch (e) {
    target.innerHTML = '<div class="error-box">이용약관을 불러오지 못했습니다. 새로고침하거나 잠시 후 다시 시도해주세요.<br><small style="color:#A0AEC0;display:block;margin-top:8px">오류: ' + (e && e.message ? e.message : 'unknown') + '</small></div>';
  }
})();
</script>
</body>
</html>
