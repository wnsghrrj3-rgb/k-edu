<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-edu 교사 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../kedu_config.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#5B8EF8;--primary-light:#EBF4FF;--primary-dark:#3B6FD8;
  --pink:#FF85A1;--green:#38A169;--orange:#FFB347;--red:#E53E3E;
  --bg:#F5F7FA;--card:#fff;--text:#1A202C;--sub:#718096;--border:#E2E8F0;
  --radius:16px;--shadow:0 2px 16px rgba(0,0,0,.06);
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);min-height:100vh;color:var(--text)}

/* NAV */
.nav{background:var(--card);border-bottom:1px solid var(--border);padding:0 28px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.nav-logo{font-family:'Jua',sans-serif;font-size:22px;display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--text)}
.nav-logo span{background:linear-gradient(135deg,var(--primary),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nav-badge{font-size:11px;background:var(--primary-light);color:var(--primary);padding:3px 10px;border-radius:50px;font-weight:600}
.nav-right{display:flex;align-items:center;gap:12px}
.nav-name{font-size:13px;color:var(--sub);font-weight:500}
.nav-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:6px 14px;font-size:13px;color:var(--sub);cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .15s}
.nav-btn:hover{border-color:var(--primary);color:var(--primary)}

/* LOGIN */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 56px);padding:24px}
.login-card{background:var(--card);border-radius:24px;padding:48px 40px;width:100%;max-width:420px;box-shadow:0 8px 40px rgba(0,0,0,.08);text-align:center}
.login-logo{font-family:'Jua',sans-serif;font-size:42px;margin-bottom:4px}
.login-logo span{background:linear-gradient(135deg,var(--primary),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.login-sub{font-size:14px;color:var(--sub);margin-bottom:32px}
.login-tabs{display:flex;margin-bottom:24px;border-radius:10px;overflow:hidden;border:1px solid var(--border)}
.login-tab{flex:1;padding:10px;font-size:14px;font-weight:600;background:var(--bg);border:none;cursor:pointer;font-family:'Noto Sans KR',sans-serif;color:var(--sub);transition:all .15s}
.login-tab.active{background:var(--primary);color:#fff}
.form-group{margin-bottom:16px;text-align:left}
.form-label{font-size:13px;font-weight:600;color:var(--sub);margin-bottom:6px;display:block}
.form-input{width:100%;height:48px;border:2px solid var(--border);border-radius:12px;padding:0 16px;font-size:15px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .2s}
.form-input:focus{border-color:var(--primary)}
.form-btn{width:100%;height:50px;background:var(--primary);color:#fff;border:none;border-radius:12px;font-family:'Jua',sans-serif;font-size:18px;cursor:pointer;margin-top:8px;transition:opacity .15s}
.form-btn:hover{opacity:.9}
.form-btn:disabled{opacity:.5;cursor:not-allowed}
.form-err{font-size:13px;color:var(--red);margin-top:10px;min-height:20px}
.form-link{font-size:13px;color:var(--sub);margin-top:16px}
.form-link a{color:var(--primary);text-decoration:none;font-weight:600;cursor:pointer}

/* DASHBOARD */
.dash{display:none;max-width:960px;margin:0 auto;padding:32px 24px 64px}
.dash.active{display:block}
.welcome{font-family:'Jua',sans-serif;font-size:26px;margin-bottom:28px;display:flex;align-items:center;gap:10px}
.welcome .accent{color:var(--primary)}

/* STAT CARDS */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:32px}
.stat-card{background:var(--card);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--sc,var(--primary))}
.stat-icon{font-size:28px;margin-bottom:8px}
.stat-num{font-family:'Jua',sans-serif;font-size:36px;color:var(--text);line-height:1.1}
.stat-label{font-size:13px;color:var(--sub);margin-top:4px}

/* CLASS CODE BOX */
.section-title{font-family:'Jua',sans-serif;font-size:20px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.code-box{background:var(--card);border-radius:var(--radius);padding:32px;box-shadow:var(--shadow);text-align:center;margin-bottom:32px}
.code-display{font-family:'Jua',sans-serif;font-size:48px;letter-spacing:8px;color:var(--primary);margin:16px 0;user-select:all}
.code-hint{font-size:13px;color:var(--sub);margin-bottom:16px}
.code-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.code-btn{padding:10px 20px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:none;font-family:'Noto Sans KR',sans-serif;transition:all .15s}
.code-btn.primary{background:var(--primary);color:#fff}
.code-btn.primary:hover{opacity:.9}
.code-btn.outline{background:none;border:2px solid var(--border);color:var(--sub)}
.code-btn.outline:hover{border-color:var(--primary);color:var(--primary)}
.code-btn.danger{background:none;border:2px solid var(--red);color:var(--red)}
.code-btn.danger:hover{background:var(--red);color:#fff}
.no-code{padding:40px 20px}
.no-code p{font-size:15px;color:var(--sub);margin-bottom:20px}

/* STUDENT TABLE */
.table-wrap{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:32px}
.table-header{padding:20px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.table-header h3{font-family:'Jua',sans-serif;font-size:18px}
.table-count{font-size:13px;color:var(--sub);background:var(--bg);padding:4px 12px;border-radius:50px}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:12px 24px;font-size:12px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;background:var(--bg);border-bottom:1px solid var(--border)}
td{padding:14px 24px;font-size:14px;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:#FAFBFC}
.student-nick{font-weight:600;display:flex;align-items:center;gap:8px}
.student-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.student-dot.online{background:var(--green)}
.student-dot.offline{background:var(--border)}
.empty-state{text-align:center;padding:48px 20px;color:var(--sub)}
.empty-state .empty-icon{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:14px}

/* TOAST */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:12px 24px;border-radius:50px;font-size:14px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .4s ease both}
.fade-up:nth-child(2){animation-delay:.05s}
.fade-up:nth-child(3){animation-delay:.1s}

/* SESSION */
.form-check{display:flex;align-items:center;gap:8px;margin:12px 0 4px;justify-content:flex-start}
.form-check input[type=checkbox]{width:18px;height:18px;accent-color:var(--primary);cursor:pointer}
.form-check label{font-size:13px;color:var(--sub);cursor:pointer;user-select:none}
.session-bar{background:var(--primary-light);border-bottom:1px solid var(--border);padding:6px 28px;display:flex;align-items:center;justify-content:center;gap:8px;font-size:12px;color:var(--primary);font-weight:500;display:none}
.session-bar.active{display:flex}
.session-bar .timer{font-family:'Jua',sans-serif;font-size:13px}

@media(max-width:600px){
  .login-card{padding:36px 24px}
  .nav{padding:0 16px}
  .dash{padding:24px 16px 48px}
  .stats{grid-template-columns:1fr 1fr}
  .code-display{font-size:36px;letter-spacing:4px}
  td,th{padding:10px 14px;font-size:13px}
}
</style>
<script src="/kedu_ga.js"></script>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <a class="nav-logo" href="../index.html"><span>K-edu</span> <span class="nav-badge">교사</span></a>
  <div class="nav-right" id="nav-right" style="display:none">
    <span class="nav-name" id="nav-name"></span>
    <button class="nav-btn" onclick="doLogout()">로그아웃</button>
  </div>
</nav>

<!-- SESSION BAR -->
<div class="session-bar" id="session-bar">
  🔒 세션 유지 중 · 남은 시간: <span class="timer" id="session-countdown">30:00</span>
</div>

<!-- LOGIN SCREEN -->
<div class="login-wrap" id="login-screen">
  <div class="login-card">
    <div class="login-logo"><span>K-edu</span></div>
    <div class="login-sub">교사 대시보드에 오신 것을 환영합니다</div>

    <div class="login-tabs">
      <button class="login-tab active" onclick="switchTab('login')">로그인</button>
      <button class="login-tab" onclick="switchTab('signup')">회원가입</button>
    </div>

    <!-- 로그인 폼 -->
    <div id="form-login">
      <div class="form-group">
        <label class="form-label">이메일</label>
        <input class="form-input" type="email" id="login-email" placeholder="teacher@school.kr">
      </div>
      <div class="form-group">
        <label class="form-label">비밀번호</label>
        <input class="form-input" type="password" id="login-pw" placeholder="비밀번호 입력">
      </div>
      <button class="form-btn" id="login-btn" onclick="doLogin()">로그인</button>
      <div class="form-check">
        <input type="checkbox" id="remember-me">
        <label for="remember-me">로그인 유지</label>
      </div>
      <div class="form-err" id="login-err"></div>
    </div>

    <!-- 회원가입 폼 -->
    <div id="form-signup" style="display:none">
      <div class="form-group">
        <label class="form-label">이름 (선생님 성함)</label>
        <input class="form-input" type="text" id="signup-name" placeholder="홍길동">
      </div>
      <div class="form-group">
        <label class="form-label">이메일</label>
        <input class="form-input" type="email" id="signup-email" placeholder="teacher@school.kr">
      </div>
      <div class="form-group">
        <label class="form-label">비밀번호 (6자 이상)</label>
        <input class="form-input" type="password" id="signup-pw" placeholder="비밀번호 설정">
      </div>
      <button class="form-btn" id="signup-btn" onclick="doSignup()">회원가입</button>
      <div class="form-err" id="signup-err"></div>
    </div>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dash" id="dashboard">

  <div class="welcome fade-up">
    <span id="welcome-name">선생님</span>, 안녕하세요! 👋
  </div>

  <!-- STATS -->
  <div class="stats">
    <div class="stat-card fade-up" style="--sc:var(--primary)">
      <div class="stat-icon">👨‍🎓</div>
      <div class="stat-num" id="stat-students">0</div>
      <div class="stat-label">학급 학생 수</div>
    </div>
    <div class="stat-card fade-up" style="--sc:var(--green)">
      <div class="stat-icon">✅</div>
      <div class="stat-num" id="stat-active">0</div>
      <div class="stat-label">오늘 접속</div>
    </div>
    <div class="stat-card fade-up" style="--sc:var(--orange)">
      <div class="stat-icon">📅</div>
      <div class="stat-num" id="stat-created">-</div>
      <div class="stat-label">학급 생성일</div>
    </div>
  </div>

  <!-- CLASS CODE -->
  <div class="section-title">🔑 내 학급코드</div>
  <div class="code-box fade-up" id="code-box">
    <!-- 동적으로 채워짐 -->
  </div>

  <!-- STUDENT LIST -->
  <div class="table-wrap fade-up">
    <div class="table-header">
      <h3>🐾 학생 목록</h3>
      <span class="table-count" id="table-count">0명</span>
    </div>
    <div id="student-list">
      <div class="empty-state">
        <div class="empty-icon">📭</div>
        <p>아직 학생이 없어요.<br>학급코드를 학생들에게 공유해 보세요!</p>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// =============================================
// Supabase 초기화
// =============================================
const db = getKeduDb();

let currentTeacher = null;
let currentClassCode = null;

// =============================================
// 탭 전환
// =============================================
function switchTab(tab){
  document.querySelectorAll('.login-tab').forEach((el,i)=>{
    el.classList.toggle('active', (tab==='login' && i===0) || (tab==='signup' && i===1));
  });
  document.getElementById('form-login').style.display = tab==='login' ? 'block' : 'none';
  document.getElementById('form-signup').style.display = tab==='signup' ? 'block' : 'none';
  document.getElementById('login-err').textContent='';
  document.getElementById('signup-err').textContent='';
}

// =============================================
// 로그인
// =============================================
async function doLogin(){
  const email = document.getElementById('login-email').value.trim();
  const pw = document.getElementById('login-pw').value;
  if(!email || !pw){ setErr('login','이메일과 비밀번호를 입력해주세요.'); return; }

  const btn = document.getElementById('login-btn');
  btn.disabled=true; btn.textContent='로그인 중...';

  const { data, error } = await db.auth.signInWithPassword({ email, password: pw });

  if(error){
    setErr('login', error.message === 'Invalid login credentials'
      ? '이메일 또는 비밀번호가 올바르지 않습니다.'
      : error.message);
    btn.disabled=false; btn.textContent='로그인';
    return;
  }

  // remember-me 처리
  const remember = document.getElementById('remember-me').checked;
  if(remember){
    localStorage.setItem('kedu_remember', 'true');
  } else {
    localStorage.removeItem('kedu_remember');
    sessionStorage.setItem('kedu_session', 'true');
  }

  await loadDashboard(data.user);
  startSessionTimer();
}

// =============================================
// 회원가입
// =============================================
async function doSignup(){
  const name = document.getElementById('signup-name').value.trim();
  const email = document.getElementById('signup-email').value.trim();
  const pw = document.getElementById('signup-pw').value;

  if(!name){ setErr('signup','이름을 입력해주세요.'); return; }
  if(!email){ setErr('signup','이메일을 입력해주세요.'); return; }
  if(pw.length < 6){ setErr('signup','비밀번호는 6자 이상이어야 합니다.'); return; }

  const btn = document.getElementById('signup-btn');
  btn.disabled=true; btn.textContent='가입 중...';

  const { data, error } = await db.auth.signUp({ email, password: pw });

  if(error){
    setErr('signup', error.message);
    btn.disabled=false; btn.textContent='회원가입';
    return;
  }

  // teachers 테이블에 등록
  const { error: tErr } = await db.from('teachers').insert({
    user_id: data.user.id,
    name: name
  });

  if(tErr){
    setErr('signup', '교사 등록 중 오류: ' + tErr.message);
    btn.disabled=false; btn.textContent='회원가입';
    return;
  }

  showToast('🎉 회원가입 완료! 대시보드로 이동합니다.');
  await loadDashboard(data.user);
}

// =============================================
// 로그아웃
// =============================================
async function doLogout(){
  stopSessionTimer();
  await db.auth.signOut();
  currentTeacher = null;
  currentClassCode = null;
  localStorage.removeItem('kedu_remember');
  sessionStorage.removeItem('kedu_session');
  document.getElementById('dashboard').classList.remove('active');
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('nav-right').style.display = 'none';
  document.getElementById('session-bar').classList.remove('active');
}

// =============================================
// 대시보드 로드
// =============================================
async function loadDashboard(user){
  // 교사 정보 조회
  const { data: teacher } = await db.from('teachers')
    .select('*')
    .eq('user_id', user.id)
    .single();

  if(!teacher){
    setErr('login','교사 정보를 찾을 수 없습니다. 회원가입을 먼저 해주세요.');
    document.getElementById('login-btn').disabled=false;
    document.getElementById('login-btn').textContent='로그인';
    return;
  }

  currentTeacher = teacher;

  // UI 전환
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dashboard').classList.add('active');
  document.getElementById('nav-right').style.display = 'flex';
  document.getElementById('nav-name').textContent = teacher.name + ' 선생님';
  document.getElementById('welcome-name').innerHTML = `<span class="accent">${teacher.name}</span> 선생님`;

  // 학급코드 로드
  await loadClassCode();

  // 학생 목록 로드
  await loadStudents();
}

// =============================================
// 학급코드 관리
// =============================================
async function loadClassCode(){
  const { data: codes } = await db.from('class_codes')
    .select('*')
    .eq('teacher_id', currentTeacher.id)
    .eq('is_active', true)
    .order('created_at', { ascending: false })
    .limit(1);

  const box = document.getElementById('code-box');

  if(codes && codes.length > 0){
    currentClassCode = codes[0];
    const created = new Date(codes[0].created_at).toLocaleDateString('ko-KR');
    document.getElementById('stat-created').textContent = created;

    box.innerHTML = `
      <div style="font-size:14px;color:var(--sub);margin-bottom:4px">${codes[0].label || '내 학급'}</div>
      <div class="code-display">${codes[0].code}</div>
      <div class="code-hint">학생들에게 이 코드를 알려주세요. K-edu 메인에서 입력하면 입장할 수 있어요!</div>
      <div class="code-actions">
        <button class="code-btn primary" onclick="copyCode()">📋 코드 복사</button>
        <button class="code-btn outline" onclick="refreshCode()">🔄 코드 재발급</button>
        <button class="code-btn danger" onclick="deactivateCode()">비활성화</button>
      </div>
    `;
  } else {
    currentClassCode = null;
    document.getElementById('stat-created').textContent = '-';
    box.innerHTML = `
      <div class="no-code">
        <div style="font-size:48px;margin-bottom:12px">🔐</div>
        <p>아직 학급코드가 없어요.<br>생성 버튼을 눌러 학급을 만들어 보세요!</p>
        <div class="form-group" style="max-width:280px;margin:20px auto 0;text-align:left">
          <label class="form-label">학급 이름 (예: 1학년 2반)</label>
          <input class="form-input" type="text" id="new-class-label" placeholder="1학년 2반">
        </div>
        <button class="code-btn primary" style="margin-top:16px" onclick="createCode()">✨ 학급코드 생성</button>
      </div>
    `;
  }
}

function generateCode(){
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = '';
  for(let i=0;i<6;i++) code += chars[Math.floor(Math.random()*chars.length)];
  return code;
}

async function createCode(){
  const label = document.getElementById('new-class-label')?.value.trim() || '내 학급';
  const code = generateCode();

  const { error } = await db.from('class_codes').insert({
    code: code,
    label: label,
    grade: 1,
    semester: 1,
    is_active: true,
    teacher_id: currentTeacher.id
  });

  if(error){
    showToast('❌ 코드 생성 실패: ' + error.message);
    return;
  }

  showToast('🎉 학급코드가 생성되었습니다!');
  await loadClassCode();
}

async function refreshCode(){
  if(!currentClassCode) return;
  if(!confirm('기존 코드는 비활성화되고 새 코드가 발급됩니다. 계속할까요?')) return;

  // 기존 비활성화
  await db.from('class_codes').update({ is_active: false }).eq('id', currentClassCode.id);

  // 새 코드 생성
  const newCode = generateCode();
  const { error } = await db.from('class_codes').insert({
    code: newCode,
    label: currentClassCode.label,
    grade: currentClassCode.grade,
    semester: currentClassCode.semester,
    is_active: true,
    teacher_id: currentTeacher.id
  });

  if(error){
    showToast('❌ 재발급 실패');
    return;
  }

  showToast('🔄 새 학급코드가 발급되었습니다!');
  await loadClassCode();
  await loadStudents();
}

async function deactivateCode(){
  if(!currentClassCode) return;
  if(!confirm('학급코드를 비활성화하면 학생들이 더 이상 입장할 수 없습니다. 계속할까요?')) return;

  await db.from('class_codes').update({ is_active: false }).eq('id', currentClassCode.id);
  showToast('학급코드가 비활성화되었습니다.');
  await loadClassCode();
}

function copyCode(){
  if(!currentClassCode) return;
  navigator.clipboard.writeText(currentClassCode.code).then(()=>{
    showToast('📋 학급코드가 복사되었습니다!');
  });
}

// =============================================
// 학생 목록
// =============================================
async function loadStudents(){
  if(!currentClassCode){
    document.getElementById('stat-students').textContent = '0';
    document.getElementById('stat-active').textContent = '0';
    document.getElementById('table-count').textContent = '0명';
    return;
  }

  const { data: students } = await db.from('students')
    .select('*')
    .eq('class_code_id', currentClassCode.id)
    .order('last_seen_at', { ascending: false });

  const list = students || [];
  const now = new Date();
  const todayStr = now.toISOString().slice(0,10);

  const activeToday = list.filter(s => s.last_seen_at && s.last_seen_at.slice(0,10) === todayStr).length;

  document.getElementById('stat-students').textContent = list.length;
  document.getElementById('stat-active').textContent = activeToday;
  document.getElementById('table-count').textContent = list.length + '명';

  const wrap = document.getElementById('student-list');

  if(list.length === 0){
    wrap.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><p>아직 학생이 없어요.<br>학급코드를 학생들에게 공유해 보세요!</p></div>`;
    return;
  }

  let html = '<table><thead><tr><th>닉네임</th><th>마지막 접속</th><th>상태</th></tr></thead><tbody>';

  list.forEach(s => {
    const lastSeen = s.last_seen_at ? new Date(s.last_seen_at) : null;
    const isOnline = lastSeen && (now - lastSeen) < 10 * 60 * 1000; // 10분 이내
    const isToday = lastSeen && lastSeen.toISOString().slice(0,10) === todayStr;
    const timeStr = lastSeen
      ? (isToday ? lastSeen.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}) : lastSeen.toLocaleDateString('ko-KR'))
      : '-';
    const dotClass = isOnline ? 'online' : 'offline';
    const statusText = isOnline ? '접속 중' : (isToday ? '오늘 접속' : (lastSeen ? '오프라인' : '-'));

    html += `<tr>
      <td><div class="student-nick"><span class="student-dot ${dotClass}"></span>${s.nickname}</div></td>
      <td>${timeStr}</td>
      <td>${statusText}</td>
    </tr>`;
  });

  html += '</tbody></table>';
  wrap.innerHTML = html;
}

// =============================================
// 유틸
// =============================================
function setErr(form, msg){ document.getElementById(form+'-err').textContent = msg; }

let toastTimer;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2800);
}

// =============================================
// 세션 타이머 (30분 비활동 시 자동 로그아웃)
// =============================================
const SESSION_TIMEOUT = 30 * 60 * 1000; // 30분
let sessionTimerId = null;
let countdownId = null;
let sessionExpiry = 0;

function startSessionTimer(){
  const remember = localStorage.getItem('kedu_remember') === 'true';
  if(remember){
    document.getElementById('session-bar').classList.remove('active');
    return; // 로그인 유지 체크 시 타이머 없음
  }
  sessionExpiry = Date.now() + SESSION_TIMEOUT;
  document.getElementById('session-bar').classList.add('active');
  updateCountdown();
  countdownId = setInterval(updateCountdown, 1000);
  sessionTimerId = setTimeout(()=>{
    showToast('⏰ 30분 비활동으로 자동 로그아웃됩니다.');
    setTimeout(()=> doLogout(), 1500);
  }, SESSION_TIMEOUT);
}

function stopSessionTimer(){
  if(sessionTimerId){ clearTimeout(sessionTimerId); sessionTimerId = null; }
  if(countdownId){ clearInterval(countdownId); countdownId = null; }
}

function resetActivity(){
  if(!sessionTimerId) return; // 타이머 없으면 무시
  stopSessionTimer();
  startSessionTimer();
}

function updateCountdown(){
  const remaining = Math.max(0, sessionExpiry - Date.now());
  const min = Math.floor(remaining / 60000);
  const sec = Math.floor((remaining % 60000) / 1000);
  const el = document.getElementById('session-countdown');
  if(el) el.textContent = String(min).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
  if(remaining <= 0) stopSessionTimer();
}

function checkSession(){
  const remember = localStorage.getItem('kedu_remember') === 'true';
  if(remember) return true; // 로그인 유지 → 항상 유효
  const hasSession = sessionStorage.getItem('kedu_session') === 'true';
  return hasSession; // 브라우저 닫으면 sessionStorage 자동 삭제
}

// 사용자 활동 감지 → 타이머 리셋
['click','keydown','mousemove','scroll','touchstart'].forEach(evt => {
  document.addEventListener(evt, ()=> resetActivity(), { passive: true });
});

// =============================================
// 초기화: 기존 세션 확인
// =============================================
(async()=>{
  const { data: { session } } = await db.auth.getSession();
  if(session?.user){
    const remember = localStorage.getItem('kedu_remember') === 'true';
    if(remember || sessionStorage.getItem('kedu_session') === 'true'){
      await loadDashboard(session.user);
      startSessionTimer();
    } else {
      // 브라우저 재시작 + 로그인 유지 안 했으면 로그아웃
      await db.auth.signOut();
    }
  }

  // Enter 키 바인딩
  document.getElementById('login-pw').addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
  document.getElementById('signup-pw')?.addEventListener('keydown', e=>{ if(e.key==='Enter') doSignup(); });
})();
</script>
