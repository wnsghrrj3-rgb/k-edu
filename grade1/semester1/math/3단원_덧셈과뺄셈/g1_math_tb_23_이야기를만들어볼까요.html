<link href="https://fonts.googleapis.com/css2?family=Jua&family=Nunito:wght@800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F0FDFA;--card:#FFFFFF;--primary:#26A69A;--primary-light:#E0F2F1;
  --secondary:#4DB6AC;--green:#4CAF50;--green-light:#E8F5E9;
  --red:#F44336;--red-light:#FFEBEE;--yellow:#FFC107;--yellow-light:#FFF8E1;
  --text:#333;--subtext:#888;--border:#D0E8E4;--shadow:0 4px 16px rgba(0,0,0,0.08);--radius:20px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Jua',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh;width:100vw;user-select:none;-webkit-user-select:none;}
.logo{display:flex;align-items:center;gap:2px;position:fixed;top:12px;left:16px;z-index:999;}
.logo span:first-child{font-family:'Nunito',sans-serif;font-weight:800;font-size:20px;color:#1D4ED8;}
.logo span:nth-child(2){font-size:10px;color:#F59E0B;}
.logo span:last-child{font-family:'Nunito',sans-serif;font-weight:800;font-size:20px;color:#333;}
.sound-btn{position:fixed;top:12px;right:16px;z-index:999;background:var(--primary-light);border:none;border-radius:50%;width:40px;height:40px;font-size:20px;cursor:pointer;}
.slide{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px 80px;opacity:0;pointer-events:none;transition:opacity 0.4s,transform 0.4s;transform:translateX(60px);}
.slide.active{opacity:1;pointer-events:auto;transform:translateX(0);}
.slide.exit{opacity:0;transform:translateX(-60px);}
.slide-title{font-size:28px;color:var(--primary);margin-bottom:8px;text-align:center;}
.badge{display:inline-block;background:var(--yellow-light);color:#F57F17;padding:4px 14px;border-radius:20px;font-size:16px;margin-bottom:10px;}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;width:100%;max-width:580px;text-align:center;}
.char-row{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:12px;}
.char-img{width:56px;height:56px;border-radius:50%;}
.speech{background:var(--primary-light);border-radius:16px;padding:12px 18px;font-size:22px;max-width:380px;text-align:left;position:relative;}
.speech::before{content:'';position:absolute;left:-10px;top:18px;border:8px solid transparent;border-right-color:var(--primary-light);}
.btn-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:14px;}
.btn{padding:12px 24px;border-radius:16px;border:3px solid var(--border);background:var(--card);font-family:'Jua',sans-serif;font-size:28px;cursor:pointer;transition:all 0.2s;max-width:260px;text-align:center;line-height:1.3;}
.btn:hover{border-color:var(--primary);background:var(--primary-light);}
.btn.correct{background:var(--green-light)!important;border-color:var(--green)!important;animation:pop 0.3s;}
.btn.wrong{background:var(--red-light)!important;border-color:var(--red)!important;animation:shake 0.4s;}
.btn-num{padding:12px 28px;border-radius:16px;border:3px solid var(--border);background:var(--card);font-family:'Jua',sans-serif;font-size:48px;cursor:pointer;transition:all 0.2s;min-width:70px;}
.btn-num:hover{border-color:var(--primary);background:var(--primary-light);}
.btn-num.correct{background:var(--green-light)!important;border-color:var(--green)!important;animation:pop 0.3s;}
.btn-num.wrong{background:var(--red-light)!important;border-color:var(--red)!important;animation:shake 0.4s;}
.scene{background:linear-gradient(135deg,#E0F7FA,#FFF9C4);border-radius:20px;padding:20px;margin:10px 0;font-size:52px;display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;min-height:80px;}
.scene-text{font-size:22px;margin-top:8px;line-height:1.5;}
.blank-box{display:inline-flex;align-items:center;justify-content:center;width:72px;height:72px;border:4px dashed var(--primary);border-radius:16px;font-size:56px;color:var(--primary);background:var(--primary-light);margin:0 4px;transition:all 0.3s;}
.blank-box.filled{border-style:solid;background:var(--green-light);border-color:var(--green);color:var(--green);}
.blank-sm{width:52px;height:52px;font-size:36px;border-width:3px;border-radius:12px;}
.equation-row{display:flex;align-items:center;justify-content:center;gap:8px;margin:12px 0;font-size:44px;}
.feedback{margin-top:12px;font-size:22px;min-height:30px;text-align:center;}
.feedback .ok{color:var(--green);}
.feedback .no{color:var(--red);}
.story-card{background:linear-gradient(135deg,#E8F5E9,#FFF3E0);border-radius:20px;padding:16px;margin:10px 0;text-align:left;}
.story-emoji{font-size:48px;text-align:center;margin-bottom:8px;}
.story-text{font-size:22px;line-height:1.6;}
.ox-btn{width:80px;height:80px;border-radius:50%;font-size:40px;border:4px solid var(--border);background:var(--card);cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;}
.ox-btn.correct{border-color:var(--green);background:var(--green-light);}
.ox-btn.wrong{border-color:var(--red);background:var(--red-light);}
.type-tag{display:inline-block;padding:4px 12px;border-radius:12px;font-size:16px;margin-bottom:8px;}
.type-add{background:#E8F5E9;color:#2E7D32;}
.type-sub{background:#FFEBEE;color:#C62828;}
.nav{position:fixed;bottom:20px;left:0;right:0;display:flex;justify-content:center;gap:16px;z-index:100;}
.nav-btn{padding:10px 28px;border-radius:30px;border:none;font-family:'Jua',sans-serif;font-size:22px;cursor:pointer;transition:all 0.2s;}
.nav-prev{background:var(--card);color:var(--text);border:2px solid var(--border);}
.nav-next{background:var(--primary);color:#fff;}
.nav-btn:disabled{opacity:0.4;cursor:default;}
.page-info{position:fixed;bottom:6px;left:50%;transform:translateX(-50%);font-size:16px;color:var(--subtext);}
.combo-badge{display:inline-block;background:linear-gradient(135deg,#FF6B6B,#FFE66D);color:#fff;padding:6px 18px;border-radius:20px;font-size:20px;margin:6px 0;}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.12)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
</style>
</head>
<body>

let audioCtx,soundOn=true,current=0,score=0,combo=0,maxCombo=0;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
function playSound(t){
  if(!soundOn)return;initAudio();
  audioCtx.resume().then(()=>{
    const now=audioCtx.currentTime;
    if(t==='correct'){[523,659,784].forEach((f,i)=>{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0.15,now+i*0.12);g.gain.exponentialRampToValueAtTime(0.01,now+i*0.12+0.2);o.connect(g);g.connect(audioCtx.destination);o.start(now+i*0.12);o.stop(now+i*0.12+0.2);});}
    else if(t==='wrong'){[220,196].forEach((f,i)=>{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sawtooth';o.frequency.value=f;g.gain.setValueAtTime(0.1,now+i*0.15);g.gain.exponentialRampToValueAtTime(0.01,now+i*0.15+0.2);o.connect(g);g.connect(audioCtx.destination);o.start(now+i*0.15);o.stop(now+i*0.15+0.2);});}
    else{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sine';o.frequency.value=880;g.gain.setValueAtTime(0.08,now);g.gain.exponentialRampToValueAtTime(0.01,now+0.08);o.connect(g);g.connect(audioCtx.destination);o.start(now);o.stop(now+0.08);}
  });
}
function toggleSound(){soundOn=!soundOn;document.getElementById('soundBtn').textContent=soundOn?'🔊':'🔇';}

slides.push({type:'result'});

function renderSlides(){
  const c=document.getElementById('slideContainer');c.innerHTML='';
  slides.forEach((s,i)=>{
    const d=document.createElement('div');d.className='slide'+(i===0?' active':'');d.id='slide'+i;
    if(s.type==='concept')d.innerHTML=s.html;
    else if(s.type==='q'&&s.render)d.innerHTML=s.render(i);
    else if(s.type==='result')d.innerHTML='<div class="card" style="max-width:480px;"><div class="slide-title">🎉 학습 완료!</div></div>';
    c.appendChild(d);
  });
  updateNav();
}

function checkA(idx,el,val,correct){
  const s=slides[idx];if(s.answered)return;playSound('click');
  if(val===correct){
    s.answered=true;el.classList.add('correct');playSound('correct');combo++;if(combo>maxCombo)maxCombo=combo;score+=s.score;
    const msgs=['🎉 정답!','🎉 맞았어요!','🎉 대단해요!','🎉 훌륭해요!'];
    document.getElementById('fb'+idx).innerHTML=`<span class="ok">${msgs[Math.floor(Math.random()*msgs.length)]} +${s.score}점 ${combo>1?'🔥x'+combo:''}</span>`;
  }else{el.classList.add('wrong');playSound('wrong');combo=0;setTimeout(()=>el.classList.remove('wrong'),500);
    document.getElementById('fb'+idx).innerHTML=`<span class="no">다시 생각해 보세요! 🤔</span>`;}
}

function checkOX(idx,el,isX){
  const s=slides[idx];if(s.answered)return;playSound('click');
  // 3+4=7, not 8. So X is correct.
  if(isX){
    s.answered=true;el.classList.add('correct');playSound('correct');combo++;if(combo>maxCombo)maxCombo=combo;score+=s.score;
    document.getElementById('fb'+idx).innerHTML=`<span class="ok">🎉 3과 4를 모으면 7이에요! +${s.score}점</span>`;
  }else{el.classList.add('wrong');playSound('wrong');combo=0;setTimeout(()=>el.classList.remove('wrong'),500);
    document.getElementById('fb'+idx).innerHTML=`<span class="no">3과 4를 모으면 7이에요, 8이 아니에요!</span>`;}
}

// Q3: Multi-step 식 만들기
function initQ3(idx){
  const s=slides[idx];if(s.stepInit)return;s.stepInit=true;s.step=0;
  renderQ3Step(idx);
}
function renderQ3Step(idx){
  const s=slides[idx];
  const btns=document.getElementById('btns'+idx);
  if(s.step===0){
    btns.innerHTML=[2,3,4,5].map(n=>`<button class="btn-num" onclick="stepQ3(${idx},this,${n},3)">${n}</button>`).join('');
  }else if(s.step===1){
    btns.innerHTML=[3,4,5,6].map(n=>`<button class="btn-num" onclick="stepQ3(${idx},this,${n},4)">${n}</button>`).join('');
  }else if(s.step===2){
    btns.innerHTML=[6,7,8,5].map(n=>`<button class="btn-num" onclick="stepQ3(${idx},this,${n},7)">${n}</button>`).join('');
  }
}
function stepQ3(idx,el,val,correct){
  const s=slides[idx];if(s.answered)return;playSound('click');
  if(val===correct){
    el.classList.add('correct');
    if(s.step===0){document.getElementById('b1_'+idx).textContent='3';document.getElementById('b1_'+idx).classList.add('filled');}
    else if(s.step===1){document.getElementById('b2_'+idx).textContent='4';document.getElementById('b2_'+idx).classList.add('filled');}
    else{document.getElementById('b3_'+idx).textContent='7';document.getElementById('b3_'+idx).classList.add('filled');
      s.answered=true;playSound('correct');combo++;if(combo>maxCombo)maxCombo=combo;score+=s.score;
      document.getElementById('fb'+idx).innerHTML=`<span class="ok">🎉 3과 4를 모으면 7! +${s.score}점</span>`;return;}
    s.step++;setTimeout(()=>renderQ3Step(idx),400);
  }else{el.classList.add('wrong');playSound('wrong');combo=0;setTimeout(()=>el.classList.remove('wrong'),500);
    document.getElementById('fb'+idx).innerHTML=`<span class="no">그림을 다시 세어 보세요!</span>`;}
}

function initStoryBuild(idx){
  if(storyBuildData[idx])return;
  storyBuildData[idx]={step:0};

}
function renderStoryStep(idx){
  const sd=storyBuildData[idx];
  const area=document.getElementById('storyBuild'+idx);

  if(sd.step===0){

    area.innerHTML=`<div style="font-size:22px;margin-bottom:8px;">2단계: 무슨 일이 생겼나요?</div>
      <div class="story-card"><div class="story-text">과자 5개가 있어요...</div></div>`;
    btns.innerHTML=`<button class="btn" style="font-size:22px;" onclick="storyStep(${idx},0)">3개를 먹었어요 (가르기)</button>
      <button class="btn" style="font-size:22px;" onclick="storyStep(${idx},1)">4개를 더 받았어요 (모으기)</button>`;
  }else if(sd.step===2){
    area.innerHTML=`<div style="font-size:22px;margin-bottom:8px;">3단계: 결과는?</div>
      <div class="story-card"><div class="story-text">과자 5개가 있어요.<br>3개를 먹었어요.<br>남은 과자는?</div></div>`;

  }
}

function storyStep(idx,choice){
  const sd=storyBuildData[idx];playSound('click');
  if(sd.step===0&&choice===0){sd.step=1;renderStoryStep(idx);}
  else if(sd.step===0){playSound('wrong');document.getElementById('fb'+idx).innerHTML=`<span class="no">그림을 다시 세어 보세요!</span>`;}
  else if(sd.step===1&&choice===0){sd.step=2;renderStoryStep(idx);}
  else if(sd.step===1){sd.step=2;
    const area=document.getElementById('storyBuild'+idx);
    area.innerHTML=`<div style="font-size:22px;margin-bottom:8px;">3단계: 결과는?</div>
      <div class="story-card"><div class="story-text">과자 5개가 있어요.<br>4개를 더 받았어요.<br>모두 몇 개?</div></div>`;
    document.getElementById('btns'+idx).innerHTML=[7,8,9,10].map(n=>`<button class="btn-num" onclick="storyFinal(${idx},this,${n},9)">${n}</button>`).join('');
  }
}

}

// Q10: Matching quiz
let matchData={};
function initMatch(idx){
  if(matchData[idx])return;
  const items=[
    {q:'🐤🐤 + 🐤🐤🐤',answer:'2와 3을 모으면 5',choices:['2와 3을 모으면 5','5를 가르면 2와 3','3과 4를 모으면 7']},
    {q:'🍇🍇🍇🍇 → 🍇 + 🍇🍇🍇',answer:'4를 가르면 1과 3',choices:['4와 1을 모으면 5','4를 가르면 1과 3','3과 1을 모으면 4']},
    {q:'🌟🌟🌟 + 🌟🌟🌟🌟🌟',answer:'3과 5를 모으면 8',choices:['3과 5를 모으면 8','8을 가르면 3과 5','5와 4를 모으면 9']}
  ];
  matchData[idx]={items,cur:0};
  renderMatchQ(idx);
}

function renderMatchQ(idx){
  const md=matchData[idx];
  if(md.cur>=md.items.length){
    slides[idx].answered=true;playSound('correct');combo++;if(combo>maxCombo)maxCombo=combo;score+=slides[idx].score;
    document.getElementById('fb'+idx).innerHTML=`<span class="ok">🎉 모두 연결했어요! +${slides[idx].score}점</span>`;return;
  }
  const item=md.items[md.cur];
  document.getElementById('matchArea'+idx).innerHTML=`
    <div style="font-size:22px;margin:8px 0;">(${md.cur+1}/${md.items.length})</div>
    <div class="scene" style="font-size:36px;">${item.q}</div>
    <div class="btn-row">${item.choices.map((c,i)=>`<button class="btn" style="font-size:20px;" onclick="answerMatch(${idx},this,'${c}','${item.answer}')">${c}</button>`).join('')}</div>`;
}

function answerMatch(idx,el,val,correct){
  playSound('click');
  if(val===correct){el.classList.add('correct');matchData[idx].cur++;setTimeout(()=>renderMatchQ(idx),500);}
  else{el.classList.add('wrong');playSound('wrong');combo=0;setTimeout(()=>el.classList.remove('wrong'),500);
    document.getElementById('fb'+idx).innerHTML=`<span class="no">그림을 잘 보고 다시 골라 보세요!</span>`;}
}

function checkOXg2(idx,el,picked,correct,okMsg,noMsg){
  const s=slides[idx];if(s.answered)return;playSound('click');
  if(picked===correct){
    s.answered=true;el.classList.add('correct');playSound('correct');combo++;if(combo>maxCombo)maxCombo=combo;score+=s.score;
    document.getElementById('fb'+idx).innerHTML=`<span class="ok">🎉 ${noMsg} +${s.score}점</span>`;
  }else{el.classList.add('wrong');playSound('wrong');combo=0;setTimeout(()=>el.classList.remove('wrong'),500);
    document.getElementById('fb'+idx).innerHTML=`<span class="no">${noMsg}</span>`;}
}

// Q17: Multi-step 가르기 식 만들기 2
function initQ3b(idx){
  const s=slides[idx];if(s.stepInit)return;s.stepInit=true;s.step=0;
  renderQ3bStep(idx);
}
function renderQ3bStep(idx){
  const s=slides[idx];
  const btns=document.getElementById('btns'+idx);
  if(s.step===0){
    btns.innerHTML=[6,7,8,9].map(n=>`<button class="btn-num" onclick="stepQ3b(${idx},this,${n},8)">${n}</button>`).join('');
  }else if(s.step===1){
    btns.innerHTML=[2,3,4,5].map(n=>`<button class="btn-num" onclick="stepQ3b(${idx},this,${n},3)">${n}</button>`).join('');
  }else if(s.step===2){
    btns.innerHTML=[4,5,6,3].map(n=>`<button class="btn-num" onclick="stepQ3b(${idx},this,${n},5)">${n}</button>`).join('');
  }
}
function stepQ3b(idx,el,val,correct){
  const s=slides[idx];if(s.answered)return;playSound('click');
  if(val===correct){
    el.classList.add('correct');
    if(s.step===0){document.getElementById('bA_'+idx).textContent='8';document.getElementById('bA_'+idx).classList.add('filled');}
    else if(s.step===1){document.getElementById('bB_'+idx).textContent='3';document.getElementById('bB_'+idx).classList.add('filled');}
    else{document.getElementById('bC_'+idx).textContent='5';document.getElementById('bC_'+idx).classList.add('filled');
      s.answered=true;playSound('correct');combo++;if(combo>maxCombo)maxCombo=combo;score+=s.score;
      document.getElementById('fb'+idx).innerHTML=`<span class="ok">🎉 8을 가르면 3과 5! +${s.score}점</span>`;return;}
    s.step++;setTimeout(()=>renderQ3bStep(idx),400);
  }else{el.classList.add('wrong');playSound('wrong');combo=0;setTimeout(()=>el.classList.remove('wrong'),500);
    document.getElementById('fb'+idx).innerHTML=`<span class="no">그림을 다시 세어 보세요!</span>`;}
}

// Q18: Speed challenge 2
let speedData2={};
function initSpeed2(idx){
  if(speedData2[idx])return;
  speedData2[idx]={qs:[
    {q:'🐝🐝 + 🐝🐝🐝 → 모두 몇 마리?',ans:5,opts:[4,5,6,7]},
    {q:'🍓🍓🍓🍓🍓🍓🍓 → 🍓🍓🍓 + 🍓? → 나머지는?',ans:4,opts:[3,4,5,2]},
    {q:'🎵🎵🎵🎵 + 🎵🎵 → 모두 몇 개?',ans:6,opts:[5,6,7,8]},
    {q:'🌻🌻🌻🌻🌻🌻🌻🌻🌻 → 🌻🌻🌻🌻 + 🌻? → 나머지는?',ans:5,opts:[4,5,6,3]}
  ],cur:0,ok:0,startTime:Date.now()};
  renderSpeed2Q(idx);
}
function renderSpeed2Q(idx){
  const sd=speedData2[idx];
  if(sd.cur>=sd.qs.length){finishSpeed2(idx);return;}
  const q=sd.qs[sd.cur];
  document.getElementById('speedArea2'+idx).innerHTML=`
    <div style="font-size:18px;color:var(--subtext);">(${sd.cur+1}/${sd.qs.length})</div>
    <div style="font-size:22px;margin:8px 0;line-height:1.4;">${q.q}</div>`;
  document.getElementById('btns'+idx).innerHTML=q.opts.map(n=>`<button class="btn-num" onclick="ansSpeed2(${idx},this,${n})">${n}</button>`).join('');
}
function ansSpeed2(idx,el,val){
  const sd=speedData2[idx];playSound('click');
  if(val===sd.qs[sd.cur].ans){sd.ok++;el.classList.add('correct');sd.cur++;setTimeout(()=>renderSpeed2Q(idx),400);}
  else{el.classList.add('wrong');playSound('wrong');combo=0;setTimeout(()=>el.classList.remove('wrong'),500);
    document.getElementById('fb'+idx).innerHTML=`<span class="no">다시 세어 보세요!</span>`;}
}
function finishSpeed2(idx){
  const sd=speedData2[idx];const s=slides[idx];if(s.answered)return;
  s.answered=true;playSound('correct');combo++;if(combo>maxCombo)maxCombo=combo;
  const elapsed=((Date.now()-sd.startTime)/1000).toFixed(1);
  score+=s.score;
  document.getElementById('speedArea2'+idx).innerHTML='';
  document.getElementById('btns'+idx).innerHTML='';
  document.getElementById('fb'+idx).innerHTML=`<span class="ok">🎉 ${sd.ok}/${sd.qs.length} 정답! ${elapsed}초! +${s.score}점</span>`;
}

// Q19: Story builder 2 (가르기)
let storyBuildData2={};
function initStoryBuild2(idx){
  if(storyBuildData2[idx])return;
  storyBuildData2[idx]={step:0};
  renderStoryStep2(idx);
}
function renderStoryStep2(idx){
  const sd=storyBuildData2[idx];
  const area=document.getElementById('storyBuild2'+idx);
  const btns=document.getElementById('btns'+idx);
  if(sd.step===0){
    area.innerHTML=`<div style="font-size:22px;margin-bottom:8px;">1단계: 어떤 물건이 있나요?</div>
      <div class="scene" style="font-size:48px;">🎈🎈🎈🎈🎈🎈🎈</div>`;
    btns.innerHTML=`<button class="btn" style="font-size:22px;" onclick="storyStep2(${idx},0)">풍선 7개가 있어요</button>
      <button class="btn" style="font-size:22px;" onclick="storyStep2(${idx},1)">풍선 6개가 있어요</button>`;
  }else if(sd.step===1){
    area.innerHTML=`<div style="font-size:22px;margin-bottom:8px;">2단계: 무슨 일이 생겼나요?</div>
      <div class="story-card"><div class="story-text">풍선 7개가 있어요...</div></div>`;
    btns.innerHTML=`<button class="btn" style="font-size:22px;" onclick="storyStep2(${idx},0)">4개가 터졌어요 (가르기)</button>
      <button class="btn" style="font-size:22px;" onclick="storyStep2(${idx},1)">2개를 더 받았어요 (모으기)</button>`;
  }else if(sd.step===2){
    area.innerHTML=`<div style="font-size:22px;margin-bottom:8px;">3단계: 결과는?</div>
      <div class="story-card"><div class="story-text">풍선 7개가 있어요.<br>4개가 터졌어요.<br>남은 풍선은?</div></div>`;
    btns.innerHTML=[2,3,4,1].map(n=>`<button class="btn-num" onclick="storyFinal2(${idx},this,${n},3)">${n}</button>`).join('');
  }
}
function storyStep2(idx,choice){
  const sd=storyBuildData2[idx];playSound('click');
  if(sd.step===0&&choice===0){sd.step=1;renderStoryStep2(idx);}
  else if(sd.step===0){playSound('wrong');document.getElementById('fb'+idx).innerHTML=`<span class="no">그림을 다시 세어 보세요!</span>`;}
  else if(sd.step===1&&choice===0){sd.step=2;renderStoryStep2(idx);}
  else if(sd.step===1){sd.step=2;
    const area=document.getElementById('storyBuild2'+idx);
    area.innerHTML=`<div style="font-size:22px;margin-bottom:8px;">3단계: 결과는?</div>
      <div class="story-card"><div class="story-text">풍선 7개가 있어요.<br>2개를 더 받았어요.<br>모두 몇 개?</div></div>`;
    document.getElementById('btns'+idx).innerHTML=[7,8,9,10].map(n=>`<button class="btn-num" onclick="storyFinal2(${idx},this,${n},9)">${n}</button>`).join('');
  }
}
function storyFinal2(idx,el,val,correct){
  const s=slides[idx];if(s.answered)return;playSound('click');
  if(val===correct){
    s.answered=true;el.classList.add('correct');playSound('correct');combo++;if(combo>maxCombo)maxCombo=combo;score+=s.score;
    document.getElementById('fb'+idx).innerHTML=`<span class="ok">🎉 이야기를 잘 완성했어요! +${s.score}점</span>`;
  }else{el.classList.add('wrong');playSound('wrong');combo=0;setTimeout(()=>el.classList.remove('wrong'),500);
    document.getElementById('fb'+idx).innerHTML=`<span class="no">다시 계산해 보세요!</span>`;}
}

// Q20: Matching quiz 2
let matchData2={};
function initMatch2(idx){
  if(matchData2[idx])return;
  const items=[
    {q:'🐶🐶🐶🐶🐶 → 🐶🐶 + 🐶🐶🐶',answer:'5를 가르면 2와 3',choices:['5를 가르면 2와 3','2와 3을 모으면 5','5와 3을 모으면 8']},
    {q:'🌈🌈🌈 + 🌈🌈🌈🌈🌈🌈',answer:'3과 6을 모으면 9',choices:['9를 가르면 3과 6','3과 6을 모으면 9','6에서 3을 가르면 3']},
    {q:'🎁🎁🎁🎁🎁🎁🎁 → 🎁🎁🎁🎁🎁 + 🎁🎁',answer:'7을 가르면 5와 2',choices:['7을 가르면 5와 2','5와 2를 모으면 7','7과 5를 모으면 12']}
  ];
  matchData2[idx]={items,cur:0};
  renderMatchQ2(idx);
}
function renderMatchQ2(idx){
  const md=matchData2[idx];
  if(md.cur>=md.items.length){
    slides[idx].answered=true;playSound('correct');combo++;if(combo>maxCombo)maxCombo=combo;score+=slides[idx].score;
    document.getElementById('fb'+idx).innerHTML=`<span class="ok">🎉 모두 연결했어요! +${slides[idx].score}점</span>`;return;
  }
  const item=md.items[md.cur];
  document.getElementById('matchArea2'+idx).innerHTML=`
    <div style="font-size:22px;margin:8px 0;">(${md.cur+1}/${md.items.length})</div>
    <div class="scene" style="font-size:36px;">${item.q}</div>
    <div class="btn-row">${item.choices.map((c,i)=>`<button class="btn" style="font-size:20px;" onclick="answerMatch2(${idx},this,'${c}','${item.answer}')">${c}</button>`).join('')}</div>`;
}
function answerMatch2(idx,el,val,correct){
  playSound('click');
  if(val===correct){el.classList.add('correct');matchData2[idx].cur++;setTimeout(()=>renderMatchQ2(idx),500);}
  else{el.classList.add('wrong');playSound('wrong');combo=0;setTimeout(()=>el.classList.remove('wrong'),500);
    document.getElementById('fb'+idx).innerHTML=`<span class="no">그림을 잘 보고 다시 골라 보세요!</span>`;}
}

// --- END ADDED_BY_SCRIPT: Functions ---

// Result
function showResult(){
  const d=document.getElementById('slide'+(slides.length-1));
  const total=slides.filter(s=>s.type==='q').reduce((a,s)=>a+s.score,0);
  const pct=Math.round(score/total*100);
  let msg=pct>=90?'🏆 이야기 박사!':pct>=70?'👏 잘했어요!':pct>=50?'💪 좋은 시작!':'🌱 다시 도전!';
  d.innerHTML=`<div class="card" style="max-width:480px;">
    <div style="font-size:32px;color:var(--primary);margin-bottom:8px;">🎉 학습 완료!</div>
    <div style="font-size:64px;color:var(--primary);">${score}<span style="font-size:28px;color:var(--subtext);">/${total}</span></div>
    <div style="font-size:28px;margin:8px 0;">${msg}</div>
    ${maxCombo>1?`<div class="combo-badge">🔥 최대 콤보 x${maxCombo}</div>`:''}
    <div style="font-size:20px;color:var(--subtext);margin-top:12px;">그림을 보고 수학 이야기를 만드는 법을 배웠어요!<br>이제 덧셈과 뺄셈을 배울 준비 완료!</div>
    <button class="btn-num" style="font-size:24px;margin-top:16px;padding:10px 28px;background:var(--primary);color:#fff;border-color:var(--primary);" onclick="location.reload()">다시 하기 🔄</button>
  </div>`;
}

// Nav
function updateNav(){
  document.getElementById('prevBtn').disabled=(current===0);
  document.getElementById('nextBtn').textContent=current===slides.length-2?'결과 보기 🏆':'다음 ▶';
  document.getElementById('pageInfo').textContent=`${current+1} / ${slides.length}`;
}

function goSlide(n){
  if(n<0||n>=slides.length)return;
  document.getElementById('slide'+current).classList.remove('active');
  document.getElementById('slide'+current).classList.add('exit');
  current=n;
  setTimeout(()=>{
    document.querySelectorAll('.slide').forEach(s=>s.classList.remove('exit'));
    document.getElementById('slide'+current).classList.add('active');
    updateNav();
    // Init interactive elements
    if(current===5)initQ3(current);
    if(current===11)initStoryBuild(current);
    if(current===12)initMatch(current);
    if(current===19)initQ3b(current);
    if(current===20)initSpeed2(current);
    if(current===21)initStoryBuild2(current);
    if(current===22)initMatch2(current);
    if(slides[current].type==='result')showResult();
  },200);
}
function prevSlide(){goSlide(current-1);}
function nextSlide(){goSlide(current+1);}

let touchX=0;
document.addEventListener('touchstart',e=>{touchX=e.changedTouches[0].screenX;},{passive:true});
document.addEventListener('touchend',e=>{const d=e.changedTouches[0].screenX-touchX;if(Math.abs(d)>50){d>0?prevSlide():nextSlide();}},{passive:true});

renderSlides();
</script>
