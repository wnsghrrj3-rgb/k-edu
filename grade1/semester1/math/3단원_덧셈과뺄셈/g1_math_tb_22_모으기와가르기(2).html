<style>
:root{
  --bg:#F0FDFA;--card:#FFFFFF;--primary:#26A69A;--primary-light:#E0F2F1;
  --secondary:#4DB6AC;--green:#4CAF50;--green-light:#E8F5E9;
  --red:#F44336;--red-light:#FFEBEE;--yellow:#FFC107;--yellow-light:#FFF8E1;
  --text:#333;--subtext:#888;--border:#D0E8E4;--shadow:0 4px 16px rgba(0,0,0,0.08);--radius:20px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Jua',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh;width:100vw;user-select:none;-webkit-user-select:none;}
.logo{display:flex;align-items:center;gap:2px;position:fixed;top:12px;left:16px;z-index:999;}
.logo span:first-child{font-family:'Nunito',sans-serif;font-weight:800;font-size:20px;color:#1D4ED8;}
.logo span:nth-child(2){font-size:10px;color:#F59E0B;}
.logo span:last-child{font-family:'Nunito',sans-serif;font-weight:800;font-size:20px;color:#333;}
.sound-btn{position:fixed;top:12px;right:16px;z-index:999;background:var(--primary-light);border:none;border-radius:50%;width:40px;height:40px;font-size:20px;cursor:pointer;}
.slide{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px 80px;opacity:0;pointer-events:none;transition:opacity 0.4s,transform 0.4s;transform:translateX(60px);}
.slide.active{opacity:1;pointer-events:auto;transform:translateX(0);}
.slide.exit{opacity:0;transform:translateX(-60px);}
.slide-title{font-size:28px;color:var(--primary);margin-bottom:8px;text-align:center;}
.badge{display:inline-block;background:var(--yellow-light);color:#F57F17;padding:4px 14px;border-radius:20px;font-size:16px;margin-bottom:10px;}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;width:100%;max-width:560px;text-align:center;}
.char-row{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:12px;}
.char-img{width:56px;height:56px;border-radius:50%;}
.speech{background:var(--primary-light);border-radius:16px;padding:12px 18px;font-size:22px;max-width:380px;text-align:left;position:relative;}
.speech::before{content:'';position:absolute;left:-10px;top:18px;border:8px solid transparent;border-right-color:var(--primary-light);}
.btn-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:14px;}
.btn{padding:12px 28px;border-radius:16px;border:3px solid var(--border);background:var(--card);font-family:'Jua',sans-serif;font-size:48px;cursor:pointer;transition:all 0.2s;min-width:70px;}
.btn:hover{border-color:var(--primary);background:var(--primary-light);}
.btn.correct{background:var(--green-light)!important;border-color:var(--green)!important;animation:pop 0.3s;}
.btn.wrong{background:var(--red-light)!important;border-color:var(--red)!important;animation:shake 0.4s;}
.blank-box{display:inline-flex;align-items:center;justify-content:center;width:76px;height:76px;border:4px dashed var(--primary);border-radius:16px;font-size:64px;color:var(--primary);background:var(--primary-light);margin:0 4px;transition:all 0.3s;}
.blank-box.filled{border-style:solid;background:var(--green-light);border-color:var(--green);color:var(--green);}
.equation-row{display:flex;align-items:center;justify-content:center;gap:8px;margin:14px 0;font-size:48px;}
.feedback{margin-top:12px;font-size:22px;min-height:30px;text-align:center;}
.feedback.ok{color:var(--green);}
.feedback.no{color:var(--red);}
.ten-frame{display:grid;grid-template-columns:repeat(5,46px);grid-template-rows:repeat(2,46px);gap:4px;justify-content:center;margin:10px 0;}
.ten-cell{width:46px;height:46px;border:3px solid var(--border);border-radius:10px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:26px;transition:all 0.2s;}
.ten-cell.f1{background:#FFCDD2;border-color:#EF9A9A;}
.ten-cell.f2{background:#C8E6C9;border-color:#A5D6A7;}
.num-card{display:inline-flex;align-items:center;justify-content:center;width:64px;height:80px;border:3px solid var(--border);border-radius:14px;font-size:48px;background:var(--card);cursor:pointer;transition:all 0.2s;box-shadow:0 2px 8px rgba(0,0,0,0.06);}
.num-card:hover{border-color:var(--primary);transform:translateY(-3px);}
.num-card.selected{border-color:var(--primary);background:var(--primary-light);transform:translateY(-3px);}
.num-card.correct{border-color:var(--green);background:var(--green-light);}
.num-card.wrong{border-color:var(--red);background:var(--red-light);animation:shake 0.4s;}
.tree-node{display:inline-flex;align-items:center;justify-content:center;width:60px;height:60px;border-radius:50%;font-size:40px;background:var(--primary-light);color:var(--primary);border:3px solid var(--primary);}
.tree-line{width:2px;height:24px;background:var(--primary);margin:0 auto;}
.ox-btn{width:80px;height:80px;border-radius:50%;font-size:40px;border:4px solid var(--border);background:var(--card);cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;}
.ox-btn.correct{border-color:var(--green);background:var(--green-light);}
.ox-btn.wrong{border-color:var(--red);background:var(--red-light);}
.speed-bar{width:100%;height:12px;background:var(--border);border-radius:6px;overflow:hidden;margin:8px 0;}
.speed-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--yellow));border-radius:6px;transition:width 0.3s;}
.nav{position:fixed;bottom:20px;left:0;right:0;display:flex;justify-content:center;gap:16px;z-index:100;}
.nav-btn{padding:10px 28px;border-radius:30px;border:none;font-family:'Jua',sans-serif;font-size:22px;cursor:pointer;transition:all 0.2s;}
.nav-prev{background:var(--card);color:var(--text);border:2px solid var(--border);}
.nav-next{background:var(--primary);color:#fff;}
.nav-btn:disabled{opacity:0.4;cursor:default;}
.page-info{position:fixed;bottom:6px;left:50%;transform:translateX(-50%);font-size:16px;color:var(--subtext);}
.combo-badge{display:inline-block;background:linear-gradient(135deg,#FF6B6B,#FFE66D);color:#fff;padding:6px 18px;border-radius:20px;font-size:20px;margin:6px 0;}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.12)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

let audioCtx,soundOn=true,current=0,score=0,combo=0,maxCombo=0;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
function playSound(t){
  if(!soundOn)return;initAudio();
  audioCtx.resume().then(()=>{
    const now=audioCtx.currentTime;
    if(t==='correct'){[523,659,784].forEach((f,i)=>{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0.15,now+i*0.12);g.gain.exponentialRampToValueAtTime(0.01,now+i*0.12+0.2);o.connect(g);g.connect(audioCtx.destination);o.start(now+i*0.12);o.stop(now+i*0.12+0.2);});}
    else if(t==='wrong'){[220,196].forEach((f,i)=>{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sawtooth';o.frequency.value=f;g.gain.setValueAtTime(0.1,now+i*0.15);g.gain.exponentialRampToValueAtTime(0.01,now+i*0.15+0.2);o.connect(g);g.connect(audioCtx.destination);o.start(now+i*0.15);o.stop(now+i*0.15+0.2);});}
    else{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sine';o.frequency.value=880;g.gain.setValueAtTime(0.08,now);g.gain.exponentialRampToValueAtTime(0.01,now+0.08);o.connect(g);g.connect(audioCtx.destination);o.start(now);o.stop(now+0.08);}
  });
}
function toggleSound(){soundOn=!soundOn;document.getElementById('soundBtn').textContent=soundOn?'🔊':'🔇';}
function getStars(s){if(s<=10)return'⭐ 기본';if(s<=25)return'⭐⭐ 발전';if(s<=50)return'⭐⭐⭐ 심화';return'⭐⭐⭐⭐ 최심화';}

function makeTenFrame(a,b){
  let h='<div class="ten-frame">';
  for(let i=0;i<10;i++){
    let cls='ten-cell';
    if(i<a)cls+=' f1';else if(i<a+b)cls+=' f2';
    h+=`<div class="${cls}">${i<a?'●':i<a+b?'●':''}</div>`;
  }
  return h+'</div>';
}

// Q7: Speed challenge
let speedData={};
function initSpeed(idx){
  if(speedData[idx])return;
  const qs=[];
  const pairs=[[1,4],[2,6],[3,3],[5,4],[2,7]];
  pairs.forEach(([a,b])=>{
    const choices=[a+b-1,a+b,a+b+1,a+b+2].filter(n=>n>=0&&n<=9).sort(()=>Math.random()-0.5);
    qs.push({a,b,answer:a+b,choices});
  });
  speedData[idx]={qs,cur:0,correct:0,timer:null,timeLeft:100};
  renderSpeedQ(idx);
  speedData[idx].timer=setInterval(()=>{
    speedData[idx].timeLeft-=2;
    document.getElementById('speedBar'+idx).style.width=speedData[idx].timeLeft+'%';
    if(speedData[idx].timeLeft<=0){
      clearInterval(speedData[idx].timer);
      finishSpeed(idx);
    }
  },400);
}

function renderSpeedQ(idx){
  const sd=speedData[idx];
  if(sd.cur>=sd.qs.length){finishSpeed(idx);return;}
  const q=sd.qs[sd.cur];
  document.getElementById('speedQ'+idx).textContent=`${q.a}과 ${q.b}를 모으면?`;
  document.getElementById('btns'+idx).innerHTML=q.choices.map(n=>`<button class="btn" onclick="answerSpeed(${idx},this,${n},${q.answer})">${n}</button>`).join('');
}

function answerSpeed(idx,el,val,correct){
  const sd=speedData[idx];playSound('click');
  if(val===correct){el.classList.add('correct');sd.correct++;playSound('correct');}
  else{el.classList.add('wrong');playSound('wrong');}
  sd.cur++;
  document.getElementById('speedScore'+idx).textContent=`맞힌 수: ${sd.correct}/${sd.qs.length}`;
  setTimeout(()=>renderSpeedQ(idx),400);
}

function finishSpeed(idx){
  const sd=speedData[idx];
  if(sd.timer)clearInterval(sd.timer);
  const s=slides[idx];if(s.answered)return;
  s.answered=true;
  if(sd.correct>=3){combo++;if(combo>maxCombo)maxCombo=combo;score+=s.score;

}

// Q10: Card matching
let matchData={};
function initMatch(idx){
  if(matchData[idx])return;
  const items=[
    {q:'2와 4를 모으면',answer:6,choices:[5,6,7]},

function initQ6b(idx){
  const s=slides[idx];if(s.step===undefined)s.step=0;
  const btnsEl=document.getElementById('btns'+idx);
  if(s.step===0){
    btnsEl.innerHTML=[4,5,6,7].map(n=>`<button class="btn" onclick="stepQ6b(${idx},this,${n},6)">${n}</button>`).join('');
  }
}
function stepQ6b(idx,el,val,correct){
  const s=slides[idx];if(s.answered)return;playSound('click');
  if(s.step===0&&val===6){
    document.getElementById('bA_'+idx).textContent='6';document.getElementById('bA_'+idx).classList.add('filled');
    el.classList.add('correct');s.step=1;
    setTimeout(()=>{
      document.getElementById('btns'+idx).innerHTML=[1,2,3,4].map(n=>`<button class="btn" onclick="stepQ6b(${idx},this,${n},2)">${n}</button>`).join('');
    },400);
  }else if(s.step===1&&val===2){
    document.getElementById('bB_'+idx).textContent='2';document.getElementById('bB_'+idx).classList.add('filled');
    el.classList.add('correct');s.step=2;
    setTimeout(()=>{
      document.getElementById('btns'+idx).innerHTML=[3,4,5,6].map(n=>`<button class="btn" onclick="stepQ6b(${idx},this,${n},4)">${n}</button>`).join('');
    },400);
  }else if(s.step===2&&val===4){
    document.getElementById('bC_'+idx).textContent='4';document.getElementById('bC_'+idx).classList.add('filled');
    el.classList.add('correct');s.answered=true;playSound('correct');combo++;if(combo>maxCombo)maxCombo=combo;score+=s.score;
    document.getElementById('fb'+idx).innerHTML=`<span class="feedback ok">🎉 6을 가르면 2와 4! +${s.score}점</span>`;
  }else{
    el.classList.add('wrong');playSound('wrong');combo=0;setTimeout(()=>el.classList.remove('wrong'),500);
    document.getElementById('fb'+idx).innerHTML=`<span class="feedback no">다시 세어 보세요!</span>`;
  }
}

// Q18: Speed challenge 2 (가르기)
let speedData2={};
function initSpeed2(idx){
  if(speedData2[idx])return;
  const qs2=[];
  const pairs=[[5,2],[7,3],[9,4],[6,1],[8,5]];
  pairs.forEach(([total,part])=>{
    const ans=total-part;
    const choices=[ans-1,ans,ans+1,ans+2].filter(n=>n>=0&&n<=9).sort(()=>Math.random()-0.5);
    qs2.push({total,part,answer:ans,choices});
  });
  speedData2[idx]={qs:qs2,cur:0,correct:0,timer:null,timeLeft:100};
  renderSpeed2Q(idx);
  speedData2[idx].timer=setInterval(()=>{
    speedData2[idx].timeLeft-=2;
    document.getElementById('speedBar2'+idx).style.width=speedData2[idx].timeLeft+'%';
    if(speedData2[idx].timeLeft<=0){
      clearInterval(speedData2[idx].timer);
      finishSpeed2(idx);
    }
  },400);
}
function renderSpeed2Q(idx){
  const sd=speedData2[idx];
  if(sd.cur>=sd.qs.length){finishSpeed2(idx);return;}
  const q=sd.qs[sd.cur];
  document.getElementById('speedQ2'+idx).textContent=`${q.total}을 가르면 ${q.part}과 ?`;
  document.getElementById('btns'+idx).innerHTML=q.choices.map(n=>`<button class="btn" onclick="answerSpeed2(${idx},this,${n},${q.answer})">${n}</button>`).join('');
}
function answerSpeed2(idx,el,val,correct){
  const sd=speedData2[idx];playSound('click');
  if(val===correct){el.classList.add('correct');sd.correct++;playSound('correct');}
  else{el.classList.add('wrong');playSound('wrong');}
  sd.cur++;
  document.getElementById('speedScore2'+idx).textContent=`맞힌 수: ${sd.correct}/${sd.qs.length}`;
  setTimeout(()=>renderSpeed2Q(idx),400);
}
function finishSpeed2(idx){
  const sd=speedData2[idx];
  if(sd.timer)clearInterval(sd.timer);
  const s=slides[idx];if(s.answered)return;
  s.answered=true;
  if(sd.correct>=3){combo++;if(combo>maxCombo)maxCombo=combo;score+=s.score;
    document.getElementById('fb'+idx).innerHTML=`<span class="feedback ok">🎉 ${sd.correct}/${sd.qs.length} 맞힘! +${s.score}점</span>`;
  }else{combo=0;
    document.getElementById('fb'+idx).innerHTML=`<span class="feedback no">${sd.correct}/${sd.qs.length} 맞힘. 다음에 더 빨리!</span>`;}
}

// Result
function showResult(){
  const d=document.getElementById('slide'+(slides.length-1));
  const total=slides.filter(s=>s.type==='q').reduce((a,s)=>a+s.score,0);
  const pct=Math.round(score/total*100);
  let msg=pct>=90?'🏆 훌륭해요!':pct>=70?'👏 잘했어요!':pct>=50?'💪 좋은 시작이에요!':'🌱 다시 도전해요!';
  d.innerHTML=`<div class="card" style="max-width:480px;">
    <div style="font-size:32px;color:var(--primary);margin-bottom:8px;">🎉 학습 완료!</div>
    <div style="font-size:64px;color:var(--primary);">${score}<span style="font-size:28px;color:var(--subtext);">/${total}</span></div>
    <div style="font-size:28px;margin:8px 0;">${msg}</div>
    ${maxCombo>1?`<div class="combo-badge">🔥 최대 콤보 x${maxCombo}</div>`:''}
    <div style="font-size:20px;color:var(--subtext);margin-top:12px;">그림과 수를 연결하는 연습을 했어요!<br>이제 덧셈과 뺄셈도 할 수 있어요!</div>
    <button class="btn" style="font-size:24px;margin-top:16px;padding:10px 28px;background:var(--primary);color:#fff;border-color:var(--primary);" onclick="location.reload()">다시 하기 🔄</button>
  </div>`;
}

// Nav
function updateNav(){
  document.getElementById('prevBtn').disabled=(current===0);
  document.getElementById('nextBtn').textContent=current===slides.length-2?'결과 보기 🏆':'다음 ▶';
  document.getElementById('pageInfo').textContent=`${current+1} / ${slides.length}`;
}

function goSlide(n){
  if(n<0||n>=slides.length)return;
  document.getElementById('slide'+current).classList.remove('active');
  document.getElementById('slide'+current).classList.add('exit');
  current=n;
  setTimeout(()=>{
    document.querySelectorAll('.slide').forEach(s=>s.classList.remove('exit'));
    document.getElementById('slide'+current).classList.add('active');
    updateNav();
    // Init interactive elements
    const s=slides[current];
    if(s.render){
      if(current===8)initQ6(current);// 그림→수식
      if(current===9)initSpeed(current);
      if(current===10)initMulti(current);
      if(current===12)initMatch(current);
      if(current===19)initQ6b(current);
      if(current===20)initSpeed2(current);
      if(current===21)initMulti2(current);
      if(current===22)initMatch2(current);
    }
    if(s.type==='result')showResult();
  },200);
}
function prevSlide(){goSlide(current-1);}
function nextSlide(){goSlide(current+1);}

let touchX=0;
document.addEventListener('touchstart',e=>{touchX=e.changedTouches[0].screenX;},{passive:true});
document.addEventListener('touchend',e=>{const d=e.changedTouches[0].screenX-touchX;if(Math.abs(d)>50){d>0?prevSlide():nextSlide();}},{passive:true});

renderSlides();
</script>
