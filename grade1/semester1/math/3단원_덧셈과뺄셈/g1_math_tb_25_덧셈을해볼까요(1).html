<!DOCTYPE html>

<title>덧셈을 해 볼까요(1) - K✦edu</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Nunito:wght@800&display=swap" rel="stylesheet">
<style>
:root{--bg:#F0FDFA;--card:#FFFFFF;--primary:#26A69A;--primary-light:#E0F2F1;--secondary:#4DB6AC;--green:#4CAF50;--green-light:#E8F5E9;--red:#F44336;--red-light:#FFEBEE;--yellow:#FFC107;--yellow-light:#FFF8E1;--text:#333;--subtext:#888;--border:#D0E8E4;--shadow:0 4px 16px rgba(0,0,0,0.08);--radius:20px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Jua',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh;width:100vw;user-select:none;-webkit-user-select:none;}
.logo{display:flex;align-items:center;gap:2px;position:fixed;top:12px;left:16px;z-index:999;}
.logo span:first-child{font-family:'Nunito',sans-serif;font-weight:800;font-size:20px;color:#1D4ED8;}
.logo span:nth-child(2){font-size:10px;color:#F59E0B;}
.logo span:last-child{font-family:'Nunito',sans-serif;font-weight:800;font-size:20px;color:#333;}
.sound-btn{position:fixed;top:12px;right:16px;z-index:999;background:var(--primary-light);border:none;border-radius:50%;width:40px;height:40px;font-size:20px;cursor:pointer;}
.slide{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px 80px;opacity:0;pointer-events:none;transition:opacity .4s,transform .4s;transform:translateX(60px);}
.slide.active{opacity:1;pointer-events:auto;transform:translateX(0);}
.slide.exit{opacity:0;transform:translateX(-60px);}
.slide-title{font-size:28px;color:var(--primary);margin-bottom:8px;text-align:center;}
.badge{display:inline-block;background:var(--yellow-light);color:#F57F17;padding:4px 14px;border-radius:20px;font-size:16px;margin-bottom:10px;}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;width:100%;max-width:560px;text-align:center;}
.char-row{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:12px;}
.char-img{width:56px;height:56px;border-radius:50%;}
.speech{background:var(--primary-light);border-radius:16px;padding:12px 18px;font-size:22px;max-width:380px;text-align:left;position:relative;}
.speech::before{content:'';position:absolute;left:-10px;top:18px;border:8px solid transparent;border-right-color:var(--primary-light);}
.btn-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:14px;}
.btn{padding:12px 28px;border-radius:16px;border:3px solid var(--border);background:var(--card);font-family:'Jua',sans-serif;font-size:48px;cursor:pointer;transition:all .2s;min-width:70px;}
.btn:hover{border-color:var(--primary);background:var(--primary-light);}
.btn.correct{background:var(--green-light)!important;border-color:var(--green)!important;animation:pop .3s;}
.btn.wrong{background:var(--red-light)!important;border-color:var(--red)!important;animation:shake .4s;}
.btn-sm{font-size:28px;padding:10px 20px;}
.blank{display:inline-flex;align-items:center;justify-content:center;width:72px;height:72px;border:4px dashed var(--primary);border-radius:16px;font-size:56px;color:var(--primary);background:var(--primary-light);margin:0 4px;transition:all .3s;vertical-align:middle;}
.blank.filled{border-style:solid;background:var(--green-light);border-color:var(--green);color:var(--green);}
.blank-sm{width:56px;height:56px;font-size:40px;}
.eq-row{display:flex;align-items:center;justify-content:center;gap:8px;margin:14px 0;font-size:52px;flex-wrap:wrap;}
.feedback{margin-top:12px;font-size:22px;min-height:30px;text-align:center;}
.ok{color:var(--green);}
.no{color:var(--red);}
.ten-frame{display:grid;grid-template-columns:repeat(5,44px);grid-template-rows:repeat(2,44px);gap:4px;justify-content:center;margin:10px 0;}
.ten-cell{width:44px;height:44px;border:3px solid var(--border);border-radius:10px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:24px;}
.ten-cell.f1{background:#FFCDD2;border-color:#EF9A9A;}
.ten-cell.f2{background:#C8E6C9;border-color:#A5D6A7;}
.speed-bar{width:100%;height:14px;background:var(--border);border-radius:7px;overflow:hidden;margin:8px 0;}
.speed-fill{height:100%;background:linear-gradient(90deg,var(--red),var(--yellow),var(--green));border-radius:7px;transition:width .3s;}
.ox-btn{width:80px;height:80px;border-radius:50%;font-size:40px;border:4px solid var(--border);background:var(--card);cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;}
.ox-btn.correct{border-color:var(--green);background:var(--green-light);}
.ox-btn.wrong{border-color:var(--red);background:var(--red-light);}
.cube{width:36px;height:36px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;font-size:20px;}
.c1{background:#FFCDD2;border:2px solid #EF9A9A;}
.c2{background:#C8E6C9;border:2px solid #A5D6A7;}
.nav{position:fixed;bottom:20px;left:0;right:0;display:flex;justify-content:center;gap:16px;z-index:100;}
.nav-btn{padding:10px 28px;border-radius:30px;border:none;font-family:'Jua',sans-serif;font-size:22px;cursor:pointer;}
.nav-prev{background:var(--card);color:var(--text);border:2px solid var(--border);}
.nav-next{background:var(--primary);color:#fff;}
.nav-btn:disabled{opacity:.4;cursor:default;}
.page-info{position:fixed;bottom:6px;left:50%;transform:translateX(-50%);font-size:16px;color:var(--subtext);}
.combo-badge{display:inline-block;background:linear-gradient(135deg,#FF6B6B,#FFE66D);color:#fff;padding:6px 18px;border-radius:20px;font-size:20px;margin:6px 0;}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.12)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
</style>
</head>

let audioCtx,soundOn=true,cur=0,score=0,combo=0,maxCombo=0;
function initA(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
function ps(t){if(!soundOn)return;initA();audioCtx.resume().then(()=>{const n=audioCtx.currentTime;if(t==='correct'){[523,659,784].forEach((f,i)=>{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(.15,n+i*.12);g.gain.exponentialRampToValueAtTime(.01,n+i*.12+.2);o.connect(g);g.connect(audioCtx.destination);o.start(n+i*.12);o.stop(n+i*.12+.2);});}else if(t==='wrong'){[220,196].forEach((f,i)=>{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sawtooth';o.frequency.value=f;g.gain.setValueAtTime(.1,n+i*.15);g.gain.exponentialRampToValueAtTime(.01,n+i*.15+.2);o.connect(g);g.connect(audioCtx.destination);o.start(n+i*.15);o.stop(n+i*.15+.2);});}else{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sine';o.frequency.value=880;g.gain.setValueAtTime(.08,n);g.gain.exponentialRampToValueAtTime(.01,n+.08);o.connect(g);g.connect(audioCtx.destination);o.start(n);o.stop(n+.08);}});}
function toggleSound(){soundOn=!soundOn;document.getElementById('soundBtn').textContent=soundOn?'🔊':'🔇';}
function stars(s){if(s<=10)return'⭐ 기본';if(s<=25)return'⭐⭐ 발전';if(s<=50)return'⭐⭐⭐ 심화';return'⭐⭐⭐⭐ 최심화';}
function tf(a,b){let h='<div class="ten-frame">';for(let i=0;i<10;i++){let c='ten-cell';if(i<a)c+=' f1';else if(i<a+b)c+=' f2';h+=`<div class="${c}">${i<a?'●':i<a+b?'●':''}</div>`;}return h+'</div>';}
function cubes(n,c){return Array.from({length:n}).map(()=>`<span class="cube ${c}">■</span>`).join('');}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

    <div class="speech" style="font-size:20px;">바구니에 사과가 4개 있어요. 2개를 더 넣으면 모두 몇 개?</div>
  </div>
  <div class="eq-row"><span>4</span><span style="color:#2E7D32;">+</span><span>2</span><span style="color:#1565C0;">=</span><span>?</span></div>
  <div class="btn-row">${shuffle([5,6,7,8]).map(n=>`<button class="btn" onclick="chk(${i},this,${n},6)">${n}</button>`).join('')}</div>
  <div class="feedback" id="f${i}"></div>
</div>`;}});

// Q9: 연속 덧셈 3문제 ⭐⭐
S.push({t:'q',sc:25,done:false,r(i){return`<div class="badge">${stars(25)}</div>
<div class="slide-title">연속 덧셈 풀기!</div><div class="card">
  <div id="seq${i}"></div>
  <div class="btn-row" id="b${i}"></div>
  <div class="feedback" id="f${i}"></div>
</div>`;}});

// Q10: 종합 퍼즐 ⭐⭐⭐
S.push({t:'q',sc:50,done:false,r(i){return`<div class="badge">${stars(50)}</div>
<div class="slide-title">덧셈 퍼즐 🧩</div><div class="card">
  <div style="font-size:22px;margin-bottom:8px;">모든 빈칸을 채우세요!</div>
  <div id="pz${i}"></div>
  <div class="feedback" id="f${i}"></div>
</div>`;}});

S.push({t:'result'});

function render(){const c=document.getElementById('sc');c.innerHTML='';S.forEach((s,i)=>{const d=document.createElement('div');d.className='slide'+(i===0?' active':'');d.id='s'+i;if(s.t==='c')d.innerHTML=s.h;else if(s.t==='q'&&s.r)d.innerHTML=s.r(i);else d.innerHTML='<div class="card" style="max-width:480px;"><div class="slide-title">🎉</div></div>';c.appendChild(d);});updNav();}

function chk(i,el,v,c){const s=S[i];if(s.done)return;ps('click');if(v===c){s.done=true;el.classList.add('correct');ps('correct');combo++;if(combo>maxCombo)maxCombo=combo;score+=s.sc;document.getElementById('f'+i).innerHTML=`<span class="ok">🎉 정답! +${s.sc}점 ${combo>1?'🔥x'+combo:''}</span>`;}else{el.classList.add('wrong');ps('wrong');combo=0;setTimeout(()=>el.classList.remove('wrong'),500);document.getElementById('f'+i).innerHTML=`<span class="no">다시 풀어 보세요!</span>`;}}

function chkB(i,el,v,c){const s=S[i];if(s.done)return;ps('click');const bl=document.getElementById('bl'+i);if(v===c){s.done=true;bl.textContent=c;bl.classList.add('filled');el.classList.add('correct');ps('correct');combo++;if(combo>maxCombo)maxCombo=combo;score+=s.sc;document.getElementById('f'+i).innerHTML=`<span class="ok">🎉 맞았어요! +${s.sc}점</span>`;}else{el.classList.add('wrong');ps('wrong');combo=0;setTimeout(()=>el.classList.remove('wrong'),500);document.getElementById('f'+i).innerHTML=`<span class="no">다시 생각해 보세요!</span>`;}}

function chkOX(i,el,isX){const s=S[i];if(s.done)return;ps('click');if(isX){s.done=true;el.classList.add('correct');ps('correct');combo++;if(combo>maxCombo)maxCombo=combo;score+=s.sc;document.getElementById('f'+i).innerHTML=`<span class="ok">🎉 6+2=8이에요! +${s.sc}점</span>`;}else{el.classList.add('wrong');ps('wrong');combo=0;setTimeout(()=>el.classList.remove('wrong'),500);document.getElementById('f'+i).innerHTML=`<span class="no">6+2는 8이에요!</span>`;}}

// Speed challenge
let spd={};
function initSpd(i){if(spd[i])return;const qs=[[1,3],[2,5],[4,4],[3,6],[5,2],[1,8]];spd[i]={qs,ci:0,ok:0,tl:100,tm:null};renderSpd(i);spd[i].tm=setInterval(()=>{spd[i].tl-=1.5;document.getElementById('sb'+i).style.width=Math.max(0,spd[i].tl)+'%';if(spd[i].tl<=0){clearInterval(spd[i].tm);endSpd(i);}},300);}
function renderSpd(i){const d=spd[i];if(d.ci>=d.qs.length){endSpd(i);return;}const[a,b]=d.qs[d.ci];const ans=a+b;document.getElementById('sq'+i).textContent=`${a} + ${b} = ?`;document.getElementById('b'+i).innerHTML=shuffle([ans-1,ans,ans+1,ans+2].filter(n=>n>=0&&n<=9)).map(n=>`<button class="btn" onclick="ansSpd(${i},this,${n},${ans})">${n}</button>`).join('');}
function ansSpd(i,el,v,c){ps('click');if(v===c){el.classList.add('correct');spd[i].ok++;}else{el.classList.add('wrong');ps('wrong');}spd[i].ci++;document.getElementById('ss'+i).textContent=`${spd[i].ok}/${spd[i].qs.length}`;setTimeout(()=>renderSpd(i),350);}
function endSpd(i){const s=S[i],d=spd[i];if(d.tm)clearInterval(d.tm);if(s.done)return;s.done=true;if(d.ok>=4){combo++;if(combo>maxCombo)maxCombo=combo;score+=s.sc;document.getElementById('f'+i).innerHTML=`<span class="ok">🎉 ${d.ok}/${d.qs.length} 맞힘! +${s.sc}점</span>`;}else{combo=0;document.getElementById('f'+i).innerHTML=`<span class="no">${d.ok}/${d.qs.length} 맞힘. 다시 도전!</span>`;}}

// Sequential quiz
let seq={};
function initSeq(i){if(seq[i])return;seq[i]={qs:[[3,5,8],[1,7,8],[6,3,9]],ci:0};renderSeq(i);}
function renderSeq(i){const d=seq[i];if(d.ci>=d.qs.length){S[i].done=true;ps('correct');combo++;if(combo>maxCombo)maxCombo=combo;score+=S[i].sc;document.getElementById('f'+i).innerHTML=`<span class="ok">🎉 모두 맞았어요! +${S[i].sc}점</span>`;return;}
const[a,b,c]=d.qs[d.ci];document.getElementById('seq'+i).innerHTML=`<div style="font-size:22px;margin-bottom:8px;">(${d.ci+1}/${d.qs.length})</div><div class="eq-row" style="font-size:44px;"><span>${a}</span><span style="color:#2E7D32;">+</span><span>${b}</span><span style="color:#1565C0;">=</span><span>?</span></div>`;
document.getElementById('b'+i).innerHTML=shuffle([c-1,c,c+1,c+2].filter(n=>n>=0)).map(n=>`<button class="btn" onclick="ansSeq(${i},this,${n},${c})">${n}</button>`).join('');}
function ansSeq(i,el,v,c){ps('click');if(v===c){el.classList.add('correct');seq[i].ci++;setTimeout(()=>renderSeq(i),400);}else{el.classList.add('wrong');ps('wrong');combo=0;setTimeout(()=>el.classList.remove('wrong'),500);document.getElementById('f'+i).innerHTML=`<span class="no">다시 계산해 보세요!</span>`;}}

// Puzzle
let pzd={};
function initPz(i){if(pzd[i])return;pzd[i]={qs:[{q:'3 + □ = 7',ans:4,ch:[3,4,5]},{q:'□ + 6 = 9',ans:3,ch:[2,3,4]},{q:'5 + 4 = □',ans:9,ch:[8,9,7]},{q:'□ + □ = 6 (같은 수)',ans:3,ch:[2,3,4]}],ci:0};renderPz(i);}
function renderPz(i){const d=pzd[i];if(d.ci>=d.qs.length){S[i].done=true;ps('correct');combo++;if(combo>maxCombo)maxCombo=combo;score+=S[i].sc;document.getElementById('f'+i).innerHTML=`<span class="ok">🎉 퍼즐 완성! +${S[i].sc}점</span>`;return;}
const q=d.qs[d.ci];document.getElementById('pz'+i).innerHTML=`<div style="font-size:24px;margin:8px 0;">(${d.ci+1}/${d.qs.length}) ${q.q}</div><div class="btn-row">${q.ch.map(n=>`<button class="btn" onclick="ansPz(${i},this,${n},${q.ans})">${n}</button>`).join('')}</div>`;}
function ansPz(i,el,v,c){ps('click');if(v===c){el.classList.add('correct');pzd[i].ci++;setTimeout(()=>renderPz(i),400);}else{el.classList.add('wrong');ps('wrong');combo=0;setTimeout(()=>el.classList.remove('wrong'),500);document.getElementById('f'+i).innerHTML=`<span class="no">다시 생각해 보세요!</span>`;}}

function showResult(){const d=document.getElementById('s'+(S.length-1));const total=S.filter(s=>s.t==='q').reduce((a,s)=>a+s.sc,0);const pct=Math.round(score/total*100);let msg=pct>=90?'🏆 덧셈 천재!':pct>=70?'👏 잘했어요!':pct>=50?'💪 좋은 시작!':'🌱 다시 도전!';d.innerHTML=`<div class="card" style="max-width:480px;"><div style="font-size:32px;color:var(--primary);margin-bottom:8px;">🎉 학습 완료!</div><div style="font-size:64px;color:var(--primary);">${score}<span style="font-size:28px;color:var(--subtext);">/${total}</span></div><div style="font-size:28px;margin:8px 0;">${msg}</div>${maxCombo>1?`<div class="combo-badge">🔥 최대 콤보 x${maxCombo}</div>`:''}<div style="font-size:20px;color:var(--subtext);margin-top:12px;">한 자리 수의 덧셈을 연습했어요!<br>다음에는 덧셈표와 규칙을 배워 봐요!</div><button class="btn" style="font-size:24px;margin-top:16px;padding:10px 28px;background:var(--primary);color:#fff;border-color:var(--primary);" onclick="location.reload()">다시 하기 🔄</button></div>`;}

function updNav(){document.getElementById('prevBtn').disabled=(cur===0);document.getElementById('nextBtn').textContent=cur===S.length-2?'결과 보기 🏆':'다음 ▶';document.getElementById('pi').textContent=`${cur+1} / ${S.length}`;}
function go(n){if(n<0||n>=S.length)return;document.getElementById('s'+cur).classList.remove('active');document.getElementById('s'+cur).classList.add('exit');cur=n;setTimeout(()=>{document.querySelectorAll('.slide').forEach(s=>s.classList.remove('exit'));document.getElementById('s'+cur).classList.add('active');updNav();if(cur===10)initSpd(cur);if(cur===12)initSeq(cur);if(cur===13)initPz(cur);if(S[cur].t==='result')showResult();},200);}
function prev(){go(cur-1);}function next(){go(cur+1);}
let tx=0;document.addEventListener('touchstart',e=>{tx=e.changedTouches[0].screenX;},{passive:true});document.addEventListener('touchend',e=>{const d=e.changedTouches[0].screenX-tx;if(Math.abs(d)>50){d>0?prev():next();}},{passive:true});
render();
</script>
</body>
</html>
