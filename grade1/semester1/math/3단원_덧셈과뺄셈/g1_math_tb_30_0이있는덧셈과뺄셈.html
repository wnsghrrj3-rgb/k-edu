*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'Jua',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh;width:100vw;user-select:none;}
.logo{display:flex;align-items:center;gap:2px;position:fixed;top:12px;left:16px;z-index:999;}.logo span:first-child{font-family:'Nunito',sans-serif;font-weight:800;font-size:20px;color:#1D4ED8;}.logo span:nth-child(2){font-size:10px;color:#F59E0B;}.logo span:last-child{font-family:'Nunito',sans-serif;font-weight:800;font-size:20px;color:#333;}
.sound-btn{position:fixed;top:12px;right:16px;z-index:999;background:var(--primary-light);border:none;border-radius:50%;width:40px;height:40px;font-size:20px;cursor:pointer;}
.slide{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px 80px;opacity:0;pointer-events:none;transition:opacity .4s,transform .4s;transform:translateX(60px);}.slide.active{opacity:1;pointer-events:auto;transform:translateX(0);}.slide.exit{opacity:0;transform:translateX(-60px);}
.title{font-size:28px;color:var(--primary);margin-bottom:8px;text-align:center;}
.badge{display:inline-block;background:var(--yellow-light);color:#F57F17;padding:4px 14px;border-radius:20px;font-size:16px;margin-bottom:10px;}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px;width:100%;max-width:560px;text-align:center;}
.cr{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:12px;}
.ci{width:56px;height:56px;border-radius:50%;}.sp{background:var(--primary-light);border-radius:16px;padding:12px 18px;font-size:22px;max-width:380px;text-align:left;position:relative;}.sp::before{content:'';position:absolute;left:-10px;top:18px;border:8px solid transparent;border-right-color:var(--primary-light);}
.br{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:12px;}
.b{padding:10px 24px;border-radius:16px;border:3px solid var(--border);background:var(--card);font-family:'Jua',sans-serif;font-size:48px;cursor:pointer;transition:all .2s;min-width:64px;}.b:hover{border-color:var(--primary);background:var(--primary-light);}.b.correct{background:var(--green-light)!important;border-color:var(--green)!important;animation:pop .3s;}.b.wrong{background:var(--red-light)!important;border-color:var(--red)!important;animation:shake .4s;}
.bs{font-size:26px;padding:8px 18px;}
.bl{display:inline-flex;align-items:center;justify-content:center;width:60px;height:60px;border:4px dashed var(--primary);border-radius:14px;font-size:44px;color:var(--primary);background:var(--primary-light);margin:0 4px;transition:all .3s;}.bl.filled{border-style:solid;background:var(--green-light);border-color:var(--green);color:var(--green);}
.eq{display:flex;align-items:center;justify-content:center;gap:8px;margin:14px 0;font-size:52px;}
.fb{margin-top:10px;font-size:22px;min-height:28px;text-align:center;}.ok{color:var(--green);}.no{color:var(--red);}
.ox{width:76px;height:76px;border-radius:50%;font-size:38px;border:4px solid var(--border);background:var(--card);cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;}.ox.correct{border-color:var(--green);background:var(--green-light);}.ox.wrong{border-color:var(--red);background:var(--red-light);}
.rule-box{background:var(--primary-light);border-radius:16px;padding:14px;margin:8px 0;font-size:26px;border:2px solid var(--primary);}
.scene{background:linear-gradient(135deg,#E0F7FA,#FFF9C4);border-radius:20px;padding:14px;margin:8px 0;font-size:44px;min-height:60px;display:flex;align-items:center;justify-content:center;gap:6px;}
.nav{position:fixed;bottom:20px;left:0;right:0;display:flex;justify-content:center;gap:16px;z-index:100;}.nb{padding:10px 28px;border-radius:30px;border:none;font-family:'Jua',sans-serif;font-size:22px;cursor:pointer;}.np{background:var(--card);color:var(--text);border:2px solid var(--border);}.nn{background:var(--primary);color:#fff;}.nb:disabled{opacity:.4;cursor:default;}
.pi{position:fixed;bottom:6px;left:50%;transform:translateX(-50%);font-size:16px;color:var(--subtext);}
.combo{display:inline-block;background:linear-gradient(135deg,#FF6B6B,#FFE66D);color:#fff;padding:6px 18px;border-radius:20px;font-size:20px;margin:6px 0;}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.12)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}

function render(){const c=document.getElementById('sc');c.innerHTML='';S.forEach((s,i)=>{const d=document.createElement('div');d.className='slide'+(i===0?' active':'');d.id='s'+i;if(s.t==='c')d.innerHTML=s.h;else if(s.t==='q'&&s.r)d.innerHTML=s.r(i);else d.innerHTML='<div class="card" style="max-width:480px;"><div class="title">рҹҺү</div></div>';c.appendChild(d);});updNav();}

function chkB(i,el,v,c){const s=S[i];if(s.done)return;ps('click');const bl=document.getElementById('bl'+i);if(v===c){s.done=true;bl.textContent=c;bl.classList.add('filled');el.classList.add('correct');ps('correct');combo++;if(combo>maxCombo)maxCombo=combo;score+=s.sc;document.getElementById('f'+i).innerHTML=`<span class="ok">рҹҺү л§һм•ҳм–ҙмҡ”! +${s.sc}м җ ${combo>1?'рҹ”Ҙx'+combo:''}</span>`;}else{el.classList.add('wrong');ps('wrong');combo=0;setTimeout(()=>el.classList.remove('wrong'),500);document.getElementById('f'+i).innerHTML=`<span class="no">0мқҳ к·ңм№ҷмқ„ мғқк°Ғн•ҙ ліҙм„ёмҡ”!</span>`;}}

function chkOX(i,el,isX){const s=S[i];if(s.done)return;ps('click');if(isX){s.done=true;el.classList.add('correct');ps('correct');combo++;if(combo>maxCombo)maxCombo=combo;score+=s.sc;document.getElementById('f'+i).innerHTML=`<span class="ok">рҹҺү 0+6=6мқҙм—җмҡ”! +${s.sc}м җ</span>`;}else{el.classList.add('wrong');ps('wrong');combo=0;setTimeout(()=>el.classList.remove('wrong'),500);document.getElementById('f'+i).innerHTML=`<span class="no">0+6мқҖ 6мқҙм§Җ, 0мқҙ м•„лӢҲм—җмҡ”!</span>`;}}

function chkOX2(i,el,isO){const s=S[i];if(s.done)return;ps('click');if(isO){s.done=true;el.classList.add('correct');ps('correct');combo++;if(combo>maxCombo)maxCombo=combo;score+=s.sc;document.getElementById('f'+i).innerHTML=`<span class="ok">рҹҺү к°ҷмқҖ мҲҳлҒјлҰ¬ л№јл©ҙ 0! +${s.sc}м җ</span>`;}else{el.classList.add('wrong');ps('wrong');combo=0;setTimeout(()=>el.classList.remove('wrong'),500);document.getElementById('f'+i).innerHTML=`<span class="no">9вҲ’9лҘј кі„мӮ°н•ҙ ліҙм„ёмҡ”!</span>`;}}

function chkOXg(i,el,picked,correct,okMsg,noMsg){const s=S[i];if(s.done)return;ps('click');if(picked===correct){s.done=true;el.classList.add('correct');ps('correct');combo++;if(combo>maxCombo)maxCombo=combo;score+=s.sc;document.getElementById('f'+i).innerHTML=`<span class="ok">рҹҺү ${okMsg} +${s.sc}м җ</span>`;}else{el.classList.add('wrong');ps('wrong');combo=0;setTimeout(()=>el.classList.remove('wrong'),500);document.getElementById('f'+i).innerHTML=`<span class="no">${noMsg}</span>`;}}

// Q9 sequential
let seq={};
function initSeq(i){if(seq[i])return;seq[i]={qs:[{q:'3 + 0 = ?',a:3},{q:'8 вҲ’ 0 = ?',a:8},{q:'5 вҲ’ 5 = ?',a:0},{q:'0 + 7 = ?',a:7}],ci:0};renderSeq(i);}
function renderSeq(i){const d=seq[i];if(d.ci>=d.qs.length){S[i].done=true;ps('correct');combo++;if(combo>maxCombo)maxCombo=combo;score+=S[i].sc;document.getElementById('f'+i).innerHTML=`<span class="ok">рҹҺү лӘЁл‘җ л§һм•ҳм–ҙмҡ”! +${S[i].sc}м җ</span>`;return;}
const q=d.qs[d.ci];document.getElementById('seq'+i).innerHTML=`<div style="font-size:22px;margin-bottom:6px;">(${d.ci+1}/${d.qs.length})</div><div style="font-size:40px;margin:8px 0;">${q.q}</div>`;
const choices=[q.a===0?1:0, q.a, q.a===0?2:q.a+1, q.a===0?3:q.a-1>-1?q.a-1:q.a+2].sort(()=>Math.random()-.5);
document.getElementById('b'+i).innerHTML=choices.map(n=>`<button class="b" onclick="ansSeq(${i},this,${n},${q.a})">${n}</button>`).join('');}
function ansSeq(i,el,v,c){ps('click');if(v===c){el.classList.add('correct');seq[i].ci++;setTimeout(()=>renderSeq(i),400);}else{el.classList.add('wrong');ps('wrong');combo=0;setTimeout(()=>el.classList.remove('wrong'),500);document.getElementById('f'+i).innerHTML=`<span class="no">0мқҳ к·ңм№ҷмқ„ л– мҳ¬л Ө ліҙм„ёмҡ”!</span>`;}}

const q=d.qs[d.ci];document.getElementById('cls'+i).innerHTML=`<div style="font-size:22px;margin:8px 0;">(${d.ci+1}/${d.qs.length})</div><div style="font-size:36px;margin:8px 0;">${q.eq}</div><div style="font-size:20px;margin-bottom:8px;">м–ҙл–Ө к·ңм№ҷ?</div><div class="br">${q.opts.map(o=>`<button class="b bs" onclick="ansCls(${i},this,'${o}','${q.rule}')">${o}</button>`).join('')}</div>`;}
function ansCls(i,el,v,c){ps('click');if(v===c){el.classList.add('correct');cls[i].ci++;setTimeout(()=>renderCls(i),500);}else{el.classList.add('wrong');ps('wrong');combo=0;setTimeout(()=>el.classList.remove('wrong'),500);document.getElementById('f'+i).innerHTML=`<span class="no">мӢқмқ„ мһҳ ліҙкі  к·ңм№ҷмқ„ м°ҫм•„ ліҙм„ёмҡ”!</span>`;}}

],ci:0};renderCls2(i);}

function showResult(){const d=document.getElementById('s'+(S.length-1));const total=S.filter(s=>s.t==='q').reduce((a,s)=>a+s.sc,0);const pct=Math.round(score/total*100);let msg=pct>=90?'рҹҸҶ 0мқҳ л§ҲлІ•мӮ¬!':pct>=70?'рҹ‘Ҹ мһҳн–Ҳм–ҙмҡ”!':pct>=50?'рҹ’Ә мўӢмқҖ мӢңмһ‘!':'рҹҢұ лӢӨмӢң лҸ„м „!';d.innerHTML=`<div class="card" style="max-width:480px;"><div style="font-size:32px;color:var(--primary);margin-bottom:8px;">рҹҺү н•ҷмҠө мҷ„лЈҢ!</div><div style="font-size:64px;color:var(--primary);">${score}<span style="font-size:28px;color:var(--subtext);">/${total}</span></div><div style="font-size:28px;margin:8px 0;">${msg}</div>${maxCombo>1?`<div class="combo">рҹ”Ҙ мөңлҢҖ мҪӨліҙ x${maxCombo}</div>`:''}<div style="font-size:20px;color:var(--subtext);margin-top:12px;">0мқҙ мһҲлҠ” лҚ§м…ҲВ·лә„м…Ҳмқҳ 3к°Җм§Җ к·ңм№ҷмқ„ л°°мӣ м–ҙмҡ”!</div><button class="b" style="font-size:24px;margin-top:16px;padding:10px 28px;background:var(--primary);color:#fff;border-color:var(--primary);" onclick="location.reload()">лӢӨмӢң н•ҳкё° рҹ”„</button></div>`;}

function updNav(){document.getElementById('prevBtn').disabled=(cur===0);document.getElementById('nextBtn').textContent=cur===S.length-2?'кІ°кіј ліҙкё° рҹҸҶ':'лӢӨмқҢ в–¶';document.getElementById('pi').textContent=`${cur+1} / ${S.length}`;}
function go(n){if(n<0||n>=S.length)return;document.getElementById('s'+cur).classList.remove('active');document.getElementById('s'+cur).classList.add('exit');cur=n;setTimeout(()=>{document.querySelectorAll('.slide').forEach(s=>s.classList.remove('exit'));document.getElementById('s'+cur).classList.add('active');updNav();if(cur===12)initSeq(cur);if(cur===13)initCls(cur);if(cur===22)initSeq2(cur);if(cur===23)initCls2(cur);if(S[cur].t==='result')showResult();},200);}
function prev(){go(cur-1);}function next(){go(cur+1);}
let tx=0;document.addEventListener('touchstart',e=>{tx=e.changedTouches[0].screenX;},{passive:true});document.addEventListener('touchend',e=>{const d=e.changedTouches[0].screenX-tx;if(Math.abs(d)>50){d>0?prev():next();}},{passive:true});
render();
