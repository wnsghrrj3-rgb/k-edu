<style>
:root{--bg:#F0FDFA;--card:#FFFFFF;--primary:#26A69A;--primary-light:#E0F2F1;--secondary:#4DB6AC;--green:#4CAF50;--green-light:#E8F5E9;--red:#F44336;--red-light:#FFEBEE;--yellow:#FFC107;--yellow-light:#FFF8E1;--text:#333;--subtext:#888;--border:#D0E8E4;--shadow:0 4px 16px rgba(0,0,0,0.08);--radius:20px;}
*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'Jua',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh;width:100vw;user-select:none;}
.logo{display:flex;align-items:center;gap:2px;position:fixed;top:12px;left:16px;z-index:999;}.logo span:first-child{font-family:'Nunito',sans-serif;font-weight:800;font-size:20px;color:#1D4ED8;}.logo span:nth-child(2){font-size:10px;color:#F59E0B;}.logo span:last-child{font-family:'Nunito',sans-serif;font-weight:800;font-size:20px;color:#333;}
.sound-btn{position:fixed;top:12px;right:16px;z-index:999;background:var(--primary-light);border:none;border-radius:50%;width:40px;height:40px;font-size:20px;cursor:pointer;}
.slide{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 16px 80px;opacity:0;pointer-events:none;transition:opacity .4s,transform .4s;transform:translateX(60px);overflow-y:auto;}.slide.active{opacity:1;pointer-events:auto;transform:translateX(0);}.slide.exit{opacity:0;transform:translateX(-60px);}
.title{font-size:26px;color:var(--primary);margin-bottom:8px;text-align:center;}
.badge{display:inline-block;background:linear-gradient(135deg,#FFD700,#FF8C00);color:#fff;padding:4px 14px;border-radius:20px;font-size:16px;margin-bottom:10px;}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;width:100%;max-width:560px;text-align:center;}
.cr{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:12px;}.ci{width:56px;height:56px;border-radius:50%;}.sp{background:var(--primary-light);border-radius:16px;padding:12px 18px;font-size:20px;max-width:380px;text-align:left;position:relative;}.sp::before{content:'';position:absolute;left:-10px;top:18px;border:8px solid transparent;border-right-color:var(--primary-light);}
.br{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:12px;}
.b{padding:10px 22px;border-radius:16px;border:3px solid var(--border);background:var(--card);font-family:'Jua',sans-serif;font-size:40px;cursor:pointer;transition:all .2s;min-width:56px;}.b:hover{border-color:var(--primary);background:var(--primary-light);}.b.correct{background:var(--green-light)!important;border-color:var(--green)!important;animation:pop .3s;}.b.wrong{background:var(--red-light)!important;border-color:var(--red)!important;animation:shake .4s;}
.bs{font-size:22px;padding:8px 16px;}
.fb{margin-top:10px;font-size:20px;min-height:28px;text-align:center;}.ok{color:var(--green);}.no{color:var(--red);}
.clue-box{background:linear-gradient(135deg,#E8EAF6,#FFF8E1);border:2px solid #C5CAE9;border-radius:16px;padding:14px;margin:10px 0;font-size:24px;text-align:left;line-height:1.6;}
.clue-box .clue{margin:4px 0;}
.code-box{display:inline-flex;gap:4px;margin:8px 0;}
.code-cell{width:48px;height:56px;border:3px solid var(--border);border-radius:10px;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:14px;color:var(--subtext);}
.code-cell .num{font-size:28px;color:var(--primary);margin-top:2px;}
.code-cell.solved{border-color:var(--green);background:var(--green-light);}
.code-cell.solved .num{color:var(--green);}
.track-badge{display:inline-block;background:linear-gradient(135deg,#FF6B6B,#FF8E53);color:#fff;padding:4px 14px;border-radius:12px;font-size:14px;margin-bottom:8px;}
.hint-btn{background:var(--yellow-light);border:2px solid var(--yellow);border-radius:12px;padding:6px 14px;font-family:'Jua',sans-serif;font-size:18px;cursor:pointer;margin-top:8px;color:#F57F17;}
.hint-text{font-size:18px;color:#F57F17;margin-top:6px;display:none;}
.nav{position:fixed;bottom:20px;left:0;right:0;display:flex;justify-content:center;gap:16px;z-index:100;}.nb{padding:10px 28px;border-radius:30px;border:none;font-family:'Jua',sans-serif;font-size:22px;cursor:pointer;}.np{background:var(--card);color:var(--text);border:2px solid var(--border);}.nn{background:var(--primary);color:#fff;}.nb:disabled{opacity:.4;cursor:default;}
.pi{position:fixed;bottom:6px;left:50%;transform:translateX(-50%);font-size:16px;color:var(--subtext);}
.combo{display:inline-block;background:linear-gradient(135deg,#FF6B6B,#FFE66D);color:#fff;padding:6px 18px;border-radius:20px;font-size:20px;margin:6px 0;}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.12)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
</style>
</head>

function initA(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
function ps(t){if(!soundOn)return;initA();audioCtx.resume().then(()=>{const n=audioCtx.currentTime;if(t==='correct'){[523,659,784].forEach((f,i)=>{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(.15,n+i*.12);g.gain.exponentialRampToValueAtTime(.01,n+i*.12+.2);o.connect(g);g.connect(audioCtx.destination);o.start(n+i*.12);o.stop(n+i*.12+.2);});}else if(t==='wrong'){[220,196].forEach((f,i)=>{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sawtooth';o.frequency.value=f;g.gain.setValueAtTime(.1,n+i*.15);g.gain.exponentialRampToValueAtTime(.01,n+i*.15+.2);o.connect(g);g.connect(audioCtx.destination);o.start(n+i*.15);o.stop(n+i*.15+.2);});}else{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sine';o.frequency.value=880;g.gain.setValueAtTime(.08,n);g.gain.exponentialRampToValueAtTime(.01,n+.08);o.connect(g);g.connect(audioCtx.destination);o.start(n);o.stop(n+.08);}});}

S.push({t:'result'});

function render(){const c=document.getElementById('sc');c.innerHTML='';S.forEach((s,i)=>{const d=document.createElement('div');d.className='slide'+(i===0?' active':'');d.id='s'+i;if(s.t==='c')d.innerHTML=s.h;else if(s.t==='q'&&s.r)d.innerHTML=s.r(i);else d.innerHTML='<div class="card" style="max-width:480px;"><div class="title">🎉</div></div>';c.appendChild(d);});updNav();}

function showHint(i){const h=document.getElementById('h'+i);if(h)h.style.display=h.style.display==='block'?'none':'block';}

function chk(i,el,v,c){const s=S[i];if(s.done)return;ps('click');if(v===c){s.done=true;el.classList.add('correct');ps('correct');combo++;if(combo>maxCombo)maxCombo=combo;score+=s.sc;document.getElementById('f'+i).innerHTML=`<span class="ok">🎉 정답! +${s.sc}점 ${combo>1?'🔥x'+combo:''}</span>`;}else{el.classList.add('wrong');ps('wrong');combo=0;setTimeout(()=>el.classList.remove('wrong'),500);document.getElementById('f'+i).innerHTML=`<span class="no">힌트를 확인해 보세요! 💡</span>`;}}

// Q6: A+B+C=5, A=1, B=C → 1+2B=5 → B=2
function chkMulti(i,el,v,c){
  const s=S[i];if(s.done)return;ps('click');
  if(v===2){s.done=true;el.classList.add('correct');ps('correct');combo++;if(combo>maxCombo)maxCombo=combo;score+=s.sc;document.getElementById('f'+i).innerHTML=`<span class="ok">🎉 1+2+2=5! 정답! +${s.sc}점</span>`;}
  else{el.classList.add('wrong');ps('wrong');combo=0;setTimeout(()=>el.classList.remove('wrong'),500);document.getElementById('f'+i).innerHTML=`<span class="no">A=1이고 B=C일 때, 1+B+B=5!</span>`;}
}

// Q10: Final code - 3 step
let finalD={};
function initFinal(i){
  if(finalD[i])return;
  finalD[i]={steps:[{q:'1번째: 4+3−2=?',a:5},{q:'2번째: 9−9=?',a:0},{q:'3번째: 1+2+3+□=9, □=?',a:3}],ci:0,code:[]};
  renderFinal(i);
}
function renderFinal(i){
  const d=finalD[i];
  if(d.ci>=d.steps.length){
    S[i].done=true;ps('correct');combo++;if(combo>maxCombo)maxCombo=combo;score+=S[i].sc;
    document.getElementById('f'+i).innerHTML=`<span class="ok">🏆 비밀번호: ${d.code.join('')}! 보물 상자 열림! +${S[i].sc}점</span>`;
    return;
  }
  const step=d.steps[d.ci];
  const codeDisp=d.code.map(c=>`<div class="code-cell solved"><div class="num">${c}</div></div>`).join('');
  const remaining=Array.from({length:d.steps.length-d.code.length}).map(()=>'<div class="code-cell"><div class="num">?</div></div>').join('');
  
  document.getElementById('finalArea'+i).innerHTML=`
    <div class="code-box">${codeDisp}${remaining}</div>
    <div style="font-size:22px;margin:8px 0;">${step.q}</div>
    <div class="br">${[step.a-1,step.a,step.a+1,step.a+2].filter(n=>n>=0&&n<=9).sort(()=>Math.random()-.5).map(n=>`<button class="b" onclick="ansFinal(${i},this,${n},${step.a})">${n}</button>`).join('')}</div>`;
}
function ansFinal(i,el,v,c){
  ps('click');const d=finalD[i];
  if(v===c){el.classList.add('correct');d.code.push(c);d.ci++;setTimeout(()=>renderFinal(i),500);}
  else{el.classList.add('wrong');ps('wrong');combo=0;setTimeout(()=>el.classList.remove('wrong'),500);document.getElementById('f'+i).innerHTML=`<span class="no">차근차근 계산해 보세요!</span>`;}
}

function showResult(){const d=document.getElementById('s'+(S.length-1));const total=S.filter(s=>s.t==='q').reduce((a,s)=>a+s.sc,0);const pct=Math.round(score/total*100);const correct=S.filter(s=>s.t==='q'&&s.done).length;
let msg,medal;
if(pct>=90){msg='🏆 올림피아드 챔피언!';medal='🥇';}
else if(pct>=70){msg='🥈 은메달! 대단해요!';medal='🥈';}
else if(pct>=50){msg='🥉 동메달! 멋져요!';medal='🥉';}
else{msg='💪 다시 도전하면 더 잘할 수 있어요!';medal='⭐';}
d.innerHTML=`<div class="card" style="max-width:480px;">
<div class="track-badge">Track B 최심화</div>
<div style="font-size:72px;margin:8px 0;">${medal}</div>
<div style="font-size:28px;color:var(--primary);margin-bottom:6px;">⭐⭐⭐⭐ 올림피아드 완료!</div>
<div style="font-size:56px;color:var(--primary);">${score}<span style="font-size:24px;color:var(--subtext);">/${total}</span></div>
<div style="font-size:22px;color:var(--subtext);">${correct}/18 문항 정답</div>
<div style="font-size:28px;margin:10px 0;">${msg}</div>
${maxCombo>1?`<div class="combo">🔥 최대 콤보 x${maxCombo}</div>`:''}
<div style="font-size:18px;color:var(--subtext);margin-top:10px;">동시 조건, 암호 해독, 논리 추론까지!<br>3단원 모든 과정을 완벽하게 마쳤어요!</div>
<button class="b bs" style="margin-top:14px;background:var(--primary);color:#fff;border-color:var(--primary);" onclick="location.reload()">다시 도전 🔄</button></div>`;}

function updNav(){document.getElementById('prevBtn').disabled=(cur===0);document.getElementById('nextBtn').textContent=cur===S.length-2?'결과 보기 🏆':'다음 ▶';document.getElementById('pi').textContent=`${cur+1} / ${S.length}`;}
function go(n){if(n<0||n>=S.length)return;document.getElementById('s'+cur).classList.remove('active');document.getElementById('s'+cur).classList.add('exit');cur=n;setTimeout(()=>{document.querySelectorAll('.slide').forEach(s=>s.classList.remove('exit'));document.getElementById('s'+cur).classList.add('active');updNav();if(cur===11)initFinal(cur);if(S[cur].t==='result')showResult();},200);}
function prev(){go(cur-1);}function next(){go(cur+1);}
let tx=0;document.addEventListener('touchstart',e=>{tx=e.changedTouches[0].screenX;},{passive:true});document.addEventListener('touchend',e=>{const d=e.changedTouches[0].screenX-tx;if(Math.abs(d)>50){d>0?prev():next();}},{passive:true});
render();
</script>
