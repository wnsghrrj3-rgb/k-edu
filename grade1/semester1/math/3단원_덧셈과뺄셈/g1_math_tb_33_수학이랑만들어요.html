<style>
:root{--bg:#F0FDFA;--card:#FFFFFF;--primary:#26A69A;--primary-light:#E0F2F1;--secondary:#4DB6AC;--green:#4CAF50;--green-light:#E8F5E9;--red:#F44336;--red-light:#FFEBEE;--yellow:#FFC107;--yellow-light:#FFF8E1;--text:#333;--subtext:#888;--border:#D0E8E4;--shadow:0 4px 16px rgba(0,0,0,0.08);--radius:20px;}
*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'Jua',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh;width:100vw;user-select:none;}
.logo{display:flex;align-items:center;gap:2px;position:fixed;top:12px;left:16px;z-index:999;}.logo span:first-child{font-family:'Nunito',sans-serif;font-weight:800;font-size:20px;color:#1D4ED8;}.logo span:nth-child(2){font-size:10px;color:#F59E0B;}.logo span:last-child{font-family:'Nunito',sans-serif;font-weight:800;font-size:20px;color:#333;}
.sound-btn{position:fixed;top:12px;right:16px;z-index:999;background:var(--primary-light);border:none;border-radius:50%;width:40px;height:40px;font-size:20px;cursor:pointer;}
.slide{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 16px 80px;opacity:0;pointer-events:none;transition:opacity .4s,transform .4s;transform:translateX(60px);}.slide.active{opacity:1;pointer-events:auto;transform:translateX(0);}.slide.exit{opacity:0;transform:translateX(-60px);}
.title{font-size:28px;color:var(--primary);margin-bottom:8px;text-align:center;}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;width:100%;max-width:560px;text-align:center;}
.cr{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:12px;}.ci{width:56px;height:56px;border-radius:50%;}.sp{background:var(--primary-light);border-radius:16px;padding:12px 18px;font-size:22px;max-width:380px;text-align:left;position:relative;}.sp::before{content:'';position:absolute;left:-10px;top:18px;border:8px solid transparent;border-right-color:var(--primary-light);}
.fb{margin-top:10px;font-size:22px;min-height:28px;text-align:center;}.ok{color:var(--green);}.no{color:var(--red);}
/* Bingo */
.bingo{display:grid;grid-template-columns:repeat(3,72px);grid-template-rows:repeat(3,72px);gap:6px;justify-content:center;margin:10px 0;}
.bcell{width:72px;height:72px;border:3px solid var(--border);border-radius:14px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:32px;cursor:pointer;transition:all .2s;}
.bcell.done{background:var(--green-light);border-color:var(--green);color:var(--green);}
.bcell.wrong-cell{background:var(--red-light);border-color:var(--red);}
/* Card match */
.match-grid{display:grid;grid-template-columns:repeat(4,70px);gap:8px;justify-content:center;margin:10px 0;}
.mcard{width:70px;height:84px;border:3px solid var(--border);border-radius:14px;background:var(--primary);color:transparent;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;transition:all .3s;}
.mcard.flip{background:#fff;color:var(--text);border-color:var(--primary);}
.mcard.matched{background:var(--green-light);border-color:var(--green);color:var(--green);cursor:default;}
/* Dice */
.dice{width:80px;height:80px;border:4px solid var(--primary);border-radius:16px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:48px;margin:8px auto;transition:all .3s;}
.dice.rolling{animation:roll .3s 3;}
@keyframes roll{0%{transform:rotate(0)}50%{transform:rotate(180deg)}100%{transform:rotate(360deg)}}
.b{padding:10px 22px;border-radius:16px;border:3px solid var(--border);background:var(--card);font-family:'Jua',sans-serif;font-size:44px;cursor:pointer;transition:all .2s;min-width:60px;}.b:hover{border-color:var(--primary);background:var(--primary-light);}.b.correct{background:var(--green-light)!important;border-color:var(--green)!important;}.b.wrong{background:var(--red-light)!important;border-color:var(--red)!important;animation:shake .4s;}
.bs{font-size:24px;padding:8px 16px;}
.br{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:12px;}
.nav{position:fixed;bottom:20px;left:0;right:0;display:flex;justify-content:center;gap:16px;z-index:100;}.nb{padding:10px 28px;border-radius:30px;border:none;font-family:'Jua',sans-serif;font-size:22px;cursor:pointer;}.np{background:var(--card);color:var(--text);border:2px solid var(--border);}.nn{background:var(--primary);color:#fff;}.nb:disabled{opacity:.4;cursor:default;}
.pi{position:fixed;bottom:6px;left:50%;transform:translateX(-50%);font-size:16px;color:var(--subtext);}
.combo{display:inline-block;background:linear-gradient(135deg,#FF6B6B,#FFE66D);color:#fff;padding:6px 18px;border-radius:20px;font-size:20px;margin:6px 0;}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.12)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
</style>
</head>

let audioCtx,soundOn=true,cur=0,score=0,combo=0,maxCombo=0;
function initA(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
function ps(t){if(!soundOn)return;initA();audioCtx.resume().then(()=>{const n=audioCtx.currentTime;if(t==='correct'){[523,659,784].forEach((f,i)=>{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(.15,n+i*.12);g.gain.exponentialRampToValueAtTime(.01,n+i*.12+.2);o.connect(g);g.connect(audioCtx.destination);o.start(n+i*.12);o.stop(n+i*.12+.2);});}else if(t==='wrong'){[220,196].forEach((f,i)=>{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sawtooth';o.frequency.value=f;g.gain.setValueAtTime(.1,n+i*.15);g.gain.exponentialRampToValueAtTime(.01,n+i*.15+.2);o.connect(g);g.connect(audioCtx.destination);o.start(n+i*.15);o.stop(n+i*.15+.2);});}else{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sine';o.frequency.value=880;g.gain.setValueAtTime(.08,n);g.gain.exponentialRampToValueAtTime(.01,n+.08);o.connect(g);g.connect(audioCtx.destination);o.start(n);o.stop(n+.08);}});}
function toggleSound(){soundOn=!soundOn;document.getElementById('soundBtn').textContent=soundOn?'🔊':'🔇';}

const S=[];
// Title
S.push({t:'c',h:`<div class="title" style="font-size:32px;">🎮 수학이랑 만들어요</div><div style="font-size:24px;color:var(--secondary);margin-bottom:16px;">3단원 창의 활동</div><div class="card"><div class="cr"><img src="${KAY}" class="ci" alt="케이"><div class="sp">재미있는 연산 게임을 하면서 놀아 보자! 🎲</div></div><div style="font-size:48px;margin:10px 0;">🎯 🎲 🃏</div><div style="font-size:22px;color:var(--subtext);">빙고, 카드 뒤집기, 주사위 게임!</div></div>`});

// Game 1: 덧셈 빙고
S.push({t:'q',sc:0,done:false,r(i){return`<div class="title">🎯 덧셈 빙고!</div><div class="card">
<div style="font-size:20px;margin-bottom:8px;">덧셈 문제를 풀고 빙고 칸을 채워요!<br>한 줄을 완성하면 빙고!</div>
<div class="bingo" id="bg${i}"></div>
<div id="bq${i}" style="font-size:32px;margin:6px 0;"></div>
<div class="br" id="b${i}"></div>
<div class="fb" id="f${i}"></div></div>`;}});

// Game 2: 카드 뒤집기 매칭
S.push({t:'q',sc:0,done:false,r(i){return`<div class="title">🃏 카드 뒤집기!</div><div class="card">
<div style="font-size:20px;margin-bottom:8px;">같은 답을 가진 카드 짝을 찾으세요!</div>
<div class="match-grid" id="mg${i}"></div>
<div style="font-size:20px;margin-top:6px;" id="mt${i}">뒤집기: 0</div>
<div class="fb" id="f${i}"></div></div>`;}});

// Game 3: 주사위 덧셈·뺄셈
S.push({t:'q',sc:0,done:false,r(i){return`<div class="title">🎲 주사위 연산 게임!</div><div class="card">
<div style="font-size:20px;margin-bottom:6px;">주사위를 굴려서 계산하세요!</div>

</div>

function render(){const c=document.getElementById('sc');c.innerHTML='';S.forEach((s,i)=>{const d=document.createElement('div');d.className='slide'+(i===0?' active':'');d.id='s'+i;if(s.t==='c')d.innerHTML=s.h;else if(s.t==='q'&&s.r)d.innerHTML=s.r(i);else d.innerHTML='<div class="card" style="max-width:480px;"><div class="title">🎉</div></div>';c.appendChild(d);});updNav();}

// === BINGO ===
let bingo={};
function initBingo(i){
  if(bingo[i])return;
  const answers=[2,3,4,5,6,7,8,9,1];
  const qs=answers.map(a=>{const b=Math.floor(Math.random()*(a))+1;return{a:b,b:a-b,ans:a};});
  bingo[i]={qs,grid:answers,done:new Set(),qi:0};
  const bg=document.getElementById('bg'+i);
  bg.innerHTML=answers.map((a,j)=>`<div class="bcell" id="bc${i}_${j}">${a}</div>`).join('');
  nextBQ(i);
}
function nextBQ(i){
  const d=bingo[i];
  if(d.done.size>=9){document.getElementById('f'+i).innerHTML=`<span class="ok">🎉 빙고 완성! 대단해요!</span>`;ps('correct');score+=30;return;}
  // Find next unanswered
  let qi=d.qi;while(d.done.has(qi)&&qi<9)qi++;
  if(qi>=9){document.getElementById('f'+i).innerHTML=`<span class="ok">🎉 빙고 완성!</span>`;return;}
  d.qi=qi;
  const q=d.qs[qi];
  document.getElementById('bq'+i).textContent=`${q.a} + ${q.b} = ?`;
  const choices=[q.ans-1,q.ans,q.ans+1,q.ans+2].filter(n=>n>=0&&n<=9).sort(()=>Math.random()-.5);
  document.getElementById('b'+i).innerHTML=choices.map(n=>`<button class="b" onclick="ansBingo(${i},${n},${q.ans})">${n}</button>`).join('');
}
function ansBingo(i,v,c){
  ps('click');const d=bingo[i];
  if(v===c){
    d.done.add(d.qi);
    const cell=document.getElementById('bc'+i+'_'+d.qi);
    cell.classList.add('done');ps('correct');combo++;if(combo>maxCombo)maxCombo=combo;
    // Check bingo lines
    const lines=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    const hasBingo=lines.some(l=>l.every(j=>d.done.has(j)));
    if(hasBingo){document.getElementById('f'+i).innerHTML=`<span class="ok">🎯 빙고! 한 줄 완성!</span>`;score+=30;}
    d.qi++;nextBQ(i);
  }else{ps('wrong');combo=0;document.getElementById('f'+i).innerHTML=`<span class="no">다시 계산!</span>`;}
}

// === CARD MATCH ===
let match={};
function initMatch(i){
  if(match[i])return;
  const pairs=[{eq:'2+3',v:5},{eq:'1+4',v:5},{eq:'7−2',v:5},{eq:'9−4',v:5},{eq:'3+3',v:6},{eq:'8−2',v:6},{eq:'1+5',v:6},{eq:'9−3',v:6}];
  // Shuffle
  const shuffled=pairs.sort(()=>Math.random()-.5);
  match[i]={cards:shuffled,flipped:[],matched:new Set(),turns:0};
  const mg=document.getElementById('mg'+i);
  mg.innerHTML=shuffled.map((c,j)=>`<div class="mcard" id="mc${i}_${j}" onclick="flipCard(${i},${j})">${c.eq}</div>`).join('');
}
function flipCard(i,j){
  const m=match[i];
  if(m.matched.has(j)||m.flipped.includes(j)||m.flipped.length>=2)return;
  ps('click');
  const el=document.getElementById('mc'+i+'_'+j);
  el.classList.add('flip');
  m.flipped.push(j);
  if(m.flipped.length===2){
    m.turns++;
    document.getElementById('mt'+i).textContent=`뒤집기: ${m.turns}`;
    const[a,b]=m.flipped;
    if(m.cards[a].v===m.cards[b].v){
      m.matched.add(a);m.matched.add(b);
      document.getElementById('mc'+i+'_'+a).classList.add('matched');
      document.getElementById('mc'+i+'_'+b).classList.add('matched');
      ps('correct');combo++;if(combo>maxCombo)maxCombo=combo;
      m.flipped=[];
      if(m.matched.size===m.cards.length){
        score+=30;
        document.getElementById('f'+i).innerHTML=`<span class="ok">🎉 모든 짝을 찾았어요! (${m.turns}번 뒤집기)</span>`;
      }
    }else{
      ps('wrong');combo=0;
      setTimeout(()=>{
        document.getElementById('mc'+i+'_'+a).classList.remove('flip');
        document.getElementById('mc'+i+'_'+b).classList.remove('flip');
        m.flipped=[];
      },800);
    }
  }
}

// === DICE ===
let dice={};
function initDice(i){if(dice[i])return;dice[i]={total:0,rounds:0,maxRounds:5};}
function rollDice(i){
  const d=dice[i];
  if(d.rounds>=d.maxRounds){document.getElementById('f'+i).innerHTML=`<span class="ok">게임 끝! 총 ${d.total}점!</span>`;return;}
  ps('click');
  const d1=document.getElementById('d1_'+i),d2=document.getElementById('d2_'+i);
  d1.classList.add('rolling');d2.classList.add('rolling');
  setTimeout(()=>{
    const v1=Math.floor(Math.random()*6)+1,v2=Math.floor(Math.random()*6)+1;
    const isAdd=v1>=v2;
    const op=isAdd?'+':'−';
    const a=isAdd?v1:v1+v2;// ensure no negative
    const b=isAdd?v2:v2;
    const ans=isAdd?a+b:a-b;
    d1.textContent=a;d2.textContent=b;d1.classList.remove('rolling');d2.classList.remove('rolling');
    document.getElementById('dop_'+i).textContent=op;
    document.getElementById('da_'+i).textContent='?';
    document.getElementById('rb'+i).style.display='none';
    const choices=[ans-1,ans,ans+1,ans+2].filter(n=>n>=0).sort(()=>Math.random()-.5);
    document.getElementById('b'+i).innerHTML=choices.map(n=>`<button class="b" onclick="ansDice(${i},${n},${ans})">${n}</button>`).join('');
  },600);
}
function ansDice(i,v,c){
  const d=dice[i];ps('click');
  if(v===c){
    ps('correct');d.total+=10;d.rounds++;combo++;if(combo>maxCombo)maxCombo=combo;
    document.getElementById('da_'+i).textContent=c;
    document.getElementById('ds'+i).textContent=`점수: ${d.total} (${d.rounds}/${d.maxRounds})`;
    document.getElementById('b'+i).innerHTML='';
    document.getElementById('rb'+i).style.display='';
    if(d.rounds>=d.maxRounds){score+=d.total;document.getElementById('f'+i).innerHTML=`<span class="ok">🎉 게임 완료! ${d.total}점!</span>`;document.getElementById('rb'+i).style.display='none';}
    else{document.getElementById('f'+i).innerHTML=`<span class="ok">맞았어요! +10점</span>`;}
  }else{ps('wrong');combo=0;document.getElementById('f'+i).innerHTML=`<span class="no">다시 계산!</span>`;}
}

function showResult(){
  const d=document.getElementById('s'+(S.length-1));
  d.innerHTML=`<div class="card" style="max-width:480px;">
  <div style="font-size:32px;color:var(--primary);margin-bottom:8px;">🎮 게임 완료!</div>
  <div style="font-size:56px;color:var(--primary);">${score}<span style="font-size:24px;color:var(--subtext);"> 점</span></div>
  ${maxCombo>1?`<div class="combo">🔥 최대 콤보 x${maxCombo}</div>`:''}
  <div style="font-size:22px;margin:12px 0;">재미있게 놀면서 연산을 연습했어요!</div>
  <div style="font-size:20px;color:var(--subtext);">3단원 덧셈과 뺄셈 완료! 🎉</div>
  <button class="b bs" style="margin-top:16px;background:var(--primary);color:#fff;border-color:var(--primary);" onclick="location.reload()">다시 놀기 🔄</button></div>`;
}

function updNav(){document.getElementById('prevBtn').disabled=(cur===0);document.getElementById('nextBtn').textContent=cur===S.length-2?'결과 보기 🏆':'다음 ▶';document.getElementById('pi').textContent=`${cur+1} / ${S.length}`;}
function go(n){if(n<0||n>=S.length)return;document.getElementById('s'+cur).classList.remove('active');document.getElementById('s'+cur).classList.add('exit');cur=n;setTimeout(()=>{document.querySelectorAll('.slide').forEach(s=>s.classList.remove('exit'));document.getElementById('s'+cur).classList.add('active');updNav();if(cur===1)initBingo(cur);if(cur===2)initMatch(cur);if(cur===3)initDice(cur);if(S[cur].t==='result')showResult();},200);}
function prev(){go(cur-1);}function next(){go(cur+1);}
let tx=0;document.addEventListener('touchstart',e=>{tx=e.changedTouches[0].screenX;},{passive:true});document.addEventListener('touchend',e=>{const d=e.changedTouches[0].screenX-tx;if(Math.abs(d)>50){d>0?prev():next();}},{passive:true});
render();
</script>
</body>
</html>
