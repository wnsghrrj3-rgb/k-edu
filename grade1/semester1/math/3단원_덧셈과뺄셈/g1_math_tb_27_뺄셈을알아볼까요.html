<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>뺄셈을 알아볼까요 - K✦edu</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Nunito:wght@800&display=swap" rel="stylesheet">
<style>
:root{--bg:#F0FDFA;--card:#FFFFFF;--primary:#26A69A;--primary-light:#E0F2F1;--secondary:#4DB6AC;--green:#4CAF50;--green-light:#E8F5E9;--red:#F44336;--red-light:#FFEBEE;--yellow:#FFC107;--yellow-light:#FFF8E1;--text:#333;--subtext:#888;--border:#D0E8E4;--shadow:0 4px 16px rgba(0,0,0,0.08);--radius:20px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Jua',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh;width:100vw;user-select:none;-webkit-user-select:none;}
.logo{display:flex;align-items:center;gap:2px;position:fixed;top:12px;left:16px;z-index:999;}.logo span:first-child{font-family:'Nunito',sans-serif;font-weight:800;font-size:20px;color:#1D4ED8;}.logo span:nth-child(2){font-size:10px;color:#F59E0B;}.logo span:last-child{font-family:'Nunito',sans-serif;font-weight:800;font-size:20px;color:#333;}
.sound-btn{position:fixed;top:12px;right:16px;z-index:999;background:var(--primary-light);border:none;border-radius:50%;width:40px;height:40px;font-size:20px;cursor:pointer;}
.slide{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px 80px;opacity:0;pointer-events:none;transition:opacity .4s,transform .4s;transform:translateX(60px);}
.slide.active{opacity:1;pointer-events:auto;transform:translateX(0);}.slide.exit{opacity:0;transform:translateX(-60px);}
.slide-title{font-size:28px;color:var(--primary);margin-bottom:8px;text-align:center;}
.badge{display:inline-block;background:var(--yellow-light);color:#F57F17;padding:4px 14px;border-radius:20px;font-size:16px;margin-bottom:10px;}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;width:100%;max-width:560px;text-align:center;}
.char-row{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:12px;}
.char-img{width:56px;height:56px;border-radius:50%;}
.speech{background:var(--primary-light);border-radius:16px;padding:12px 18px;font-size:22px;max-width:380px;text-align:left;position:relative;}.speech::before{content:'';position:absolute;left:-10px;top:18px;border:8px solid transparent;border-right-color:var(--primary-light);}
.btn-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:14px;}
.btn{padding:10px 24px;border-radius:16px;border:3px solid var(--border);background:var(--card);font-family:'Jua',sans-serif;font-size:48px;cursor:pointer;transition:all .2s;min-width:64px;}
.btn:hover{border-color:var(--primary);background:var(--primary-light);}
.btn.correct{background:var(--green-light)!important;border-color:var(--green)!important;animation:pop .3s;}
.btn.wrong{background:var(--red-light)!important;border-color:var(--red)!important;animation:shake .4s;}
.btn-sm{font-size:26px;padding:8px 18px;}
.blank{display:inline-flex;align-items:center;justify-content:center;width:64px;height:64px;border:4px dashed var(--primary);border-radius:14px;font-size:48px;color:var(--primary);background:var(--primary-light);margin:0 4px;transition:all .3s;vertical-align:middle;}
.blank.filled{border-style:solid;background:var(--green-light);border-color:var(--green);color:var(--green);}
.blank-sm{width:52px;height:52px;font-size:36px;border-width:3px;}
.eq-row{display:flex;align-items:center;justify-content:center;gap:8px;margin:14px 0;font-size:52px;flex-wrap:wrap;}
.feedback{margin-top:12px;font-size:22px;min-height:30px;text-align:center;}.ok{color:var(--green);}.no{color:var(--red);}
.cube{width:38px;height:38px;border-radius:9px;display:inline-flex;align-items:center;justify-content:center;font-size:20px;transition:all .3s;}
.c1{background:#FFCDD2;border:2px solid #EF9A9A;}.c2{background:#E0E0E0;border:2px solid #BDBDBD;}
.cube.crossed{opacity:.3;text-decoration:line-through;transform:scale(.8);}
.sym{display:inline-flex;align-items:center;justify-content:center;width:56px;height:56px;border-radius:50%;font-size:36px;font-weight:bold;margin:0 6px;}
.sym-minus{background:#FFEBEE;color:#C62828;border:3px solid #EF9A9A;}
.sym-eq{background:#E3F2FD;color:#1565C0;border:3px solid #90CAF9;}
.scene{background:linear-gradient(135deg,#E0F7FA,#FFF9C4);border-radius:20px;padding:16px;margin:10px 0;font-size:44px;display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;min-height:70px;}
.ox-btn{width:80px;height:80px;border-radius:50%;font-size:40px;border:4px solid var(--border);background:var(--card);cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;}
.ox-btn.correct{border-color:var(--green);background:var(--green-light);}.ox-btn.wrong{border-color:var(--red);background:var(--red-light);}
.num-card{display:inline-flex;align-items:center;justify-content:center;width:58px;height:72px;border:3px solid var(--border);border-radius:14px;font-size:42px;background:var(--card);cursor:pointer;transition:all .2s;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.num-card:hover{border-color:var(--primary);transform:translateY(-3px);}
.num-card.sel{border-color:var(--primary);background:var(--primary-light);}
.num-card.correct{border-color:var(--green);background:var(--green-light);}
.num-card.wrong{border-color:var(--red);background:var(--red-light);}
.nav{position:fixed;bottom:20px;left:0;right:0;display:flex;justify-content:center;gap:16px;z-index:100;}
.nav-btn{padding:10px 28px;border-radius:30px;border:none;font-family:'Jua',sans-serif;font-size:22px;cursor:pointer;}
.nav-prev{background:var(--card);color:var(--text);border:2px solid var(--border);}.nav-next{background:var(--primary);color:#fff;}
.nav-btn:disabled{opacity:.4;cursor:default;}
.page-info{position:fixed;bottom:6px;left:50%;transform:translateX(-50%);font-size:16px;color:var(--subtext);}
.combo-badge{display:inline-block;background:linear-gradient(135deg,#FF6B6B,#FFE66D);color:#fff;padding:6px 18px;border-radius:20px;font-size:20px;margin:6px 0;}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.12)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
</style>
</head>

function ps(t){if(!soundOn)return;initA();audioCtx.resume().then(()=>{const n=audioCtx.currentTime;if(t==='correct'){[523,659,784].forEach((f,i)=>{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(.15,n+i*.12);g.gain.exponentialRampToValueAtTime(.01,n+i*.12+.2);o.connect(g);g.connect(audioCtx.destination);o.start(n+i*.12);o.stop(n+i*.12+.2);});}else if(t==='wrong'){[220,196].forEach((f,i)=>{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sawtooth';o.frequency.value=f;g.gain.setValueAtTime(.1,n+i*.15);g.gain.exponentialRampToValueAtTime(.01,n+i*.15+.2);o.connect(g);g.connect(audioCtx.destination);o.start(n+i*.15);o.stop(n+i*.15+.2);});}else{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sine';o.frequency.value=880;g.gain.setValueAtTime(.08,n);g.gain.exponentialRampToValueAtTime(.01,n+.08);o.connect(g);g.connect(audioCtx.destination);o.start(n);o.stop(n+.08);}});}

S.push({t:'q',sc:25,done:false,r(i){return`<div class="badge">${stars(25)}</div>
<div class="slide-title">이야기를 식으로!</div><div class="card">
  <div class="char-row"><img src="${DEW}" class="char-img" alt="듀">
    <div class="speech" style="font-size:20px;">풍선 8개가 있었어요. 5개가 터졌어요. 남은 풍선은 몇 개?</div>
  </div>
  <div class="btn-row">
    <button class="btn btn-sm" onclick="chk(${i},this,0,0)">8 − 5 = 3</button>
    <button class="btn btn-sm" onclick="chk(${i},this,1,0)">8 + 5 = 13</button>
    <button class="btn btn-sm" onclick="chk(${i},this,2,0)">5 − 3 = 2</button>
  </div>
  <div class="feedback" id="f${i}"></div>
</div>`;}});

// Q8: 그림→식 카드 매칭 ⭐⭐
S.push({t:'q',sc:25,done:false,r(i){return`<div class="badge">${stars(25)}</div>
<div class="slide-title">그림에 맞는 식 고르기</div><div class="card">
  <div style="display:flex;gap:4px;justify-content:center;margin-bottom:8px;">
    <span class="cube c1">■</span><span class="cube c1">■</span><span class="cube c1">■</span><span class="cube c1">■</span><span class="cube c1">■</span>
    <span class="cube c2 crossed">✕</span><span class="cube c2 crossed">✕</span><span class="cube c2 crossed">✕</span><span class="cube c2 crossed">✕</span>
  </div>
  <div style="font-size:20px;margin-bottom:10px;">전체 9개에서 4개를 빼면?</div>
  <div class="btn-row">
    <button class="btn btn-sm" onclick="chk(${i},this,0,0)">9 − 4 = 5</button>
    <button class="btn btn-sm" onclick="chk(${i},this,1,0)">9 − 5 = 4</button>
    <button class="btn btn-sm" onclick="chk(${i},this,2,0)">9 − 4 = 6</button>
  </div>
  <div class="feedback" id="f${i}"></div>
</div>`;}});

// Q9: 역방향 - □ 찾기 ⭐⭐
S.push({t:'q',sc:25,done:false,r(i){return`<div class="badge">${stars(25)}</div>
<div class="slide-title">빈칸 역추론 🔍</div><div class="card">
  <div class="eq-row"><span>7</span><span style="color:#C62828;">−</span><div class="blank blank-sm" id="bl${i}">?</div><span style="color:#1565C0;">=</span><span>4</span></div>
  <div style="font-size:20px;color:var(--subtext);margin:6px 0;">□에 알맞은 수는?</div>
  <div class="btn-row">${[2,3,4,1].map(n=>`<button class="btn" onclick="chkB(${i},this,${n},3)">${n}</button>`).join('')}</div>
  <div class="feedback" id="f${i}"></div>
</div>`;}});

// Q10: 종합 - 덧셈 vs 뺄셈 구분 ⭐⭐⭐
S.push({t:'q',sc:50,done:false,r(i){return`<div class="badge">${stars(50)}</div>
<div class="slide-title">덧셈일까? 뺄셈일까? 🧠</div><div class="card">
  <div style="font-size:20px;margin-bottom:8px;">각 이야기에 맞는 식을 골라요!</div>
  <div id="mix${i}"></div>
  <div class="feedback" id="f${i}"></div>
</div>`;}});

S.push({t:'result'});

function render(){const c=document.getElementById('sc');c.innerHTML='';S.forEach((s,i)=>{const d=document.createElement('div');d.className='slide'+(i===0?' active':'');d.id='s'+i;if(s.t==='c')d.innerHTML=s.h;else if(s.t==='q'&&s.r)d.innerHTML=s.r(i);else d.innerHTML='<div class="card" style="max-width:480px;"><div class="slide-title">🎉</div></div>';c.appendChild(d);});updNav();}

function chk(i,el,v,c){const s=S[i];if(s.done)return;ps('click');if(v===c){s.done=true;el.classList.add('correct');ps('correct');combo++;if(combo>maxCombo)maxCombo=combo;score+=s.sc;document.getElementById('f'+i).innerHTML=`<span class="ok">🎉 정답! +${s.sc}점 ${combo>1?'🔥x'+combo:''}</span>`;}else{el.classList.add('wrong');ps('wrong');combo=0;setTimeout(()=>el.classList.remove('wrong'),500);document.getElementById('f'+i).innerHTML=`<span class="no">다시 생각해 보세요!</span>`;}}

function chkB(i,el,v,c){const s=S[i];if(s.done)return;ps('click');const bl=document.getElementById('bl'+i);if(v===c){s.done=true;bl.textContent=c;bl.classList.add('filled');el.classList.add('correct');ps('correct');combo++;if(combo>maxCombo)maxCombo=combo;score+=s.sc;document.getElementById('f'+i).innerHTML=`<span class="ok">🎉 맞았어요! +${s.sc}점</span>`;}else{el.classList.add('wrong');ps('wrong');combo=0;setTimeout(()=>el.classList.remove('wrong'),500);document.getElementById('f'+i).innerHTML=`<span class="no">다시 풀어 보세요!</span>`;}}

function chkSym(i,el,v,c){const s=S[i];if(s.done)return;ps('click');const bl=document.getElementById('bl'+i);if(v===c){s.done=true;bl.textContent='−';bl.classList.add('filled');el.classList.add('correct');ps('correct');combo++;if(combo>maxCombo)maxCombo=combo;score+=s.sc;document.getElementById('f'+i).innerHTML=`<span class="ok">🎉 −는 빼기! +${s.sc}점</span>`;}else{el.classList.add('wrong');ps('wrong');combo=0;setTimeout(()=>el.classList.remove('wrong'),500);document.getElementById('f'+i).innerHTML=`<span class="no">덜어낼 때 쓰는 기호를 골라요!</span>`;}}

function chkOX(i,el,isX){const s=S[i];if(s.done)return;ps('click');if(isX){s.done=true;el.classList.add('correct');ps('correct');combo++;if(combo>maxCombo)maxCombo=combo;score+=s.sc;document.getElementById('f'+i).innerHTML=`<span class="ok">🎉 5−2=3이에요! +${s.sc}점</span>`;}else{el.classList.add('wrong');ps('wrong');combo=0;setTimeout(()=>el.classList.remove('wrong'),500);document.getElementById('f'+i).innerHTML=`<span class="no">5−2를 다시 계산해 보세요!</span>`;}}

// Q5: Multi-step
function initStep(i){const s=S[i];if(s.si)return;s.si=true;s.step=0;renderStep(i);}
function renderStep(i){const s=S[i],b=document.getElementById('b'+i);if(s.step===0)b.innerHTML=[6,7,8,5].map(n=>`<button class="btn" onclick="doStep(${i},this,${n},7)">${n}</button>`).join('');else if(s.step===1)b.innerHTML=[2,3,4,5].map(n=>`<button class="btn" onclick="doStep(${i},this,${n},3)">${n}</button>`).join('');else b.innerHTML=[3,4,5,6].map(n=>`<button class="btn" onclick="doStep(${i},this,${n},4)">${n}</button>`).join('');}
function doStep(i,el,v,c){const s=S[i];if(s.done)return;ps('click');if(v===c){el.classList.add('correct');if(s.step===0){document.getElementById('s1_'+i).textContent='7';document.getElementById('s1_'+i).classList.add('filled');}else if(s.step===1){document.getElementById('s2_'+i).textContent='3';document.getElementById('s2_'+i).classList.add('filled');}else{document.getElementById('s3_'+i).textContent='4';document.getElementById('s3_'+i).classList.add('filled');s.done=true;ps('correct');combo++;if(combo>maxCombo)maxCombo=combo;score+=s.sc;document.getElementById('f'+i).innerHTML=`<span class="ok">🎉 7 − 3 = 4! +${s.sc}점</span>`;return;}s.step++;setTimeout(()=>renderStep(i),400);}else{el.classList.add('wrong');ps('wrong');combo=0;setTimeout(()=>el.classList.remove('wrong'),500);document.getElementById('f'+i).innerHTML=`<span class="no">그림을 다시 세어 보세요!</span>`;}}

// Q10: Mix quiz
let mixD={};
function initMix(i){
  if(mixD[i])return;
  mixD[i]={qs:[
    {story:'연필 3자루가 있어요. 2자루를 더 받았어요.',opts:['3 + 2 = 5','3 − 2 = 1'],ans:0},
    {story:'새 6마리 중 4마리가 날아갔어요.',opts:['6 + 4 = 10','6 − 4 = 2'],ans:1},
    {story:'사탕 5개에서 1개를 먹었어요.',opts:['5 − 1 = 4','5 + 1 = 6'],ans:0}
  ],ci:0};
  renderMix(i);
}
function renderMix(i){
  const d=mixD[i];
  if(d.ci>=d.qs.length){S[i].done=true;ps('correct');combo++;if(combo>maxCombo)maxCombo=combo;score+=S[i].sc;document.getElementById('f'+i).innerHTML=`<span class="ok">🎉 모두 맞았어요! +${S[i].sc}점</span>`;return;}
  const q=d.qs[d.ci];
  document.getElementById('mix'+i).innerHTML=`<div style="font-size:22px;margin:8px 0;">(${d.ci+1}/${d.qs.length}) ${q.story}</div>
    <div class="btn-row">${q.opts.map((o,j)=>`<button class="btn btn-sm" onclick="ansMix(${i},this,${j},${q.ans})">${o}</button>`).join('')}</div>`;
}
function ansMix(i,el,v,c){
  ps('click');
  if(v===c){el.classList.add('correct');mixD[i].ci++;setTimeout(()=>renderMix(i),500);}
  else{el.classList.add('wrong');ps('wrong');combo=0;setTimeout(()=>el.classList.remove('wrong'),500);document.getElementById('f'+i).innerHTML=`<span class="no">"더 받았다"는 덧셈, "빼거나 줄었다"는 뺄셈!</span>`;}
}

function showResult(){const d=document.getElementById('s'+(S.length-1));const total=S.filter(s=>s.t==='q').reduce((a,s)=>a+s.sc,0);const pct=Math.round(score/total*100);let msg=pct>=90?'🏆 뺄셈 박사!':pct>=70?'👏 잘했어요!':pct>=50?'💪 좋은 시작!':'🌱 다시 도전!';d.innerHTML=`<div class="card" style="max-width:480px;"><div style="font-size:32px;color:var(--primary);margin-bottom:8px;">🎉 학습 완료!</div><div style="font-size:64px;color:var(--primary);">${score}<span style="font-size:28px;color:var(--subtext);">/${total}</span></div><div style="font-size:28px;margin:8px 0;">${msg}</div>${maxCombo>1?`<div class="combo-badge">🔥 최대 콤보 x${maxCombo}</div>`:''}<div style="font-size:20px;color:var(--subtext);margin-top:12px;">−와 = 기호를 배우고 뺄셈식을 읽고 쓸 수 있게 되었어요!<br>다음에는 직접 뺄셈을 풀어 봐요!</div><button class="btn" style="font-size:24px;margin-top:16px;padding:10px 28px;background:var(--primary);color:#fff;border-color:var(--primary);" onclick="location.reload()">다시 하기 🔄</button></div>`;}

function updNav(){document.getElementById('prevBtn').disabled=(cur===0);document.getElementById('nextBtn').textContent=cur===S.length-2?'결과 보기 🏆':'다음 ▶';document.getElementById('pi').textContent=`${cur+1} / ${S.length}`;}
function go(n){if(n<0||n>=S.length)return;document.getElementById('s'+cur).classList.remove('active');document.getElementById('s'+cur).classList.add('exit');cur=n;setTimeout(()=>{document.querySelectorAll('.slide').forEach(s=>s.classList.remove('exit'));document.getElementById('s'+cur).classList.add('active');updNav();if(cur===8)initStep(cur);if(cur===13)initMix(cur);if(S[cur].t==='result')showResult();},200);}
function prev(){go(cur-1);}function next(){go(cur+1);}
let tx=0;document.addEventListener('touchstart',e=>{tx=e.changedTouches[0].screenX;},{passive:true});document.addEventListener('touchend',e=>{const d=e.changedTouches[0].screenX-tx;if(Math.abs(d)>50){d>0?prev():next();}},{passive:true});
render();
</script>
</body>
</html>
