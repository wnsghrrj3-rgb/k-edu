<style>
:root{
  --bg:#F0FDFA;--card:#FFFFFF;--primary:#26A69A;--primary-light:#E0F2F1;
  --secondary:#4DB6AC;--green:#4CAF50;--green-light:#E8F5E9;
  --red:#F44336;--red-light:#FFEBEE;--yellow:#FFC107;--yellow-light:#FFF8E1;
  --text:#333;--subtext:#888;--border:#D0E8E4;--shadow:0 4px 16px rgba(0,0,0,0.08);--radius:20px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Jua',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh;width:100vw;user-select:none;-webkit-user-select:none;}
.logo{display:flex;align-items:center;gap:2px;position:fixed;top:12px;left:16px;z-index:999;}
.logo span:first-child{font-family:'Nunito',sans-serif;font-weight:800;font-size:20px;color:#1D4ED8;}
.logo span:nth-child(2){font-size:10px;color:#F59E0B;}
.logo span:last-child{font-family:'Nunito',sans-serif;font-weight:800;font-size:20px;color:#333;}
.sound-btn{position:fixed;top:12px;right:16px;z-index:999;background:var(--primary-light);border:none;border-radius:50%;width:40px;height:40px;font-size:20px;cursor:pointer;}
.slide-container{width:100%;height:100vh;position:relative;overflow:hidden;}
.slide{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px 80px;opacity:0;pointer-events:none;transition:opacity 0.4s,transform 0.4s;transform:translateX(60px);}
.slide.active{opacity:1;pointer-events:auto;transform:translateX(0);}
.slide.exit{opacity:0;transform:translateX(-60px);}
.slide-title{font-size:28px;color:var(--primary);margin-bottom:8px;text-align:center;}
.slide-sub{font-size:22px;color:var(--text);margin-bottom:16px;text-align:center;}
.badge{display:inline-block;background:var(--yellow-light);color:#F57F17;padding:4px 14px;border-radius:20px;font-size:16px;margin-bottom:10px;}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;width:100%;max-width:560px;text-align:center;}
.char-row{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:12px;}
.char-img{width:56px;height:56px;border-radius:50%;}
.speech{background:var(--primary-light);border-radius:16px;padding:12px 18px;font-size:22px;max-width:380px;text-align:left;position:relative;}
.speech::before{content:'';position:absolute;left:-10px;top:18px;border:8px solid transparent;border-right-color:var(--primary-light);}
.cubes-area{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:12px 0;}
.cube{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;transition:transform 0.2s,box-shadow 0.2s;border:3px solid transparent;}
.cube.c1{background:#FFCDD2;border-color:#EF9A9A;}
.cube.c2{background:#C8E6C9;border-color:#A5D6A7;}
.cube.c3{background:#BBDEFB;border-color:#90CAF9;}
.cube.c4{background:#FFE0B2;border-color:#FFCC80;}
.cube.selected{transform:scale(1.15);box-shadow:0 0 12px rgba(38,166,154,0.5);border-color:var(--primary);}
.cube.locked{opacity:0.6;cursor:default;}
.btn-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:14px;}
.btn{padding:12px 28px;border-radius:16px;border:3px solid var(--border);background:var(--card);font-family:'Jua',sans-serif;font-size:48px;cursor:pointer;transition:all 0.2s;min-width:70px;}
.btn:hover{border-color:var(--primary);background:var(--primary-light);}
.btn.correct{background:var(--green-light)!important;border-color:var(--green)!important;animation:pop 0.3s;}
.btn.wrong{background:var(--red-light)!important;border-color:var(--red)!important;animation:shake 0.4s;}
.btn.selected-ans{border-color:var(--primary);background:var(--primary-light);}
.big-num{font-size:220px;color:var(--primary);line-height:1;}
.plus-sign{font-size:72px;color:var(--secondary);}
.eq-sign{font-size:72px;color:var(--text);}
.blank-box{display:inline-flex;align-items:center;justify-content:center;width:80px;height:80px;border:4px dashed var(--primary);border-radius:16px;font-size:72px;color:var(--primary);background:var(--primary-light);margin:0 6px;transition:all 0.3s;}
.blank-box.filled{border-style:solid;background:var(--green-light);border-color:var(--green);color:var(--green);}
.equation-row{display:flex;align-items:center;justify-content:center;gap:10px;margin:14px 0;font-size:52px;}
.feedback{margin-top:12px;font-size:22px;min-height:30px;text-align:center;}
.feedback.ok{color:var(--green);}
.feedback.no{color:var(--red);}
.ten-frame{display:grid;grid-template-columns:repeat(5,48px);grid-template-rows:repeat(2,48px);gap:4px;justify-content:center;margin:12px 0;}
.ten-cell{width:48px;height:48px;border:3px solid var(--border);border-radius:10px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:28px;cursor:pointer;transition:all 0.2s;}
.ten-cell.filled{background:var(--primary-light);border-color:var(--primary);}
.ten-cell.filled2{background:#FFE0B2;border-color:#FFCC80;}
.nav{position:fixed;bottom:20px;left:0;right:0;display:flex;justify-content:center;gap:16px;z-index:100;}
.nav-btn{padding:10px 28px;border-radius:30px;border:none;font-family:'Jua',sans-serif;font-size:22px;cursor:pointer;transition:all 0.2s;}
.nav-prev{background:var(--card);color:var(--text);border:2px solid var(--border);}
.nav-next{background:var(--primary);color:#fff;}
.nav-btn:disabled{opacity:0.4;cursor:default;}
.page-info{position:fixed;bottom:6px;left:50%;transform:translateX(-50%);font-size:16px;color:var(--subtext);}
.split-area{display:flex;align-items:center;gap:16px;justify-content:center;margin:12px 0;}
.group-box{min-width:100px;min-height:80px;border:3px dashed var(--border);border-radius:16px;padding:10px;display:flex;gap:6px;flex-wrap:wrap;align-items:center;justify-content:center;transition:all 0.3s;}
.group-box.highlight{border-color:var(--primary);background:var(--primary-light);}
.arrow-split{font-size:36px;color:var(--primary);}
.result-card{text-align:center;}
.result-score{font-size:64px;color:var(--primary);margin:8px 0;}
.result-msg{font-size:28px;margin:8px 0;}
.result-detail{font-size:20px;color:var(--subtext);}
.combo-badge{display:inline-block;background:linear-gradient(135deg,#FF6B6B,#FFE66D);color:#fff;padding:6px 18px;border-radius:20px;font-size:20px;margin:6px 0;}
.ox-btn{width:80px;height:80px;border-radius:50%;font-size:40px;border:4px solid var(--border);background:var(--card);cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;}
.ox-btn:hover{transform:scale(1.1);}
.ox-btn.correct{border-color:var(--green);background:var(--green-light);}
.ox-btn.wrong{border-color:var(--red);background:var(--red-light);}
.drag-zone{min-height:60px;border:3px dashed var(--border);border-radius:16px;padding:8px;display:flex;gap:6px;flex-wrap:wrap;align-items:center;justify-content:center;transition:all 0.3s;}
.drag-zone.over{border-color:var(--primary);background:var(--primary-light);}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.12)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.anim-in{animation:fadeInUp 0.5s ease;}
.bounce{animation:bounce 0.6s;}
</style>
</head>

let audioCtx,soundOn=true,current=0,score=0,combo=0,maxCombo=0,answered=[];
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
function playSound(type){
  if(!soundOn)return;initAudio();
  audioCtx.resume().then(()=>{
    const now=audioCtx.currentTime;
    if(type==='correct'){
      [523,659,784].forEach((f,i)=>{const o=audioCtx.createOscillator();const g=audioCtx.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0.15,now+i*0.12);g.gain.exponentialRampToValueAtTime(0.01,now+i*0.12+0.2);o.connect(g);g.connect(audioCtx.destination);o.start(now+i*0.12);o.stop(now+i*0.12+0.2);});
    }else if(type==='wrong'){
      [220,196].forEach((f,i)=>{const o=audioCtx.createOscillator();const g=audioCtx.createGain();o.type='sawtooth';o.frequency.value=f;g.gain.setValueAtTime(0.1,now+i*0.15);g.gain.exponentialRampToValueAtTime(0.01,now+i*0.15+0.2);o.connect(g);g.connect(audioCtx.destination);o.start(now+i*0.15);o.stop(now+i*0.15+0.2);});
    }else{const o=audioCtx.createOscillator();const g=audioCtx.createGain();o.type='sine';o.frequency.value=880;g.gain.setValueAtTime(0.08,now);g.gain.exponentialRampToValueAtTime(0.01,now+0.08);o.connect(g);g.connect(audioCtx.destination);o.start(now);o.stop(now+0.08);}
  });
}
function toggleSound(){soundOn=!soundOn;document.getElementById('soundBtn').textContent=soundOn?'🔊':'🔇';}

function renderSlides(){
  const c=document.getElementById('slideContainer');
  c.innerHTML='';
  slides.forEach((s,i)=>{
    const d=document.createElement('div');
    d.className='slide'+(i===0?' active':'');
    d.id='slide'+i;
    if(s.type==='concept') d.innerHTML=s.html;
    else if(s.type==='q') d.innerHTML=renderQuestion(s,i);
    else if(s.type==='result') d.innerHTML='<div class="result-card"><div class="slide-title">🎉 학습 완료!</div></div>';
    c.appendChild(d);
  });
  updateNav();
}

function getStars(sc){
  if(sc<=10)return'⭐ 기본';if(sc<=25)return'⭐⭐ 발전';if(sc<=50)return'⭐⭐⭐ 심화';return'⭐⭐⭐⭐ 최심화';
}

// === INTERACTION HANDLERS ===

// Generic button check
function checkBtn(idx,el,val,correct){
  const s=slides[idx];if(s.answered)return;
  playSound('click');
  if(val===correct){
    s.answered=true;el.classList.add('correct');
    playSound('correct');combo++;if(combo>maxCombo)maxCombo=combo;
    score+=s.score;answered[idx]=true;
    document.getElementById('fb'+idx).innerHTML=`<span class="ok">🎉 정답! +${s.score}점 ${combo>1?'🔥x'+combo:''}</span>`;
  }else{
    el.classList.add('wrong');playSound('wrong');combo=0;
    setTimeout(()=>el.classList.remove('wrong'),500);
    document.getElementById('fb'+idx).innerHTML=`<span class="no">다시 생각해 보세요!</span>`;
  }
}

// Blank fill
function checkBlank(idx,el,val,correct){
  const s=slides[idx];if(s.answered)return;
  playSound('click');
  const blank=document.getElementById('blank'+idx);
  if(val===correct){
    s.answered=true;blank.textContent=correct;blank.classList.add('filled');
    el.classList.add('correct');playSound('correct');combo++;if(combo>maxCombo)maxCombo=combo;
    score+=s.score;answered[idx]=true;
    document.getElementById('fb'+idx).innerHTML=`<span class="ok">🎉 맞았어요! +${s.score}점 ${combo>1?'🔥x'+combo:''}</span>`;
  }else{
    el.classList.add('wrong');playSound('wrong');combo=0;
    setTimeout(()=>el.classList.remove('wrong'),500);
    document.getElementById('fb'+idx).innerHTML=`<span class="no">다시 해 보세요!</span>`;
  }
}

// O·X
function checkOX(idx,el,chosen,isCorrect){
  const s=slides[idx];if(s.answered)return;

// Gareugi drag (simplified: click to toggle group)
let gareugiState={};
function moveCubeGareugi(idx,cubeIdx){
  const s=slides[idx];if(s.answered)return;
  playSound('click');
  if(!gareugiState[idx])gareugiState[idx]={};
  const st=gareugiState[idx];
  if(!st[cubeIdx])st[cubeIdx]=1;
  else if(st[cubeIdx]===1)st[cubeIdx]=2;
  else st[cubeIdx]=1;
  
  const g1=document.getElementById('g1_'+idx);
  const g2=document.getElementById('g2_'+idx);
  g1.innerHTML='';g2.innerHTML='';
  let c1=0,c2=0;
  for(let i=0;i<s.total;i++){
    const cube=document.getElementById('gc'+idx+'_'+i);
    if(st[i]===1){g1.innerHTML+='<div class="cube c1" style="width:36px;height:36px;">🟧</div>';c1++;cube.style.opacity='0.3';}
    else if(st[i]===2){g2.innerHTML+='<div class="cube c2" style="width:36px;height:36px;">🟩</div>';c2++;cube.style.opacity='0.3';}
    else{cube.style.opacity='1';}
  }
  document.getElementById('splitInfo'+idx).textContent=`그룹A: ${c1}개 / 그룹B: ${c2}개`;
}

function checkGareugi(idx){
  const s=slides[idx];if(s.answered)return;
  const st=gareugiState[idx]||{};
  let c1=0,c2=0;
  for(let i=0;i<s.total;i++){if(st[i]===1)c1++;else if(st[i]===2)c2++;}
  if(c1+c2===s.total&&c1>0&&c2>0){
    s.answered=true;playSound('correct');combo++;if(combo>maxCombo)maxCombo=combo;
    score+=s.score;answered[idx]=true;
    document.getElementById('fb'+idx).innerHTML=`<span class="ok">🎉 ${s.total}을 ${c1}과 ${c2}로 가르기 성공! +${s.score}점</span>`;
  }else{
    playSound('wrong');combo=0;
    document.getElementById('fb'+idx).innerHTML=`<span class="no">모든 블록을 두 그룹으로 나누세요!</span>`;
  }
}

// Ten frame
let tfState={};
function tapTenFrame(idx,cellIdx){
  const s=slides[idx];if(s.answered)return;
  playSound('click');
  if(!tfState[idx])tfState[idx]={};
  const st=tfState[idx];
  if(!st[cellIdx])st[cellIdx]=1;
  else if(st[cellIdx]===1)st[cellIdx]=2;
  else delete st[cellIdx];
  
  const cell=document.getElementById('tc'+idx+'_'+cellIdx);
  if(st[cellIdx]===1){cell.className='ten-cell filled';cell.textContent='🔴';}
  else if(st[cellIdx]===2){cell.className='ten-cell filled2';cell.textContent='🔵';}
  else{cell.className='ten-cell';cell.textContent='';}
  
  let r=0,b=0;
  for(let k in st){if(st[k]===1)r++;if(st[k]===2)b++;}
  document.getElementById('tfInfo'+idx).textContent=`빨간: ${r} / 파란: ${b}`;
}

function checkTenFrame(idx){
  const s=slides[idx];if(s.answered)return;
  const st=tfState[idx]||{};
  let r=0,b=0;
  for(let k in st){if(st[k]===1)r++;if(st[k]===2)b++;}
  if(r===s.a&&b===s.b){
    s.answered=true;playSound('correct');combo++;if(combo>maxCombo)maxCombo=combo;
    score+=s.score;answered[idx]=true;
    document.getElementById('fb'+idx).innerHTML=`<span class="ok">🎉 ${s.a}과 ${s.b}를 모으면 ${s.a+s.b}! +${s.score}점</span>`;
  }else{
    playSound('wrong');combo=0;
    document.getElementById('fb'+idx).innerHTML=`<span class="no">빨간 ${s.a}개, 파란 ${s.b}개를 채워보세요!</span>`;
  }
}

// Puzzle
let puzzleData={};
function initPuzzle(idx){
  const area=document.getElementById('puzzleArea'+idx);
  if(!area||area.dataset.init)return;
  area.dataset.init='1';
  // 3 mini puzzles
  const puzzles=[
    {q:'2와 3을 모으면?',answer:5,choices:[4,5,6]},
    {q:'8을 가르면 5와?',answer:3,choices:[2,3,4]},
    {q:'□와 4를 모으면 7',answer:3,choices:[2,3,4]}
  ];
  puzzleData[idx]={puzzles,solved:0,total:3};
  renderPuzzleSub(idx);
}

function renderPuzzleSub(idx){
  const pd=puzzleData[idx];
  const area=document.getElementById('puzzleArea'+idx);
  if(pd.solved>=pd.total){
    slides[idx].answered=true;playSound('correct');combo++;if(combo>maxCombo)maxCombo=combo;
    score+=slides[idx].score;answered[idx]=true;
    document.getElementById('fb'+idx).innerHTML=`<span class="ok">🎉 퍼즐 완성! +${slides[idx].score}점</span>`;
    return;
  }
  const p=pd.puzzles[pd.solved];
  area.innerHTML=`<div style="font-size:24px;margin-bottom:12px;">(${pd.solved+1}/${pd.total}) ${p.q}</div>
    <div class="btn-row">${p.choices.map(c=>`<button class="btn" style="font-size:40px;" onclick="checkPuzzle(${idx},this,${c},${p.answer})">${c}</button>`).join('')}</div>`;
}

function checkPuzzle(idx,el,val,correct){
  playSound('click');
  if(val===correct){
    el.classList.add('correct');
    puzzleData[idx].solved++;
    setTimeout(()=>renderPuzzleSub(idx),500);
  }else{
    el.classList.add('wrong');playSound('wrong');combo=0;
    setTimeout(()=>el.classList.remove('wrong'),500);
    document.getElementById('fb'+idx).innerHTML=`<span class="no">다시 생각해 보세요!</span>`;
  }
}

    {text:'6을 3과 □로 가르면?',answer:3,hint:'6 - 3 = ?'},
    {text:'□와 2를 모으면?',answer:5,hint:'3 + 2 = ?'},
    {text:'8을 가르면 5와 □',answer:3,hint:'8 - 5 = ?'}
  ],total:3};
  renderMsStep(idx);
}
function renderMsStep(idx){
  const d=msData[idx],area=document.getElementById('msArea'+idx);
  if(d.step>=d.total){
    slides[idx].answered=true;playSound('correct');combo++;if(combo>maxCombo)maxCombo=combo;
    score+=slides[idx].score;answered[idx]=true;
    document.getElementById('fb'+idx).innerHTML=`<span class="ok">🎉 모든 단계 완료! +${slides[idx].score}점</span>`;
    area.innerHTML='<div style="font-size:28px;margin:12px 0;">🏆 모두 맞혔어요!</div>';
    return;
  }
  const st=d.steps[d.step],ans=st.answer;
  const choices=[ans-1,ans,ans+1,ans+2].filter(n=>n>=0&&n<=9);
  // shuffle
  for(let i=choices.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[choices[i],choices[j]]=[choices[j],choices[i]];}
  area.innerHTML=`<div style="font-size:24px;margin-bottom:12px;">(${d.step+1}/${d.total}) ${st.text}</div>
    <div style="font-size:16px;color:var(--subtext);margin-bottom:10px;">힌트: ${st.hint}</div>
    <div class="btn-row">${choices.map(c=>`<button class="btn" style="font-size:40px;" onclick="stepMs(${idx},this,${c},${ans})">${c}</button>`).join('')}</div>`;
}
function stepMs(idx,el,val,correct){
  playSound('click');
  if(val===correct){
    el.classList.add('correct');msData[idx].step++;
    setTimeout(()=>renderMsStep(idx),500);
  }else{
    el.classList.add('wrong');playSound('wrong');combo=0;
    setTimeout(()=>el.classList.remove('wrong'),500);
    document.getElementById('fb'+idx).innerHTML=`<span class="no">다시 생각해 보세요!</span>`;
  }
}

// speed2 — 속도 챌린지
let spdData={};
function initSpeed2(idx){
  const area=document.getElementById('spdArea'+idx);
  if(!area||area.dataset.init)return;
  area.dataset.init='1';
  spdData[idx]={cur:0,correct:0,total:4,start:Date.now(),
    qs:[
      {text:'2와 5를 모으면?',answer:7,choices:[6,7,8]},
      {text:'9를 가르면 4와?',answer:5,choices:[4,5,6]},
      {text:'1과 6을 모으면?',answer:7,choices:[7,8,9]},
      {text:'7을 가르면 2와?',answer:5,choices:[4,5,6]}
    ]};
  renderSpdQ(idx);
}
function renderSpdQ(idx){
  const d=spdData[idx],area=document.getElementById('spdArea'+idx);
  if(d.cur>=d.total){finishSpd(idx);return;}
  const q=d.qs[d.cur];
  const elapsed=Math.round((Date.now()-d.start)/1000);
  area.innerHTML=`<div style="font-size:18px;color:var(--subtext);margin-bottom:6px;">⏱ ${elapsed}초 | ${d.cur+1}/${d.total}</div>
    <div style="font-size:26px;margin-bottom:14px;">${q.text}</div>
    <div class="btn-row">${q.choices.map(c=>`<button class="btn" style="font-size:40px;" onclick="ansSpd(${idx},this,${c},${q.answer})">${c}</button>`).join('')}</div>`;
}
function ansSpd(idx,el,val,correct){
  playSound('click');
  const d=spdData[idx];
  if(val===correct){el.classList.add('correct');d.correct++;d.cur++;setTimeout(()=>renderSpdQ(idx),400);}
  else{el.classList.add('wrong');playSound('wrong');combo=0;setTimeout(()=>{el.classList.remove('wrong');},400);}
}
function finishSpd(idx){
  const d=spdData[idx],elapsed=Math.round((Date.now()-d.start)/1000);
  const area=document.getElementById('spdArea'+idx);
  if(d.correct===d.total){
    slides[idx].answered=true;playSound('correct');combo++;if(combo>maxCombo)maxCombo=combo;
    score+=slides[idx].score;answered[idx]=true;
    area.innerHTML=`<div style="font-size:28px;">🏆 ${d.total}문제 모두 정답!</div><div style="font-size:22px;color:var(--subtext);">⏱ ${elapsed}초</div>`;
    document.getElementById('fb'+idx).innerHTML=`<span class="ok">🎉 완벽! +${slides[idx].score}점</span>`;
  }else{
    area.innerHTML=`<div style="font-size:24px;">${d.correct}/${d.total} 정답 (⏱ ${elapsed}초)</div>
      <button class="btn" style="font-size:22px;margin-top:12px;padding:8px 20px;" onclick="retrySpdQ(${idx})">다시 도전 🔄</button>`;
    document.getElementById('fb'+idx).innerHTML=`<span class="no">모두 맞혀야 통과!</span>`;
  }
}
function retrySpdQ(idx){spdData[idx].cur=0;spdData[idx].correct=0;spdData[idx].start=Date.now();renderSpdQ(idx);document.getElementById('fb'+idx).innerHTML='';}

// story_build2 — 이야기 만들기
let sbData={};
function initStoryBuild2(idx){
  const area=document.getElementById('sbArea'+idx);
  if(!area||area.dataset.init)return;
  area.dataset.init='1';
  sbData[idx]={step:0,vals:[]};
  renderSbStep(idx);
}
function renderSbStep(idx){
  const d=sbData[idx],area=document.getElementById('sbArea'+idx);
  if(d.step===0){
    area.innerHTML=`<div class="char-row"><img src="${KAY}" class="char-img" alt="케이">
      <div class="speech" style="font-size:20px;">케이가 사탕을 가지고 있어요. 몇 개일까요?</div></div>
      <div class="btn-row" style="margin-top:14px;">${[3,4,5].map(n=>`<button class="btn" style="font-size:36px;" onclick="sbStep(${idx},${n})">${n}개</button>`).join('')}</div>`;
  }else if(d.step===1){
    const v1=d.vals[0];
    area.innerHTML=`<div class="char-row"><img src="${DEW}" class="char-img" alt="듀">
      <div class="speech" style="font-size:20px;">듀가 사탕을 더 가져왔어요! 몇 개?</div></div>
      <div style="font-size:20px;margin:8px 0;">케이: ${v1}개 🍬</div>
      <div class="btn-row" style="margin-top:10px;">${[2,3,4].map(n=>`<button class="btn" style="font-size:36px;" onclick="sbStep(${idx},${n})">${n}개</button>`).join('')}</div>`;
  }else if(d.step===2){
    const v1=d.vals[0],v2=d.vals[1],total=v1+v2;
    area.innerHTML=`<div style="font-size:22px;margin-bottom:10px;">케이 ${v1}개 + 듀 ${v2}개 = 모두 몇 개?</div>
      <div class="btn-row">${[total-1,total,total+1].map(n=>`<button class="btn" style="font-size:40px;" onclick="sbFinal(${idx},this,${n},${total})">${n}</button>`).join('')}</div>`;
  }
}
function sbStep(idx,val){
  playSound('click');sbData[idx].vals.push(val);sbData[idx].step++;renderSbStep(idx);
}
function sbFinal(idx,el,val,correct){
  const s=slides[idx];if(s.answered)return;
  playSound('click');
  if(val===correct){
    s.answered=true;el.classList.add('correct');playSound('correct');combo++;if(combo>maxCombo)maxCombo=combo;
    score+=s.score;answered[idx]=true;
    const d=sbData[idx];
    document.getElementById('sbArea'+idx).innerHTML=`<div style="font-size:24px;margin:12px 0;">📖 케이 ${d.vals[0]}개 + 듀 ${d.vals[1]}개 = <b>${correct}개!</b></div>
      <div style="font-size:20px;color:var(--subtext);">멋진 이야기를 만들었어요!</div>`;
    document.getElementById('fb'+idx).innerHTML=`<span class="ok">🎉 이야기 완성! +${s.score}점</span>`;
  }else{
    el.classList.add('wrong');playSound('wrong');combo=0;
    setTimeout(()=>el.classList.remove('wrong'),500);
    document.getElementById('fb'+idx).innerHTML=`<span class="no">다시 계산해 보세요!</span>`;
  }
}

// puzzle2 — 종합 퍼즐2
let pzData2={};
function initPuzzle2(idx){
  const area=document.getElementById('pzArea2'+idx);
  if(!area||area.dataset.init)return;
  area.dataset.init='1';
  pzData2[idx]={puzzles:[
    {q:'4과 5를 모으면?',answer:9,choices:[8,9,10]},
    {q:'7을 가르면 2와?',answer:5,choices:[4,5,6]},
    {q:'□과 3을 모으면 8',answer:5,choices:[4,5,6]}
  ],solved:0,total:3};
  renderPzSub2(idx);
}
function renderPzSub2(idx){
  const pd=pzData2[idx],area=document.getElementById('pzArea2'+idx);
  if(pd.solved>=pd.total){
    slides[idx].answered=true;playSound('correct');combo++;if(combo>maxCombo)maxCombo=combo;
    score+=slides[idx].score;answered[idx]=true;
    document.getElementById('fb'+idx).innerHTML=`<span class="ok">🎉 퍼즐 완성! +${slides[idx].score}점</span>`;
    area.innerHTML='<div style="font-size:28px;margin:12px 0;">🏆 모두 맞혔어요!</div>';
    return;
  }
  const p=pd.puzzles[pd.solved];
  area.innerHTML=`<div style="font-size:24px;margin-bottom:12px;">(${pd.solved+1}/${pd.total}) ${p.q}</div>
    <div class="btn-row">${p.choices.map(c=>`<button class="btn" style="font-size:40px;" onclick="checkPz2(${idx},this,${c},${p.answer})">${c}</button>`).join('')}</div>`;
}
function checkPz2(idx,el,val,correct){
  playSound('click');
  if(val===correct){
    el.classList.add('correct');pzData2[idx].solved++;
    setTimeout(()=>renderPzSub2(idx),500);
  }else{
    el.classList.add('wrong');playSound('wrong');combo=0;
    setTimeout(()=>el.classList.remove('wrong'),500);
    document.getElementById('fb'+idx).innerHTML=`<span class="no">다시 생각해 보세요!</span>`;
  }
}

// Result
function showResult(){
  const d=document.getElementById('slide'+(slides.length-1));
  const total=slides.filter(s=>s.type==='q').reduce((a,s)=>a+s.score,0);
  const pct=Math.round(score/total*100);
  let msg='';
  if(pct>=90)msg='🏆 훌륭해요!';else if(pct>=70)msg='👏 잘했어요!';else if(pct>=50)msg='💪 좋은 시작이에요!';else msg='🌱 다시 도전해요!';
  d.innerHTML=`<div class="result-card card" style="max-width:480px;">
    <div style="font-size:32px;color:var(--primary);margin-bottom:8px;">🎉 학습 완료!</div>
    <div class="result-score">${score}<span style="font-size:28px;color:var(--subtext);">/${total}</span></div>
    <div class="result-msg">${msg}</div>
    ${maxCombo>1?`<div class="combo-badge">🔥 최대 콤보 x${maxCombo}</div>`:''}
    <div class="result-detail" style="margin-top:12px;">모으기와 가르기의 기본 개념을 배웠어요!<br>다음 시간에는 더 많이 연습해 봐요!</div>
    <button class="btn" style="font-size:24px;margin-top:16px;padding:10px 28px;background:var(--primary);color:#fff;border-color:var(--primary);" onclick="location.reload()">다시 하기 🔄</button>
  </div>`;
}

// Navigation
function updateNav(){
  document.getElementById('prevBtn').disabled=(current===0);
  document.getElementById('nextBtn').textContent=current===slides.length-2?'결과 보기 🏆':'다음 ▶';
  document.getElementById('pageInfo').textContent=`${current+1} / ${slides.length}`;
}

function goSlide(n){
  if(n<0||n>=slides.length)return;
  const prev=document.getElementById('slide'+current);
  prev.classList.remove('active');prev.classList.add('exit');
  current=n;
  const next=document.getElementById('slide'+current);
  setTimeout(()=>{
    prev.classList.remove('exit');
    next.classList.add('active');
    updateNav();
    // Init interactive qtypes
    if(slides[current].qtype==='puzzle')initPuzzle(current);
    if(slides[current].qtype==='multi_step2')initMultiStep2(current);
    if(slides[current].qtype==='speed2')initSpeed2(current);
    if(slides[current].qtype==='story_build2')initStoryBuild2(current);
    if(slides[current].qtype==='puzzle2')initPuzzle2(current);
    if(slides[current].type==='result')showResult();
  },200);
}
function prevSlide(){goSlide(current-1);}
function nextSlide(){goSlide(current+1);}

// Swipe
let touchX=0;
document.addEventListener('touchstart',e=>{touchX=e.changedTouches[0].screenX;},{passive:true});
document.addEventListener('touchend',e=>{
  const diff=e.changedTouches[0].screenX-touchX;
  if(Math.abs(diff)>50){diff>0?prevSlide():nextSlide();}
},{passive:true});

// Init
renderSlides();
</script>
</body>
</html>
