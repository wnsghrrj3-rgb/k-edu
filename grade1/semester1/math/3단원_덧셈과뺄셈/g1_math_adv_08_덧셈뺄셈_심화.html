<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>덧셈뺄셈 심화 - K✦edu</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Nunito:wght@800&display=swap" rel="stylesheet">
<style>
:root{--bg:#F0FDFA;--card:#FFFFFF;--primary:#26A69A;--primary-light:#E0F2F1;--secondary:#4DB6AC;--green:#4CAF50;--green-light:#E8F5E9;--red:#F44336;--red-light:#FFEBEE;--yellow:#FFC107;--yellow-light:#FFF8E1;--text:#333;--subtext:#888;--border:#D0E8E4;--shadow:0 4px 16px rgba(0,0,0,0.08);--radius:20px;}
*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'Jua',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh;width:100vw;user-select:none;}
.logo{display:flex;align-items:center;gap:2px;position:fixed;top:12px;left:16px;z-index:999;}.logo span:first-child{font-family:'Nunito',sans-serif;font-weight:800;font-size:20px;color:#1D4ED8;}.logo span:nth-child(2){font-size:10px;color:#F59E0B;}.logo span:last-child{font-family:'Nunito',sans-serif;font-weight:800;font-size:20px;color:#333;}
.sound-btn{position:fixed;top:12px;right:16px;z-index:999;background:var(--primary-light);border:none;border-radius:50%;width:40px;height:40px;font-size:20px;cursor:pointer;}
.slide{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px 80px;opacity:0;pointer-events:none;transition:opacity .4s,transform .4s;transform:translateX(60px);}.slide.active{opacity:1;pointer-events:auto;transform:translateX(0);}.slide.exit{opacity:0;transform:translateX(-60px);}
.title{font-size:28px;color:var(--primary);margin-bottom:8px;text-align:center;}
.badge{display:inline-block;background:var(--yellow-light);color:#F57F17;padding:4px 14px;border-radius:20px;font-size:16px;margin-bottom:10px;}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px;width:100%;max-width:560px;text-align:center;}
.cr{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:12px;}.ci{width:56px;height:56px;border-radius:50%;}.sp{background:var(--primary-light);border-radius:16px;padding:12px 18px;font-size:22px;max-width:380px;text-align:left;position:relative;}.sp::before{content:'';position:absolute;left:-10px;top:18px;border:8px solid transparent;border-right-color:var(--primary-light);}
.br{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:12px;}
.b{padding:10px 22px;border-radius:16px;border:3px solid var(--border);background:var(--card);font-family:'Jua',sans-serif;font-size:44px;cursor:pointer;transition:all .2s;min-width:60px;}.b:hover{border-color:var(--primary);background:var(--primary-light);}.b.correct{background:var(--green-light)!important;border-color:var(--green)!important;animation:pop .3s;}.b.wrong{background:var(--red-light)!important;border-color:var(--red)!important;animation:shake .4s;}
.bs{font-size:24px;padding:8px 16px;}
.fb{margin-top:10px;font-size:22px;min-height:28px;text-align:center;}.ok{color:var(--green);}.no{color:var(--red);}
.mgrid{display:grid;grid-template-columns:repeat(3,60px);gap:4px;justify-content:center;margin:10px 0;}
.mcell{width:60px;height:60px;border:3px solid var(--border);border-radius:12px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:32px;}
.mcell.blank{background:var(--yellow-light);border-color:var(--yellow);color:var(--primary);cursor:pointer;font-size:24px;}
.mcell.blank.filled{background:var(--green-light);border-color:var(--green);color:var(--green);cursor:default;}
.track-badge{display:inline-block;background:#FF6B6B;color:#fff;padding:4px 12px;border-radius:12px;font-size:14px;margin-bottom:8px;}
.nav{position:fixed;bottom:20px;left:0;right:0;display:flex;justify-content:center;gap:16px;z-index:100;}.nb{padding:10px 28px;border-radius:30px;border:none;font-family:'Jua',sans-serif;font-size:22px;cursor:pointer;}.np{background:var(--card);color:var(--text);border:2px solid var(--border);}.nn{background:var(--primary);color:#fff;}.nb:disabled{opacity:.4;cursor:default;}
.pi{position:fixed;bottom:6px;left:50%;transform:translateX(-50%);font-size:16px;color:var(--subtext);}
.combo{display:inline-block;background:linear-gradient(135deg,#FF6B6B,#FFE66D);color:#fff;padding:6px 18px;border-radius:20px;font-size:20px;margin:6px 0;}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.12)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
</style>
</head>
<body>
<div class="logo"><span>K</span><span>✦</span><span>edu</span></div>
<button class="sound-btn" onclick="toggleSound()" id="soundBtn">🔊</button>
<div id="sc" style="width:100%;height:100vh;position:relative;overflow:hidden;"></div>
<div class="nav"><button class="nb np" id="prevBtn" onclick="prev()">◀ 이전</button><button class="nb nn" id="nextBtn" onclick="next()">다음 ▶</button></div>
<div class="pi" id="pi"></div>

<script>
const KAY="data:image/webp;base64,UklGRi4DAABXRUJQVlA4ICIDAACwDwCdASpAADQAPpE6lkgloyIhLhbdULASCWIAv2tLVJ91/ebfZYmBYRmNbEm3KtppnkA1COlC0qPl8lbpPOMvM2+7Paj7RyTRWkREpTairsQmfIaQHPuysZGp//AZOh/jhXMgf+XukneaTzeAwrYpCptDySjwuW6f1OccbfWCheBXOucqgAD+/0+Dl+AdHcEtL1tgGpY9A3cZGKy5flJPAUKNf9C2LqZ9+c6s+AuIXTKIfLmRciOGPZIJyFt6o2Ve/4UfabBdF9Zbd/7jtqaOPGI+0HBEZ1ShVDFULPS07rBzFVnn6okSBEwMCW3Et+nMjONY1j9eOQ0N4p0HSUGw4amR1CyH5BAwJYiCfsHax0Qq6pKuW9JyrD2znHQzdHZbIs3jLpwvJpdS8u8woJuK0RTRMqh0KXmfn8W+bGDxsgqmaoAPlGdEjAjFEs5MxlTn+BL08u9SP4H9zrlI+YzHznt3aHKf6cbpF+0omk1Vhm6MEN2mx/ulJxh1gf3bBEt05y+ki/fmi8F94yOGBwCds82ya/2W+WP0T6v/uTm27/51s+M7xjXGrtzGcyO6Y7hQCQ5dgBOxoDEvrYyjx/Y3lto+tdsFcdKsIA8H0y+bGenSlLrroFCKyzdSgEjhcma7hsOlT12vjv1idWQ8Ix13zTEzwGBOc2/RX+VXKYjul+rMAThdcqavxooRkgrVnThNyLLkJ7dPaStKwB0dxkzFHSlrJyRc199QMEiDvrh1wNhcoE3Rth45nghKzBePCeHjQujoZfe1vzJmVb1D1/Yge8yF66LAdOTH2erd2InrQ8OQ5fSfOaPuYYX+3Jyh/Kf+On4ybKylo+tQnNukOi1Pz8c7y8hauJKmtKxCoRUKEW0LC4HlTncAFgomF/eIRa/3dE3S9nq17huadym1imoCs+3h1GgXhmP+MZp+7GXNkOTku6qznRlgOgEH64Ah54EWrhSdk5UoJ3pzjYXt5wgYXVOLfd3Q+7JwSTLym8v+B6p3KFewI5RHShHzbtIf8Nk9U2fx+uoQob5b0Aq5RHXKjAZufVLWiQR665CMzpKxfyAA";

let audioCtx,soundOn=true,cur=0,score=0,combo=0,maxCombo=0;
function initA(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
function ps(t){if(!soundOn)return;initA();audioCtx.resume().then(()=>{const n=audioCtx.currentTime;if(t==='correct'){[523,659,784].forEach((f,i)=>{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(.15,n+i*.12);g.gain.exponentialRampToValueAtTime(.01,n+i*.12+.2);o.connect(g);g.connect(audioCtx.destination);o.start(n+i*.12);o.stop(n+i*.12+.2);});}else if(t==='wrong'){[220,196].forEach((f,i)=>{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sawtooth';o.frequency.value=f;g.gain.setValueAtTime(.1,n+i*.15);g.gain.exponentialRampToValueAtTime(.01,n+i*.15+.2);o.connect(g);g.connect(audioCtx.destination);o.start(n+i*.15);o.stop(n+i*.15+.2);});}else{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sine';o.frequency.value=880;g.gain.setValueAtTime(.08,n);g.gain.exponentialRampToValueAtTime(.01,n+.08);o.connect(g);g.connect(audioCtx.destination);o.start(n);o.stop(n+.08);}});}
function toggleSound(){soundOn=!soundOn;document.getElementById('soundBtn').textContent=soundOn?'🔊':'🔇';}

const S=[];
S.push({t:'c',h:`<div class="track-badge">Track B 심화</div><div class="title" style="font-size:30px;">덧셈뺄셈 심화 ⭐⭐⭐</div><div class="card"><div class="cr"><img src="${KAY}" class="ci" alt="케이"><div class="sp">역연산, 마방진, 등식 퍼즐에 도전! 🧠</div></div><div style="font-size:22px;color:var(--subtext);">논리적 사고력을 키우는 고난도 문제!</div></div>`});

// Concept: 역연산
S.push({t:'c',h:`<div class="title">역연산이란? 🔄</div><div class="card"><div style="font-size:24px;margin-bottom:10px;">덧셈과 뺄셈은 반대 관계!</div><div style="font-size:28px;margin:8px 0;">3 + 4 = 7 ↔ 7 − 4 = 3</div><div style="font-size:28px;margin:8px 0;">2 + 5 = 7 ↔ 7 − 5 = 2</div><div style="font-size:20px;color:var(--subtext);margin-top:8px;">덧셈을 알면 뺄셈도 알 수 있어요!</div></div>`});

const qs=[
// 역연산
{q:'3 + 5 = 8이면, 8 − 5 = ?',a:3,ch:[3,4,5,2],sc:50,hint:'덧셈을 뒤집으면 뺄셈!'},
{q:'□ + 6 = 9이면, 9 − 6 = □. □는?',a:3,ch:[2,3,4,5],sc:50,hint:'9−6을 계산!'},
// 등식 만들기
{q:'□ + □ = 8 (두 수가 다를 때, 큰 수는?)',a:5,ch:[3,4,5,6],sc:50,hint:'1+7, 2+6, 3+5 중 큰 수'},
{q:'9 = □ + 4, □는?',a:5,ch:[4,5,6,3],sc:50,hint:'=의 양쪽이 같아야 해요!'},
// 마방진 기초
{q:'가로 합 = 6인 마방진! 위쪽 가운데 빈칸은?\n(위: 1, ?, 2 / 합=6)',a:3,ch:[2,3,4,5],sc:50,hint:'6−1−2=?'},
{q:'세로 합 = 6인 마방진! 가운데 빈칸은?\n(위→아래: 2, ?, 1 / 합=6)',a:3,ch:[2,3,4,1],sc:50,hint:'6−2−1=?'},
// 등식 퍼즐
{q:'2 + □ = 9 − 2',a:5,ch:[4,5,6,7],sc:50,hint:'먼저 9−2=7, 그다음 7−2=?'},
{q:'□ − 1 = 3 + 2',a:6,ch:[4,5,6,7],sc:50,hint:'3+2=5, 5+1=?'},
// 논리
{q:'A + 3 = 8, A − 2 = ?\n(A를 먼저 구하세요!)',a:3,ch:[2,3,4,5],sc:50,hint:'A=5, 5−2=?'},
{q:'B − 4 = 3, B + 1 = ?\n(B를 먼저 구하세요!)',a:8,ch:[6,7,8,9],sc:50,hint:'B=7, 7+1=?'}
];

qs.forEach((q,idx)=>{
  S.push({t:'q',sc:q.sc,done:false,r(i){
    return`<div class="badge">⭐⭐⭐ 심화</div>
    <div class="title" style="font-size:22px;">${idx+1}/10</div>
    <div class="card">
      <div style="font-size:26px;margin-bottom:14px;white-space:pre-line;">${q.q}</div>
      <div class="br">${q.ch.map(c=>`<button class="b" onclick="chk(${i},this,${c},${q.a},'${q.hint}')">${c}</button>`).join('')}</div>
      <div class="fb" id="f${i}"></div>
    </div>`;
  }});
});

S.push({t:'result'});

function render(){const c=document.getElementById('sc');c.innerHTML='';S.forEach((s,i)=>{const d=document.createElement('div');d.className='slide'+(i===0?' active':'');d.id='s'+i;if(s.t==='c')d.innerHTML=s.h;else if(s.t==='q'&&s.r)d.innerHTML=s.r(i);else d.innerHTML='<div class="card" style="max-width:480px;"><div class="title">🎉</div></div>';c.appendChild(d);});updNav();}

function chk(i,el,v,c,hint){const s=S[i];if(s.done)return;ps('click');if(v===c){s.done=true;el.classList.add('correct');ps('correct');combo++;if(combo>maxCombo)maxCombo=combo;score+=s.sc;document.getElementById('f'+i).innerHTML=`<span class="ok">🎉 정답! +${s.sc}점 ${combo>1?'🔥x'+combo:''}</span>`;}else{el.classList.add('wrong');ps('wrong');combo=0;setTimeout(()=>el.classList.remove('wrong'),500);document.getElementById('f'+i).innerHTML=`<span class="no">${hint}</span>`;}}

function showResult(){const d=document.getElementById('s'+(S.length-1));const total=S.filter(s=>s.t==='q').reduce((a,s)=>a+s.sc,0);const pct=Math.round(score/total*100);let msg=pct>=90?'🏆 심화 정복!':pct>=70?'👏 대단해요!':pct>=50?'💪 실력 성장 중!':'🌱 다시 도전!';d.innerHTML=`<div class="card" style="max-width:480px;"><div class="track-badge">Track B 심화</div><div style="font-size:32px;color:var(--primary);margin-bottom:8px;">⭐⭐⭐ 심화 완료!</div><div style="font-size:64px;color:var(--primary);">${score}<span style="font-size:28px;color:var(--subtext);">/${total}</span></div><div style="font-size:28px;margin:8px 0;">${msg}</div>${maxCombo>1?`<div class="combo">🔥 최대 콤보 x${maxCombo}</div>`:''}<div style="font-size:20px;color:var(--subtext);margin-top:12px;">역연산과 마방진, 등식 퍼즐을 풀었어요!</div><button class="b bs" style="margin-top:16px;background:var(--primary);color:#fff;border-color:var(--primary);" onclick="location.reload()">다시 하기 🔄</button></div>`;}

function updNav(){document.getElementById('prevBtn').disabled=(cur===0);document.getElementById('nextBtn').textContent=cur===S.length-2?'결과 보기 🏆':'다음 ▶';document.getElementById('pi').textContent=`${cur+1} / ${S.length}`;}
function go(n){if(n<0||n>=S.length)return;document.getElementById('s'+cur).classList.remove('active');document.getElementById('s'+cur).classList.add('exit');cur=n;setTimeout(()=>{document.querySelectorAll('.slide').forEach(s=>s.classList.remove('exit'));document.getElementById('s'+cur).classList.add('active');updNav();if(S[cur].t==='result')showResult();},200);}
function prev(){go(cur-1);}function next(){go(cur+1);}
let tx=0;document.addEventListener('touchstart',e=>{tx=e.changedTouches[0].screenX;},{passive:true});document.addEventListener('touchend',e=>{const d=e.changedTouches[0].screenX-tx;if(Math.abs(d)>50){d>0?prev():next();}},{passive:true});
render();
</script>
</body>
</html>
