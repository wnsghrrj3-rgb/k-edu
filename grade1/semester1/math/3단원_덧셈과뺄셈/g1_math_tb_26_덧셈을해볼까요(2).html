<style>
:root{--bg:#F0FDFA;--card:#FFFFFF;--primary:#26A69A;--primary-light:#E0F2F1;--secondary:#4DB6AC;--green:#4CAF50;--green-light:#E8F5E9;--red:#F44336;--red-light:#FFEBEE;--yellow:#FFC107;--yellow-light:#FFF8E1;--text:#333;--subtext:#888;--border:#D0E8E4;--shadow:0 4px 16px rgba(0,0,0,0.08);--radius:20px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Jua',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh;width:100vw;user-select:none;-webkit-user-select:none;}
.logo{display:flex;align-items:center;gap:2px;position:fixed;top:12px;left:16px;z-index:999;}
.logo span:first-child{font-family:'Nunito',sans-serif;font-weight:800;font-size:20px;color:#1D4ED8;}
.logo span:nth-child(2){font-size:10px;color:#F59E0B;}
.logo span:last-child{font-family:'Nunito',sans-serif;font-weight:800;font-size:20px;color:#333;}
.sound-btn{position:fixed;top:12px;right:16px;z-index:999;background:var(--primary-light);border:none;border-radius:50%;width:40px;height:40px;font-size:20px;cursor:pointer;}
.slide{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px 80px;opacity:0;pointer-events:none;transition:opacity .4s,transform .4s;transform:translateX(60px);overflow-y:auto;}
.slide.active{opacity:1;pointer-events:auto;transform:translateX(0);}
.slide.exit{opacity:0;transform:translateX(-60px);}
.slide-title{font-size:28px;color:var(--primary);margin-bottom:8px;text-align:center;}
.badge{display:inline-block;background:var(--yellow-light);color:#F57F17;padding:4px 14px;border-radius:20px;font-size:16px;margin-bottom:10px;}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;width:100%;max-width:560px;text-align:center;}
.char-row{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:12px;}
.char-img{width:56px;height:56px;border-radius:50%;}
.speech{background:var(--primary-light);border-radius:16px;padding:12px 18px;font-size:22px;max-width:380px;text-align:left;position:relative;}
.speech::before{content:'';position:absolute;left:-10px;top:18px;border:8px solid transparent;border-right-color:var(--primary-light);}
.btn-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:12px;}
.btn{padding:10px 24px;border-radius:16px;border:3px solid var(--border);background:var(--card);font-family:'Jua',sans-serif;font-size:44px;cursor:pointer;transition:all .2s;min-width:64px;}
.btn:hover{border-color:var(--primary);background:var(--primary-light);}
.btn.correct{background:var(--green-light)!important;border-color:var(--green)!important;animation:pop .3s;}
.btn.wrong{background:var(--red-light)!important;border-color:var(--red)!important;animation:shake .4s;}
.btn-sm{font-size:26px;padding:8px 16px;}
.blank{display:inline-flex;align-items:center;justify-content:center;width:56px;height:56px;border:3px dashed var(--primary);border-radius:12px;font-size:36px;color:var(--primary);background:var(--primary-light);transition:all .3s;vertical-align:middle;}
.blank.filled{border-style:solid;background:var(--green-light);border-color:var(--green);color:var(--green);}
.eq-row{display:flex;align-items:center;justify-content:center;gap:6px;margin:12px 0;font-size:48px;}
.feedback{margin-top:10px;font-size:22px;min-height:28px;text-align:center;}
.ok{color:var(--green);}
.no{color:var(--red);}
.add-table{border-collapse:collapse;margin:10px auto;}
.add-table td,.add-table th{width:44px;height:44px;text-align:center;font-size:24px;border:2px solid var(--border);border-radius:6px;}
.add-table th{background:var(--primary-light);color:var(--primary);font-weight:normal;}
.add-table .plus-cell{background:var(--primary);color:#fff;font-size:20px;}
.add-table .blank-cell{background:var(--yellow-light);cursor:pointer;font-size:22px;color:var(--primary);}
.add-table .blank-cell.filled{background:var(--green-light);color:var(--green);cursor:default;}
.add-table .highlight{background:#FFE0B2;border-color:#FFCC80;}
.ox-btn{width:76px;height:76px;border-radius:50%;font-size:36px;border:4px solid var(--border);background:var(--card);cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;}
.ox-btn.correct{border-color:var(--green);background:var(--green-light);}
.ox-btn.wrong{border-color:var(--red);background:var(--red-light);}
.pattern-row{display:flex;align-items:center;gap:6px;justify-content:center;margin:8px 0;font-size:32px;}
.pattern-box{width:48px;height:48px;border:3px solid var(--border);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:28px;background:#fff;}
.pattern-box.hl{background:var(--yellow-light);border-color:var(--yellow);}
.nav{position:fixed;bottom:20px;left:0;right:0;display:flex;justify-content:center;gap:16px;z-index:100;}
.nav-btn{padding:10px 28px;border-radius:30px;border:none;font-family:'Jua',sans-serif;font-size:22px;cursor:pointer;}
.nav-prev{background:var(--card);color:var(--text);border:2px solid var(--border);}
.nav-next{background:var(--primary);color:#fff;}
.nav-btn:disabled{opacity:.4;cursor:default;}
.page-info{position:fixed;bottom:6px;left:50%;transform:translateX(-50%);font-size:16px;color:var(--subtext);}
.combo-badge{display:inline-block;background:linear-gradient(135deg,#FF6B6B,#FFE66D);color:#fff;padding:6px 18px;border-radius:20px;font-size:20px;margin:6px 0;}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.12)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
</style>

let audioCtx,soundOn=true,cur=0,score=0,combo=0,maxCombo=0;
function initA(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
function ps(t){if(!soundOn)return;initA();audioCtx.resume().then(()=>{const n=audioCtx.currentTime;if(t==='correct'){[523,659,784].forEach((f,i)=>{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(.15,n+i*.12);g.gain.exponentialRampToValueAtTime(.01,n+i*.12+.2);o.connect(g);g.connect(audioCtx.destination);o.start(n+i*.12);o.stop(n+i*.12+.2);});}else if(t==='wrong'){[220,196].forEach((f,i)=>{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sawtooth';o.frequency.value=f;g.gain.setValueAtTime(.1,n+i*.15);g.gain.exponentialRampToValueAtTime(.01,n+i*.15+.2);o.connect(g);g.connect(audioCtx.destination);o.start(n+i*.15);o.stop(n+i*.15+.2);});}else{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sine';o.frequency.value=880;g.gain.setValueAtTime(.08,n);g.gain.exponentialRampToValueAtTime(.01,n+.08);o.connect(g);g.connect(audioCtx.destination);o.start(n);o.stop(n+.08);}});}
function toggleSound(){soundOn=!soundOn;document.getElementById('soundBtn').textContent=soundOn?'🔊':'🔇';}
function stars(s){if(s<=10)return'⭐ 기본';if(s<=25)return'⭐⭐ 발전';if(s<=50)return'⭐⭐⭐ 심화';return'⭐⭐⭐⭐ 최심화';}

// Build addition table HTML
function addTableHTML(blanks){
  let h='<table class="add-table"><tr><td class="plus-cell">+</td>';
  for(let j=1;j<=5;j++)h+=`<th>${j}</th>`;
  h+='</tr>';
  for(let i=1;i<=4;i++){
    h+=`<tr><th>${i}</th>`;
    for(let j=1;j<=5;j++){
      const v=i+j;
      const isBlank=blanks.some(b=>b[0]===i&&b[1]===j);
      if(isBlank)h+=`<td class="blank-cell" id="tc_${i}_${j}">?</td>`;
      else h+=`<td>${v}</td>`;
    }
    h+='</tr>';
  }
  return h+'</table>';
}

    <div class="speech" style="font-size:20px;">케이가 사탕을 몇 개 가지고 있었어요. 듀가 3개를 더 주어서 모두 8개가 되었어요. 처음에 몇 개?</div>
  </div>
  <div class="eq-row"><div class="blank" id="bl${i}">?</div><span style="color:#2E7D32;">+</span><span>3</span><span style="color:#1565C0;">=</span><span>8</span></div>
  <div class="btn-row">${[4,5,6,3].map(n=>`<button class="btn" onclick="chkB(${i},this,${n},5)">${n}</button>`).join('')}</div>
  <div class="feedback" id="f${i}"></div>
</div>`;}});

// Q9: 합이 같은 식 모두 찾기 ⭐⭐⭐
S.push({t:'q',sc:50,done:false,r(i){return`<div class="badge">${stars(50)}</div>
<div class="slide-title">합이 같은 식 찾기! 🧠</div><div class="card">
  <div style="font-size:22px;margin-bottom:8px;">합이 <span style="font-size:36px;color:var(--primary);">8</span>인 덧셈식을 모두 골라요!</div>
  <div id="multi${i}" style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;"></div>
  <button class="btn-sm btn" onclick="chkMulti(${i})" style="margin-top:10px;">확인하기</button>
  <div class="feedback" id="f${i}"></div>
</div>`;}});

// Q10: 종합 퍼즐 - 덧셈 피라미드 ⭐⭐⭐
S.push({t:'q',sc:50,done:false,r(i){return`<div class="badge">${stars(50)}</div>
<div class="slide-title">덧셈 피라미드 🔺</div><div class="card">
  <div style="font-size:20px;margin-bottom:8px;">위 칸 = 아래 두 칸의 합!</div>
  <div id="pyr${i}"></div>
  <div class="btn-row" id="b${i}"></div>
  <div class="feedback" id="f${i}"></div>
</div>`;}});

S.push({t:'result'});

function render(){const c=document.getElementById('sc');c.innerHTML='';S.forEach((s,i)=>{const d=document.createElement('div');d.className='slide'+(i===0?' active':'');d.id='s'+i;if(s.t==='c')d.innerHTML=s.h;else if(s.t==='q'&&s.r)d.innerHTML=s.r(i);else d.innerHTML='<div class="card" style="max-width:480px;"><div class="slide-title">🎉</div></div>';c.appendChild(d);});updNav();}

function chk(i,el,v,c){const s=S[i];if(s.done)return;ps('click');if(v===c){s.done=true;el.classList.add('correct');ps('correct');combo++;if(combo>maxCombo)maxCombo=combo;score+=s.sc;document.getElementById('f'+i).innerHTML=`<span class="ok">🎉 정답! +${s.sc}점 ${combo>1?'🔥x'+combo:''}</span>`;}else{el.classList.add('wrong');ps('wrong');combo=0;setTimeout(()=>el.classList.remove('wrong'),500);document.getElementById('f'+i).innerHTML=`<span class="no">다시 생각해 보세요!</span>`;}}

function chkB(i,el,v,c){const s=S[i];if(s.done)return;ps('click');const bl=document.getElementById('bl'+i);if(v===c){s.done=true;bl.textContent=c;bl.classList.add('filled');el.classList.add('correct');ps('correct');combo++;if(combo>maxCombo)maxCombo=combo;score+=s.sc;document.getElementById('f'+i).innerHTML=`<span class="ok">🎉 맞았어요! +${s.sc}점</span>`;}else{el.classList.add('wrong');ps('wrong');combo=0;setTimeout(()=>el.classList.remove('wrong'),500);document.getElementById('f'+i).innerHTML=`<span class="no">다시 풀어 보세요!</span>`;}}

function chkOX(i,el,isO){const s=S[i];if(s.done)return;ps('click');if(isO){s.done=true;el.classList.add('correct');ps('correct');combo++;if(combo>maxCombo)maxCombo=combo;score+=s.sc;document.getElementById('f'+i).innerHTML=`<span class="ok">🎉 맞아요! 2+5=7, 5+2=7 같아요! +${s.sc}점</span>`;}else{el.classList.add('wrong');ps('wrong');combo=0;setTimeout(()=>el.classList.remove('wrong'),500);document.getElementById('f'+i).innerHTML=`<span class="no">2+5와 5+2 둘 다 계산해 보세요!</span>`;}}

// Q1: Table blanks
let tblState={};
function initTbl1(i){
  if(tblState[i])return;
  const blanks=[[2,3,5],[3,4,7]];// [row,col,answer]
  tblState[i]={blanks,cur:null,solved:0};
  document.querySelectorAll(`#s${i} .blank-cell`).forEach(cell=>{
    cell.onclick=()=>{tblState[i].cur=cell.id;document.getElementById('tsel'+i).textContent='선택: '+cell.id.replace('tc_','').replace('_',' + ');showTblBtns(i);};
  });
}
function showTblBtns(i){
  const ts=tblState[i];if(!ts.cur)return;
  const parts=ts.cur.split('_');const r=parseInt(parts[1]),c=parseInt(parts[2]),ans=r+c;
  document.getElementById('b'+i).innerHTML=[ans-1,ans,ans+1,ans+2].filter(n=>n>0&&n<=9).sort(()=>Math.random()-.5).map(n=>`<button class="btn" onclick="ansTbl1(${i},${n},${ans})">${n}</button>`).join('');
}
function ansTbl1(i,v,c){
  ps('click');const ts=tblState[i];
  const cell=document.getElementById(ts.cur);
  if(v===c){cell.textContent=c;cell.classList.add('filled');ts.solved++;
    if(ts.solved>=ts.blanks.length){S[i].done=true;ps('correct');combo++;if(combo>maxCombo)maxCombo=combo;score+=S[i].sc;document.getElementById('f'+i).innerHTML=`<span class="ok">🎉 덧셈표 완성! +${S[i].sc}점</span>`;document.getElementById('b'+i).innerHTML='';}
    else{ts.cur=null;document.getElementById('tsel'+i).textContent='선택: 다른 빈칸을 터치하세요';document.getElementById('b'+i).innerHTML='';}
  }else{ps('wrong');combo=0;document.getElementById('f'+i).innerHTML=`<span class="no">가로와 세로 수를 더해 보세요!</span>`;}
}

// Q6: Bigger table
let tbl2={};
function initTbl2(i){
  if(tbl2[i])return;
  const blanks=[[1,2,3],[2,1,3],[3,3,6],[4,2,6],[1,5,6]];
  tbl2[i]={blanks,cur:null,solved:0};
  let h='<table class="add-table"><tr><td class="plus-cell">+</td>';
  for(let j=1;j<=5;j++)h+=`<th>${j}</th>`;h+='</tr>';
  for(let r=1;r<=4;r++){h+=`<tr><th>${r}</th>`;for(let c=1;c<=5;c++){const isB=blanks.some(b=>b[0]===r&&b[1]===c);if(isB)h+=`<td class="blank-cell" id="t2_${r}_${c}" onclick="selTbl2(${i},'t2_${r}_${c}')">?</td>`;else h+=`<td>${r+c}</td>`;}h+='</tr>';}
  document.getElementById('tbl'+i).innerHTML=h+'</table>';
}
function selTbl2(i,id){tbl2[i].cur=id;const p=id.split('_');document.getElementById('tsel2_'+i).textContent=`선택: ${p[1]} + ${p[2]}`;const ans=parseInt(p[1])+parseInt(p[2]);document.getElementById('b'+i).innerHTML=[ans-1,ans,ans+1,ans+2].filter(n=>n>0&&n<=9).sort(()=>Math.random()-.5).map(n=>`<button class="btn" onclick="ansTbl2(${i},${n},${ans})">${n}</button>`).join('');}
function ansTbl2(i,v,c){ps('click');const ts=tbl2[i],cell=document.getElementById(ts.cur);if(v===c){cell.textContent=c;cell.classList.add('filled');ts.solved++;if(ts.solved>=ts.blanks.length){S[i].done=true;ps('correct');combo++;if(combo>maxCombo)maxCombo=combo;score+=S[i].sc;document.getElementById('f'+i).innerHTML=`<span class="ok">🎉 모두 완성! +${S[i].sc}점</span>`;document.getElementById('b'+i).innerHTML='';}else{ts.cur=null;document.getElementById('tsel2_'+i).textContent='다른 빈칸을 터치하세요';document.getElementById('b'+i).innerHTML='';}}else{ps('wrong');combo=0;document.getElementById('f'+i).innerHTML=`<span class="no">가로+세로를 더해 보세요!</span>`;}}

// Q9: Multi select
let msel={};
function initMulti(i){
  if(msel[i])return;
  const opts=[{t:'1+7',v:8},{t:'2+6',v:8},{t:'3+4',v:7},{t:'4+4',v:8},{t:'5+3',v:8},{t:'3+6',v:9}];
  msel[i]={opts,sel:new Set()};
  document.getElementById('multi'+i).innerHTML=opts.map((o,j)=>`<button class="btn btn-sm" id="ms${i}_${j}" onclick="tapM(${i},${j})">${o.t}</button>`).join('');
}
function tapM(i,j){ps('click');const m=msel[i],el=document.getElementById('ms'+i+'_'+j);if(m.sel.has(j)){m.sel.delete(j);el.style.borderColor='var(--border)';el.style.background='var(--card)';}else{m.sel.add(j);el.style.borderColor='var(--primary)';el.style.background='var(--primary-light)';}}
function chkMulti(i){const s=S[i];if(s.done)return;const m=msel[i];const cor=m.opts.map((o,j)=>o.v===8?j:-1).filter(j=>j>=0);const sel=Array.from(m.sel).sort().join(',');if(sel===cor.sort().join(',')){s.done=true;ps('correct');combo++;if(combo>maxCombo)maxCombo=combo;score+=s.sc;cor.forEach(j=>document.getElementById('ms'+i+'_'+j).classList.add('correct'));document.getElementById('f'+i).innerHTML=`<span class="ok">🎉 모두 찾았어요! +${s.sc}점</span>`;}else{ps('wrong');combo=0;document.getElementById('f'+i).innerHTML=`<span class="no">합이 8인 식을 모두 골라 보세요!</span>`;}}

// Q10: Pyramid
let pyrD={};
function initPyr(i){
  if(pyrD[i])return;
  // Bottom: 2, 3, 4. Middle: 5, 7. Top: 12? No, keep small. Bottom: 1,2,3. Mid: 3,5. Top: 8
  // Simpler: Bottom: 1, 3, 2. Mid: 4, 5. Top: 9
  // Actually for grade 1, keep sums ≤9: Bottom: 1, 2, 3 -> Mid: 3, 5 -> Top: 8
  pyrD[i]={cells:[{r:0,c:0,v:8,blank:true},{r:1,c:0,v:3,blank:true},{r:1,c:1,v:5,blank:false},{r:2,c:0,v:1,blank:false},{r:2,c:1,v:2,blank:false},{r:2,c:2,v:3,blank:false}],cur:null,solved:0,total:2};
  renderPyr(i);
}
function renderPyr(i){
  const d=pyrD[i];
  let h='<div style="text-align:center;">';
  // Top row (1 cell)
  const top=d.cells[0];
  h+=`<div style="margin:4px 0;"><span class="${top.blank&&!top.filled?'blank':'pattern-box'}" style="width:52px;height:52px;font-size:32px;display:inline-flex;align-items:center;justify-content:center;${top.filled?'background:var(--green-light);border-color:var(--green);color:var(--green);border-style:solid;':''}" id="py${i}_0_0" onclick="selPyr(${i},0,0)">${top.filled?top.v:top.blank?'?':top.v}</span></div>`;
  // Middle row (2 cells)
  h+='<div style="margin:4px 0;display:flex;gap:12px;justify-content:center;">';
  [1,2].forEach(j=>{const c=d.cells[j];h+=`<span class="${c.blank&&!c.filled?'blank':'pattern-box'}" style="width:52px;height:52px;font-size:32px;display:inline-flex;align-items:center;justify-content:center;${c.filled?'background:var(--green-light);border-color:var(--green);color:var(--green);border-style:solid;':''}" id="py${i}_1_${j-1}" onclick="selPyr(${i},1,${j-1})">${c.filled?c.v:c.blank?'?':c.v}</span>`;});
  h+='</div>';
  // Bottom row (3 cells)
  h+='<div style="margin:4px 0;display:flex;gap:12px;justify-content:center;">';
  [3,4,5].forEach(j=>{const c=d.cells[j];h+=`<span class="pattern-box" style="width:52px;height:52px;font-size:32px;display:inline-flex;align-items:center;justify-content:center;">${c.v}</span>`;});
  h+='</div></div>';
  document.getElementById('pyr'+i).innerHTML=h;
}
function selPyr(i,r,c){
  const d=pyrD[i];
  const cell=d.cells.find(x=>x.r===r&&x.c===c);
  if(!cell||!cell.blank||cell.filled)return;
  pyrD[i].cur={r,c,v:cell.v};
  document.getElementById('b'+i).innerHTML=[cell.v-1,cell.v,cell.v+1,cell.v+2].filter(n=>n>=0&&n<=9).sort(()=>Math.random()-.5).map(n=>`<button class="btn" onclick="ansPyr(${i},${n},${cell.v})">${n}</button>`).join('');
}
function ansPyr(i,v,c){
  ps('click');
  if(v===c){
    const d=pyrD[i],cur=d.cur;
    const cell=d.cells.find(x=>x.r===cur.r&&x.c===cur.c);
    cell.filled=true;d.solved++;
    renderPyr(i);
    if(d.solved>=d.total){S[i].done=true;ps('correct');combo++;if(combo>maxCombo)maxCombo=combo;score+=S[i].sc;document.getElementById('f'+i).innerHTML=`<span class="ok">🎉 피라미드 완성! +${S[i].sc}점</span>`;document.getElementById('b'+i).innerHTML='';}
    else{d.cur=null;document.getElementById('b'+i).innerHTML='';}
  }else{ps('wrong');combo=0;document.getElementById('f'+i).innerHTML=`<span class="no">아래 두 수를 더해 보세요!</span>`;}
}

function showResult(){const d=document.getElementById('s'+(S.length-1));const total=S.filter(s=>s.t==='q').reduce((a,s)=>a+s.sc,0);const pct=Math.round(score/total*100);let msg=pct>=90?'🏆 덧셈 마스터!':pct>=70?'👏 잘했어요!':pct>=50?'💪 좋은 시작!':'🌱 다시 도전!';d.innerHTML=`<div class="card" style="max-width:480px;"><div style="font-size:32px;color:var(--primary);margin-bottom:8px;">🎉 학습 완료!</div><div style="font-size:64px;color:var(--primary);">${score}<span style="font-size:28px;color:var(--subtext);">/${total}</span></div><div style="font-size:28px;margin:8px 0;">${msg}</div>${maxCombo>1?`<div class="combo-badge">🔥 최대 콤보 x${maxCombo}</div>`:''}<div style="font-size:20px;color:var(--subtext);margin-top:12px;">덧셈표의 규칙을 찾고 심화 문제를 풀었어요!<br>다음에는 뺄셈을 배워 봐요!</div><button class="btn" style="font-size:24px;margin-top:16px;padding:10px 28px;background:var(--primary);color:#fff;border-color:var(--primary);" onclick="location.reload()">다시 하기 🔄</button></div>`;}

function updNav(){document.getElementById('prevBtn').disabled=(cur===0);document.getElementById('nextBtn').textContent=cur===S.length-2?'결과 보기 🏆':'다음 ▶';document.getElementById('pi').textContent=`${cur+1} / ${S.length}`;}
function go(n){if(n<0||n>=S.length)return;document.getElementById('s'+cur).classList.remove('active');document.getElementById('s'+cur).classList.add('exit');cur=n;setTimeout(()=>{document.querySelectorAll('.slide').forEach(s=>s.classList.remove('exit'));document.getElementById('s'+cur).classList.add('active');updNav();if(cur===3)initTbl1(cur);if(cur===9)initTbl2(cur);if(cur===12)initMulti(cur);if(cur===13)initPyr(cur);if(S[cur].t==='result')showResult();},200);}
function prev(){go(cur-1);}function next(){go(cur+1);}
let tx=0;document.addEventListener('touchstart',e=>{tx=e.changedTouches[0].screenX;},{passive:true});document.addEventListener('touchend',e=>{const d=e.changedTouches[0].screenX-tx;if(Math.abs(d)>50){d>0?prev():next();}},{passive:true});
render();
</script>
