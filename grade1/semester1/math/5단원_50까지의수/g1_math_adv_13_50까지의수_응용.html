<!DOCTYPE html>
<html lang="ko">
<head>
<script src="/kedu_config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/kedu_tracker.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>50까지의 수 응용 - K✦edu</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Nunito:wght@800&display=swap" rel="stylesheet">
<style>
:root{--bg:#F0F7FF;--card:#FFFFFF;--primary:#42A5F5;--primary-light:#E3F2FD;--green:#4CAF50;--green-light:#E8F5E9;--red:#F44336;--red-light:#FFEBEE;--yellow:#FFC107;--yellow-light:#FFF8E1;--text:#333;--subtext:#888;--border:#D0E4F7;--shadow:0 4px 16px rgba(0,0,0,0.08);--radius:20px}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Jua',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh;width:100vw;-webkit-user-select:none;user-select:none}
.logo{display:flex;align-items:center;gap:2px;position:fixed;top:12px;left:16px;z-index:999}.logo-k{font-family:'Nunito',sans-serif;font-weight:800;font-size:20px;color:#1D4ED8}.logo-star{font-size:10px;color:#F59E0B}.logo-edu{font-family:'Nunito',sans-serif;font-weight:800;font-size:20px;color:#333}
.sound-btn{position:fixed;top:12px;right:16px;z-index:999;background:var(--primary-light);border:none;border-radius:50%;width:40px;height:40px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.sc{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.s{display:none;flex-direction:column;align-items:center;justify-content:center;width:100%;max-width:600px;text-align:center;gap:10px;animation:fi .4s}.s.a{display:flex}
@keyframes fi{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes sh{0%,100%{transform:translateX(0)}25%,75%{transform:translateX(-6px)}50%{transform:translateX(6px)}}
@keyframes bn{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
@keyframes pp{0%{transform:scale(0)}70%{transform:scale(1.1)}100%{transform:scale(1)}}
.c{background:var(--card);border-radius:var(--radius);padding:22px 18px;width:100%;box-shadow:var(--shadow)}
.t{font-size:24px;color:var(--primary);margin-bottom:4px}.d{font-size:20px;line-height:1.5}
.bg{display:inline-block;background:var(--yellow-light);color:#F57F17;padding:3px 10px;border-radius:30px;font-size:17px;margin-bottom:4px}
.cr{display:flex;align-items:center;justify-content:center;gap:10px}.ci{width:52px;height:52px;border-radius:50%}
.sp{background:var(--primary-light);border-radius:16px;padding:10px 14px;font-size:20px;position:relative;max-width:400px;text-align:left}.sp::before{content:'';position:absolute;left:-10px;top:50%;transform:translateY(-50%);border:8px solid transparent;border-right-color:var(--primary-light)}
.br{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:4px}
.ob{padding:8px 16px;font-size:28px;font-family:'Jua',sans-serif;border:3px solid var(--border);border-radius:14px;background:var(--card);cursor:pointer;transition:all .2s;min-width:50px}.ob:active{transform:scale(.95)}.ob.ok{background:var(--green-light);border-color:var(--green);animation:bn .4s}.ob.no{background:var(--red-light);border-color:var(--red);animation:sh .4s}
.fb{font-size:19px;min-height:24px;margin-top:2px}.fb.g{color:var(--green)}.fb.b{color:var(--red)}
.nr{display:flex;gap:12px;justify-content:center;margin-top:6px}
.nb{padding:10px 24px;font-size:22px;font-family:'Jua',sans-serif;border:none;border-radius:30px;cursor:pointer;color:#FFF;background:var(--primary)}.nb:active{transform:scale(.95)}.nb:disabled{opacity:.4}
.pi{font-size:18px;color:var(--subtext)}
.sr{display:flex;gap:4px;align-items:center;justify-content:center;flex-wrap:wrap;margin:8px 0}
.sn{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;background:var(--primary-light);color:var(--primary);border:2px solid var(--primary)}
.sn.bl{background:var(--card);border-style:dashed;color:transparent}.sn.bl.rv{color:var(--primary);background:var(--primary-light);border-style:solid;animation:pp .3s}
.sa{font-size:16px;color:var(--subtext)}
.bb{display:inline-flex;width:46px;height:40px;border:3px dashed var(--primary);border-radius:10px;align-items:center;justify-content:center;font-size:26px;color:var(--primary);background:var(--card);margin:0 2px;transition:all .3s}.bb.fl{border-style:solid;background:var(--primary-light);animation:pp .3s}
.rc{background:linear-gradient(135deg,var(--primary-light),#BBDEFB);border-radius:var(--radius);padding:28px 20px;width:100%;text-align:center}
.rs{font-size:56px;color:var(--primary)}.rm{font-size:24px;margin-top:6px}.ct{font-size:20px;color:#F57F17;margin-top:4px}
</style>
</head>
<body>
<div class="logo"><span class="logo-k">K</span><span class="logo-star">✦</span><span class="logo-edu">edu</span></div>
<button class="sound-btn" onclick="tgS()" id="sB">🔊</button>
<div class="sc"><div id="sl"></div></div>
<div class="pi" style="position:fixed;bottom:10px;width:100%;text-align:center" id="pg">1 / 12</div>
<script>
let cur=0,sc=0,co=0,mx=0,snd=true,aC=null;
const KAY='data:image/webp;base64,UklGRi4DAABXRUJQVlA4ICIDAACwDwCdASpAADQAPpE6lkgloyIhLhbdULASCWIAv2tLVJ91/ebfZYmBYRmNbEm3KtppnkA1COlC0qPl8lbpPOMvM2+7Paj7RyTRWkREpTairsQmfIaQHPuysZGp//AZOh/jhXMgf+XukneaTzeAwrYpCptDySjwuW6f1OccbfWCheBXOucqgAD+/0+Dl+AdHcEtL1tgGpY9A3cZGKy5flJPAUKNf9C2LqZ9+c6s+AuIXTKIfLmRciOGPZIJyFt6o2Ve/4UfabBdF9Zbd/7jtqaOPGI+0HBEZ1ShVDFULPS07rBzFVnn6okSBEwMCW3Et+nMjONY1j9eOQ0N4p0HSUGw4amR1CyH5BAwJYiCfsHax0Qq6pKuW9JyrD2znHQzdHZbIs3jLpwvJpdS8u8woJuK0RTRMqh0KXmfn8W+bGDxsgqmaoAPlGdEjAjFEs5MxlTn+BL08u9SP4H9zrlI+YzHznt3aHKf6cbpF+0omk1Vhm6MEN2mx/ulJxh1gf3bBEt05y+ki/fmi8F94yOGBwCds82ya/2W+WP0T6v/uTm27/51s+M7xjXGrtzGcyO6Y7hQCQ5dgBOxoDEvrYyjx/Y3lto+tdsFcdKsIA8H0y+bGenSlLrroFCKyzdSgEjhcma7hsOlT12vjv1idWQ8Ix13zTEzwGBOc2/RX+VXKYjul+rMAThdcqavxooRkgrVnThNyLLkJ7dPaStKwB0dxkzFHSlrJyRc199QMEiDvrh1wNhcoE3Rth45nghKzBePCeHjQujoZfe1vzJmVb1D1/Yge8yF66LAdOTH2erd2InrQ8OQ5fSfOaPuYYX+3Jyh/Kf+On4ybKylo+tQnNukOi1Pz8c7y8hauJKmtKxCoRUKEW0LC4HlTncAFgomF/eIRa/3dE3S9nq17huadym1imoCs+3h1GgXhmP+MZp+7GXNkOTku6qznRlgOgEH64Ah54EWrhSdk5UoJ3pzjYXt5wgYXVOLfd3Q+7JwSTLym8v+B6p3KFewI5RHShHzbtIf8Nk9U2fx+uoQob5b0Aq5RHXKjAZufVLWiQR665CMzpKxfyAA';

// 슬라이드 데이터
const slides=[
{type:'intro',html:`<div class="c"><div style="font-size:19px;color:var(--primary)">📘 5단원 심화</div><div class="t">50까지의 수 응용</div><div class="bg">⭐⭐ 발전</div><img src="${KAY}" style="width:64px;height:64px;border-radius:50%;margin:8px auto"><div class="d">뛰어세기와 수 패턴으로 실력을 키워요!</div></div><div class="nr"><button class="nb" onclick="nxt()">시작! →</button></div>`},
{type:'concept',html:`<div class="c"><div class="cr"><img src="${KAY}" class="ci"><div class="sp"><b>뛰어세기</b>란 같은 수만큼 반복해서 더하며 세는 거야!</div></div><div style="margin:10px 0;font-size:20px;line-height:2"><div><b>2씩:</b> 2→4→6→8→10</div><div><b>5씩:</b> 5→10→15→20→25</div><div><b>10씩:</b> 10→20→30→40→50</div></div></div><div class="nr"><button class="nb" onclick="nxt()">다음 →</button></div>`},
// Q1-10: 동적 생성
...makeQuizSlides()
];

function makeQuizSlides(){
const qs=[
{bg:'⭐⭐',t:'1. 2씩 뛰어세기',seq:[2,4,6,null,null],ans:[8,10],opts:[8,10,12],step:2,fb:'2씩: 6→8→10!'},
{bg:'⭐⭐',t:'2. 5씩 뛰어세기',seq:[5,10,null,20,null],ans:[15,25],opts:[15,25,30],step:5,fb:'5씩: 10→15, 20→25!'},
{bg:'⭐⭐',t:'3. 10씩 뛰어세기',seq:[10,null,30,null,50],ans:[20,40],opts:[20,40,35],step:10,fb:'10씩: 10→20→30→40→50!'},
{bg:'⭐⭐',t:'4. 2씩 거꾸로',seq:[20,18,null,null,12],ans:[16,14],opts:[16,14,15],step:-2,fb:'거꾸로 2씩: 18→16→14→12!'},
{bg:'⭐⭐',t:'5. 3씩 패턴',seq:[3,6,9,null,null],ans:[12,15],opts:[12,15,11],step:3,fb:'3씩: 9→12→15!'},
{bg:'⭐⭐',t:'6. 5씩 완성',seq:[15,null,null,30,null],ans:[20,25,35],opts:[20,25,35],step:5,fb:'5씩: 15→20→25→30→35!'},
{bg:'⭐⭐',t:'7. 몇씩 뛰어세기?',q:'4, 8, 12, 16, 20 → 몇씩?',ans:4,opts:['2씩','4씩','5씩'],fb:'4씩 뛰어세기!'},
{bg:'⭐⭐',t:'8. 이야기 속 패턴',q:'계단을 2칸씩 올라가요.<br>10번째 칸에서 3번 더 올라가면?',ans:16,opts:[16,13,12],fb:'10+2+2+2=16!'},
{bg:'⭐⭐',t:'9. 거꾸로 10씩',q:'50, 40, 30, ?, 10',ans:20,opts:[20,25,15],fb:'50→40→30→20→10!'},
{bg:'⭐⭐',t:'10. 홀수 패턴',seq:[1,3,5,7,null,null],ans:[9,11],opts:[9,11,10],step:2,fb:'홀수: 7→9→11!'},
];
return qs.map((q,i)=>({type:'quiz',q,idx:i}));
}

function gA(){if(!aC)aC=new(window.AudioContext||window.webkitAudioContext)();return aC;}
function tgS(){snd=!snd;document.getElementById('sB').textContent=snd?'🔊':'🔇';}
function pC(){if(!snd)return;const a=gA();a.resume().then(()=>{[523,659,784].forEach((f,i)=>{const o=a.createOscillator(),g=a.createGain();o.type='sine';o.frequency.value=f;g.gain.value=.15;o.connect(g);g.connect(a.destination);o.start(a.currentTime+i*.12);o.stop(a.currentTime+i*.12+.12);});});}
function pW(){if(!snd)return;const a=gA();a.resume().then(()=>{[220,196].forEach((f,i)=>{const o=a.createOscillator(),g=a.createGain();o.type='sawtooth';o.frequency.value=f;g.gain.value=.1;o.connect(g);g.connect(a.destination);o.start(a.currentTime+i*.15);o.stop(a.currentTime+i*.15+.15);});});}
function pK(){if(!snd)return;const a=gA();a.resume().then(()=>{const o=a.createOscillator(),g=a.createGain();o.type='sine';o.frequency.value=880;g.gain.value=.08;o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+.05);});}

function render(n){
  const sl=document.getElementById('sl');
  const s=slides[n];
  if(s.type==='intro'||s.type==='concept'){sl.innerHTML=`<div class="s a">${s.html}</div>`;}
  else if(s.type==='quiz'){renderQuiz(sl,s.q,s.idx);}
  else if(s.type==='result'){sl.innerHTML=`<div class="s a">${s.html}</div>`;}
  document.getElementById('pg').textContent=`${n+1} / ${slides.length+1}`;
}

function renderQuiz(sl,q,idx){
  let h=`<div class="s a"><div class="c"><div class="bg">${q.bg}</div><div class="t">${q.t}</div>`;
  if(q.seq){
    h+=`<div class="sr">`;
    let blankIdx=0;
    q.seq.forEach((v,i)=>{
      if(i>0)h+=`<div class="sa">→</div>`;
      if(v===null){h+=`<div class="sn bl" id="sq${idx}_${blankIdx}">${q.ans[blankIdx]}</div>`;blankIdx++;}
      else h+=`<div class="sn">${v}</div>`;
    });
    h+=`</div><div class="br" id="opts${idx}"></div>`;
  } else {
    h+=`<div class="d" style="font-size:18px;margin:8px 0">${q.q}</div><div class="br" id="opts${idx}"></div>`;
  }
  h+=`<div class="fb" id="fb${idx}"></div></div><div class="nr"><button class="nb" id="nx${idx}" onclick="nxt()" disabled>다음 →</button></div></div>`;
  sl.innerHTML=h;
  // 보기 생성
  const opts=document.getElementById('opts'+idx);
  if(q.seq){
    const shuffled=[...q.opts].sort(()=>Math.random()-.5);
    let step=0;
    shuffled.forEach(v=>{
      const b=document.createElement('button');b.className='ob';b.textContent=v;
      b.onclick=function(){
        if(v===q.ans[step]){pK();document.getElementById(`sq${idx}_${step}`).classList.add('rv');this.style.visibility='hidden';step++;
          if(step>=q.ans.length){pC();document.getElementById('fb'+idx).textContent=q.fb;document.getElementById('fb'+idx).className='fb g';sc+=25;co++;if(co>mx)mx=co;document.getElementById('nx'+idx).disabled=false;}
        }else{pW();document.getElementById('fb'+idx).textContent='순서대로 빈칸을 채워요!';document.getElementById('fb'+idx).className='fb b';this.classList.add('no');setTimeout(()=>this.classList.remove('no'),500);}
      };opts.appendChild(b);
    });
  } else {
    q.opts.forEach(v=>{
      const b=document.createElement('button');b.className='ob';b.textContent=v;
      b.onclick=function(){
        const correct=(typeof q.ans==='number')?v===q.ans:v===q.ans+'씩';
        if(correct){pC();document.getElementById('fb'+idx).textContent=q.fb;document.getElementById('fb'+idx).className='fb g';this.classList.add('ok');sc+=25;co++;if(co>mx)mx=co;document.getElementById('nx'+idx).disabled=false;opts.querySelectorAll('.ob').forEach(b=>b.onclick=null);}
        else{pW();document.getElementById('fb'+idx).textContent='다시 생각해 봐요!';document.getElementById('fb'+idx).className='fb b';this.classList.add('no');setTimeout(()=>this.classList.remove('no'),500);}
      };opts.appendChild(b);
    });
  }
}

function nxt(){cur++;if(cur<slides.length)render(cur);else showResult();}
function showResult(){
  const sl=document.getElementById('sl');
  const pct=sc/250*100;
  let msg=pct>=90?'뛰어세기 마스터! 🌟':pct>=70?'잘했어요! 😊':pct>=50?'좋아요! 💪':'다시 도전! 🔄';
  sl.innerHTML=`<div class="s a"><div class="rc"><div class="t">응용 완료!</div><div class="rs">${sc}점</div><div class="rm">${msg}</div>${mx>=3?`<div class="ct">🔥 최대 연속: ${mx}개!</div>`:''}<img src="${KAY}" style="width:64px;height:64px;border-radius:50%;margin:10px auto"></div><div class="nr"><button class="nb" onclick="location.reload()">다시 하기</button></div></div>`;
  document.getElementById('pg').textContent=`${slides.length+1} / ${slides.length+1}`;
}

render(0);
</script>
</body>
</html>
