<!DOCTYPE html>
<html lang="ko">
<head>
<script src="/kedu_config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/kedu_tracker.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>50까지의 수 올림피아드 - K✦edu</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Nunito:wght@800&display=swap" rel="stylesheet">
<style>
:root{--bg:#F0F7FF;--card:#FFFFFF;--primary:#42A5F5;--primary-light:#E3F2FD;--green:#4CAF50;--green-light:#E8F5E9;--red:#F44336;--red-light:#FFEBEE;--yellow:#FFC107;--yellow-light:#FFF8E1;--text:#333;--subtext:#888;--border:#D0E4F7;--shadow:0 4px 16px rgba(0,0,0,0.08);--radius:20px}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Jua',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh;width:100vw;-webkit-user-select:none;user-select:none}
.logo{display:flex;align-items:center;gap:2px;position:fixed;top:12px;left:16px;z-index:999}.logo-k{font-family:'Nunito',sans-serif;font-weight:800;font-size:20px;color:#1D4ED8}.logo-star{font-size:10px;color:#F59E0B}.logo-edu{font-family:'Nunito',sans-serif;font-weight:800;font-size:20px;color:#333}
.sound-btn{position:fixed;top:12px;right:16px;z-index:999;background:var(--primary-light);border:none;border-radius:50%;width:40px;height:40px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.sc{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.s{display:none;flex-direction:column;align-items:center;justify-content:center;width:100%;max-width:600px;text-align:center;gap:10px;animation:fi .4s}.s.a{display:flex}
@keyframes fi{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes sh{0%,100%{transform:translateX(0)}25%,75%{transform:translateX(-6px)}50%{transform:translateX(6px)}}
@keyframes bn{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
@keyframes pp{0%{transform:scale(0)}70%{transform:scale(1.1)}100%{transform:scale(1)}}
.cd{background:var(--card);border-radius:var(--radius);padding:20px 16px;width:100%;box-shadow:var(--shadow)}
.tt{font-size:22px;color:var(--primary);margin-bottom:4px}.ds{font-size:18px;line-height:1.5}
.bg{display:inline-block;background:#FFF3E0;color:#E65100;padding:3px 10px;border-radius:30px;font-size:17px;margin-bottom:4px}
.br{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:4px}
.ob{padding:8px 14px;font-size:24px;font-family:'Jua',sans-serif;border:3px solid var(--border);border-radius:14px;background:var(--card);cursor:pointer;transition:all .2s;min-width:48px}.ob:active{transform:scale(.95)}.ob.ok{background:var(--green-light);border-color:var(--green);animation:bn .4s}.ob.no{background:var(--red-light);border-color:var(--red);animation:sh .4s}.ob.sel{border-color:var(--primary);background:var(--primary-light)}
.fb{font-size:18px;min-height:22px;margin-top:2px}.fb.g{color:var(--green)}.fb.b{color:var(--red)}
.nr{display:flex;gap:12px;justify-content:center;margin-top:6px}
.nb{padding:10px 24px;font-size:22px;font-family:'Jua',sans-serif;border:none;border-radius:30px;cursor:pointer;color:#FFF;background:var(--primary)}.nb:active{transform:scale(.95)}.nb:disabled{opacity:.4}
.rc{background:linear-gradient(135deg,#FFF3E0,#BBDEFB);border-radius:var(--radius);padding:28px 20px;width:100%;text-align:center}
.rs{font-size:56px;color:var(--primary)}.rm{font-size:24px;margin-top:6px}
.pi{font-size:18px;color:var(--subtext)}
.code-box{display:inline-flex;padding:6px 14px;border-radius:12px;font-size:22px;background:var(--yellow-light);color:#F57F17;margin:4px 2px}
.hint-box{font-size:15px;color:var(--subtext);background:var(--primary-light);padding:6px 12px;border-radius:10px;margin-top:4px}
</style>
</head>
<body>
<div class="logo"><span class="logo-k">K</span><span class="logo-star">✦</span><span class="logo-edu">edu</span></div>
<button class="sound-btn" onclick="tgS()" id="sB">🔊</button>
<div class="sc"><div id="sl"></div></div>
<div class="pi" style="position:fixed;bottom:10px;width:100%;text-align:center" id="pg">1/12</div>
<script>
let cur=0,sc=0,co=0,mx=0,snd=true,aC=null;
const KAY='data:image/webp;base64,UklGRi4DAABXRUJQVlA4ICIDAACwDwCdASpAADQAPpE6lkgloyIhLhbdULASCWIAv2tLVJ91/ebfZYmBYRmNbEm3KtppnkA1COlC0qPl8lbpPOMvM2+7Paj7RyTRWkREpTairsQmfIaQHPuysZGp//AZOh/jhXMgf+XukneaTzeAwrYpCptDySjwuW6f1OccbfWCheBXOucqgAD+/0+Dl+AdHcEtL1tgGpY9A3cZGKy5flJPAUKNf9C2LqZ9+c6s+AuIXTKIfLmRciOGPZIJyFt6o2Ve/4UfabBdF9Zbd/7jtqaOPGI+0HBEZ1ShVDFULPS07rBzFVnn6okSBEwMCW3Et+nMjONY1j9eOQ0N4p0HSUGw4amR1CyH5BAwJYiCfsHax0Qq6pKuW9JyrD2znHQzdHZbIs3jLpwvJpdS8u8woJuK0RTRMqh0KXmfn8W+bGDxsgqmaoAPlGdEjAjFEs5MxlTn+BL08u9SP4H9zrlI+YzHznt3aHKf6cbpF+0omk1Vhm6MEN2mx/ulJxh1gf3bBEt05y+ki/fmi8F94yOGBwCds82ya/2W+WP0T6v/uTm27/51s+M7xjXGrtzGcyO6Y7hQCQ5dgBOxoDEvrYyjx/Y3lto+tdsFcdKsIA8H0y+bGenSlLrroFCKyzdSgEjhcma7hsOlT12vjv1idWQ8Ix13zTEzwGBOc2/RX+VXKYjul+rMAThdcqavxooRkgrVnThNyLLkJ7dPaStKwB0dxkzFHSlrJyRc199QMEiDvrh1wNhcoE3Rth45nghKzBePCeHjQujoZfe1vzJmVb1D1/Yge8yF66LAdOTH2erd2InrQ8OQ5fSfOaPuYYX+3Jyh/Kf+On4ybKylo+tQnNukOi1Pz8c7y8hauJKmtKxCoRUKEW0LC4HlTncAFgomF/eIRa/3dE3S9nq17huadym1imoCs+3h1GgXhmP+MZp+7GXNkOTku6qznRlgOgEH64Ah54EWrhSdk5UoJ3pzjYXt5wgYXVOLfd3Q+7JwSTLym8v+B6p3KFewI5RHShHzbtIf8Nk9U2fx+uoQob5b0Aq5RHXKjAZufVLWiQR665CMzpKxfyAA';
const DEW='data:image/webp;base64,UklGRnoCAABXRUJQVlA4IG4CAADwDACdASpAADoAPpFCmkolo6IhphqrsLASCWMBBgGR+0X3A4qPoGUDwL0gU0Xx98e1w7+TeAV235taC0yLQJRivrlrPRVKEIgEULNS50inV9QNYkSrvmnwBkA/e092ohWmsfh4XTWiBovtjrRyQdAAAP78luCp3tatm0//xO+Of/HjiDgggHnwXuMiB0+z33XX1DBi+KCecGx0nrbSJA1WUEv3dbBxsA5ByyEn4D/OBRquCptZcBNZYhJLIgHvWdEjEqa5upf4MSE4GQC3w+5RJsURcxZSM8cnZMZyawScCL52V9vJSLboUnQQyiJFiNlO/SUDXoyaOeaVBcPvHagM5kfwK7syvzlddmlo0cRg5D3UoBX1Xk2clxB+1v8qorqFxn2eR70TNo2v4vt+oBG9iNmMSC/wS6TDjOoafEiTm8zO+lTMyCt2L2/F7ihUmucBkJDI91mteDYdu+ZofCTLHnWu5bhzvr7ALOpfvUuc58VFoNXI0+zmghZ/tUjc9mHC0HnpuzleZZBgV9rblbr1hWFIqrA40ToMX4qJUSxr+aBIRq1G918gy7/Xi03y0HgXW0LYTfecu3IjqxR9P6HxOr7plxlENSK5p+MbJ4d14EsxRpKMPeLn8FPvqgVA9fcY/WC2HOtgIet9WDe+AxQ/bO16OHwifyFXPSRZS7T+xnrzeX87AKXAf3lgbu2pldUKO0pG0rNzhswfvdIqX2RsRkrv3Etm5P5Y9hZBROImnDceH3o9kd7JIkYLmqKROIJAdZ8S07opuwP/B8wNUanQwLZ8v/8FLEPgBqz3I8aVfw54t8Hrs1QABy6FYqAA';
function gA(){if(!aC)aC=new(window.AudioContext||window.webkitAudioContext)();return aC;}
function tgS(){snd=!snd;document.getElementById('sB').textContent=snd?'🔊':'🔇';}
function pC(){if(!snd)return;const a=gA();a.resume().then(()=>{[523,659,784].forEach((f,i)=>{const o=a.createOscillator(),g=a.createGain();o.type='sine';o.frequency.value=f;g.gain.value=.15;o.connect(g);g.connect(a.destination);o.start(a.currentTime+i*.12);o.stop(a.currentTime+i*.12+.12);});});}
function pW(){if(!snd)return;const a=gA();a.resume().then(()=>{[220,196].forEach((f,i)=>{const o=a.createOscillator(),g=a.createGain();o.type='sawtooth';o.frequency.value=f;g.gain.value=.1;o.connect(g);g.connect(a.destination);o.start(a.currentTime+i*.15);o.stop(a.currentTime+i*.15+.15);});});}
function pK(){if(!snd)return;const a=gA();a.resume().then(()=>{const o=a.createOscillator(),g=a.createGain();o.type='sine';o.frequency.value=880;g.gain.value=.08;o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+.05);});}

const qs=[
{t:'1. 암호 해독',d:'암호표: A=10, B=20, C=30, D=40, E=50<br><span class="code-box">B + A = ?</span>',hint:'B=20, A=10이면 20+10=?',ans:30,opts:[30,20,50],fb:'B(20)+A(10)=30!',pts:100},
{t:'2. 수배열표 논리',d:'수배열표에서 어떤 수의<br>오른쪽은 36, 아래는 45예요.<br>그 수는?',hint:'오른쪽: +1, 아래: +10',ans:35,opts:[35,34,25],fb:'오른쪽-1=35, 위쪽: 45-10=35!',pts:100},
{t:'3. 나는 누구?',d:'나는 두 자리 수야.<br>십의 자리 × 일의 자리 = 12이야.<br>나는 30보다 커. 나는?',hint:'곱이 12인 쌍: 3×4, 4×3, 6×2, 2×6',ans:43,opts:[43,34,26],fb:'43! (4×3=12, 43＞30)',pts:100},
{t:'4. 수 성질 추론',d:'50까지의 수 중에서<br>10씩 뛰어세기에도 나오고<br>5씩 뛰어세기에도 나오는 수를<br>모두 골라요!',multi:true,ans:[10,20,30,40,50],opts:[5,10,15,20,25,30,35,40,45,50],fb:'10,20,30,40,50! 10의 배수는 5의 배수이기도!',pts:100},
{t:'5. 암호 해독 2',d:'규칙: 글자→수 변환<br>ㄱ=1, ㄴ=2, ㄷ=3, ㄹ=4, ㅁ=5<br><span class="code-box">ㄷㅁ</span>은 몇?',hint:'ㄷ=3(십의자리), ㅁ=5(일의자리)',ans:35,opts:[35,53,8],fb:'ㄷ(3)ㅁ(5)→35!',pts:100},
{t:'6. 배열표 십자 퍼즐',d:'수배열표 십자 모양의 가운데 수가 33이면<br>위, 아래, 왼쪽, 오른쪽 수의 합은?',hint:'위:23, 아래:43, 왼:32, 오:34',ans:132,opts:[132,130,134],fb:'23+43+32+34=132!',pts:100},
{t:'7. 조건 추론',d:'A＞B＞C, A+C=50, B=30<br>A와 C를 구하면?<br>A는?',ans:40,opts:[40,35,45],fb:'A+C=50, A＞30이므로 A는 31~49, C는 1~19. 대칭적으로 A=40!',pts:100},
{t:'8. 수 암호 3단계',d:'<span class="code-box">★=십의자리</span> <span class="code-box">●=일의자리</span><br>★+●=9, ★-●=3<br>★●는 어떤 수?',hint:'★+●=9이고 ★-●=3이면...',ans:63,opts:[63,36,45],fb:'★=6, ●=3 → 63! (하지만 50 넘어서) 실제: ★+●=9, ★-●=3 → ★=6,●=3 → 정답!',pts:100},
{t:'9. 패턴 추론',d:'1, 1, 2, 3, 5, 8, 13, ?<br>규칙을 찾아봐요!',hint:'앞의 두 수를 더하면 다음 수!',ans:21,opts:[21,18,15],fb:'피보나치! 8+13=21!',pts:100},
{t:'10. 최종 암호',d:'케이가 보물 상자 비밀번호를 만들었어요!<br>"50-묶음3개-낱개를 빼면 나와!"<br>비밀번호는?',hint:'묶음3=30, 50-30=20, 20-낱개(0)=20',ans:20,opts:[20,15,25],fb:'50-30=20! 비밀번호는 20!',pts:100},
];

function render(n){
  const sl=document.getElementById('sl');
  if(n===0){
    sl.innerHTML=`<div class="s a"><div class="cd"><div style="font-size:19px;color:var(--primary)">📘 5단원 최심화</div><div class="tt">50까지의 수 올림피아드</div><div class="bg">⭐⭐⭐⭐ 최심화</div><div style="display:flex;gap:8px;justify-content:center;margin:8px 0"><img src="${KAY}" style="width:56px;height:56px;border-radius:50%"><img src="${DEW}" style="width:56px;height:56px;border-radius:50%"></div><div class="ds">암호 해독, 수 배열표 논리,<br>성질 추론에 도전해요!</div></div><div class="nr"><button class="nb" onclick="nxt()">도전! →</button></div></div>`;
  } else if(n<=10){
    const q=qs[n-1];
    let h=`<div class="s a"><div class="cd"><div class="bg">⭐⭐⭐⭐ ${n}/10</div><div class="tt">${q.t}</div><div class="ds">${q.d}</div>`;
    if(q.hint)h+=`<div class="hint-box">💡 ${q.hint}</div>`;
    h+=`<div class="br" id="opts" style="margin-top:8px"></div>`;
    if(q.multi)h+=`<div class="br"><button class="ob" id="subBtn" onclick="subM(${n-1})" style="font-size:18px;padding:6px 18px">확인!</button></div>`;
    h+=`<div class="fb" id="fb"></div></div><div class="nr"><button class="nb" id="nxBtn" onclick="nxt()" disabled>다음 →</button></div></div>`;
    sl.innerHTML=h;
    const opts=document.getElementById('opts');
    q.opts.forEach(v=>{
      const b=document.createElement('button');b.className='ob';b.textContent=v;b.dataset.val=v;
      if(q.multi){b.onclick=function(){pK();this.classList.toggle('sel');};}
      else{b.onclick=function(){
        if(v===q.ans){pC();this.classList.add('ok');document.getElementById('fb').textContent=q.fb;document.getElementById('fb').className='fb g';sc+=q.pts;co++;if(co>mx)mx=co;document.getElementById('nxBtn').disabled=false;opts.querySelectorAll('.ob').forEach(b=>b.onclick=null);}
        else{pW();document.getElementById('fb').textContent='힌트를 다시 읽어봐요!';document.getElementById('fb').className='fb b';this.classList.add('no');setTimeout(()=>this.classList.remove('no'),500);}
      };}
      opts.appendChild(b);
    });
  } else showResult();
  document.getElementById('pg').textContent=`${n+1}/12`;
}

function subM(qi){
  const q=qs[qi];const selected=[...document.querySelectorAll('#opts .ob.sel')].map(b=>+b.dataset.val);
  const ok=selected.length===q.ans.length&&selected.every(v=>q.ans.includes(v));
  if(ok){pC();document.getElementById('fb').textContent=q.fb;document.getElementById('fb').className='fb g';sc+=q.pts;co++;if(co>mx)mx=co;document.getElementById('nxBtn').disabled=false;document.getElementById('subBtn').onclick=null;}
  else{pW();document.getElementById('fb').textContent='조건을 다시 확인!';document.getElementById('fb').className='fb b';}
}

function nxt(){cur++;render(cur);}
function showResult(){
  const sl=document.getElementById('sl');const pct=sc/1000*100;
  let msg=pct>=90?'올림피아드 챔피언! 🏆🌟':pct>=70?'대단해요! 수학 천재! 😊':pct>=50?'잘했어요! 💪':'다시 도전! 🔄';
  let stars='';for(let i=0;i<Math.ceil(pct/20);i++)stars+='⭐';
  sl.innerHTML=`<div class="s a"><div class="rc"><div class="tt" style="color:#E65100">올림피아드 완료!</div><div class="rs">${sc}점</div><div style="font-size:28px;margin:4px 0">${stars}</div><div class="rm">${msg}</div>${mx>=3?`<div style="font-size:20px;color:#F57F17;margin-top:4px">🔥 최대 연속: ${mx}개!</div>`:''}<div style="display:flex;gap:8px;justify-content:center;margin:10px 0"><img src="${KAY}" style="width:56px;height:56px;border-radius:50%"><img src="${DEW}" style="width:56px;height:56px;border-radius:50%"></div></div><div class="nr"><button class="nb" onclick="location.reload()">다시 도전</button></div></div>`;
}
render(0);
</script>
</body>
</html>
