*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:#F5F7FA;min-height:100vh;color:#1A202C}

/* TOP BAR */
.top-bar{background:#fff;border-bottom:1px solid #E2E8F0;height:52px;display:flex;align-items:center;padding:0 24px;gap:12px}
.back-link{display:inline-flex;align-items:center;gap:6px;font-size:14px;color:#718096;text-decoration:none;font-weight:500;transition:color .15s}
.back-link:hover{color:#1A202C}
.top-title{font-family:'Jua',sans-serif;font-size:16px;color:#1A202C}

/* MAIN */
main{max-width:800px;margin:0 auto;padding:28px 20px 60px}

/* HEADER */
.page-header{display:flex;align-items:center;gap:14px;margin-bottom:32px}
.subject-badge{display:inline-flex;align-items:center;gap:6px;padding:8px 20px;border-radius:50px;font-family:'Jua',sans-serif;font-size:18px;color:#fff;background:#FF85A1}
.page-title{font-family:'Jua',sans-serif;font-size:26px}

/* UNIT SECTION */
.unit-section{margin-bottom:28px}
.unit-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid #E2E8F0}
.unit-num{width:36px;height:36px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:'Jua',sans-serif;font-size:16px;color:#fff}
.unit-name{font-family:'Jua',sans-serif;font-size:18px;color:#1A202C}
.unit-count{font-size:13px;color:#A0AEC0;margin-left:auto}

/* LESSON LIST */
.lesson-list{display:flex;flex-direction:column;gap:8px}
.lesson-card{display:flex;align-items:center;gap:14px;background:#fff;border-radius:14px;padding:14px 18px;box-shadow:0 1px 8px rgba(0,0,0,.05);cursor:pointer;text-decoration:none;color:#1A202C;border:2px solid transparent;transition:transform .15s,border-color .15s,box-shadow .15s}
.lesson-card:hover{transform:translateY(-2px);border-color:var(--uc);box-shadow:0 6px 20px rgba(0,0,0,.1)}
.lesson-num{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Jua',sans-serif;font-size:14px;color:#fff;background:var(--uc);flex-shrink:0}
.lesson-title{font-size:14px;font-weight:500;flex:1}
.lesson-arrow{color:#CBD5E0;font-size:16px}
.lesson-badge{font-size:11px;padding:2px 8px;border-radius:50px;font-weight:500}
.badge-tb{background:#EBF8FF;color:#2B6CB0}
.badge-adv{background:#FFF5F5;color:#C53030}

/* FOOTER */
footer{text-align:center;padding:18px 24px;border-top:1px solid #E2E8F0;background:#fff}
.footer-text{font-size:12px;color:#A0AEC0}
.footer-text strong{color:#718096;font-weight:500}

@media(max-width:600px){
  .page-header{flex-direction:column;align-items:flex-start;gap:8px}
  .page-title{font-size:22px}
  .lesson-card{padding:12px 14px}
