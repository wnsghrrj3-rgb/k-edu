<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-edu 2학년 영어 심화 04 - 복합어</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
<style>
:root{--bg:#F0FFF0;--card:#FFFFFF;--primary:#43A047;--primary-light:#E0F5E0;--secondary:#66BB6A;--green:#4CAF50;--green-light:#E8F5E9;--red:#F44336;--red-light:#FFEBEE;--yellow:#FFC107;--yellow-light:#FFF8E1;--text:#333;--subtext:#888;--border:#C8E6C9;--shadow:0 4px 16px rgba(0,0,0,0.08);--radius:20px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Jua',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column;user-select:none;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,0.08);flex-shrink:0;}
.topbar-left{display:flex;align-items:center;gap:10px;}
.sound-btn{background:none;border:none;cursor:pointer;font-size:24px;padding:4px 8px;border-radius:10px;}
.topbar-title{font-size:20px;color:var(--primary);}
.logo{width:32px;height:32px;background:linear-gradient(135deg,#2196F3,#1565C0);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:bold;position:relative;}
.logo::after{content:'⭐';position:absolute;top:-2px;right:-4px;font-size:10px;}
.slide-area{flex:1;overflow:hidden;position:relative;}
.slide{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .4s,transform .4s;}
.slide.active{opacity:1;pointer-events:auto;transform:translateX(0);}
.slide.left{transform:translateX(-60px);}
.slide.right{transform:translateX(60px);}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:26px 22px;max-width:600px;width:100%;text-align:center;max-height:calc(100vh - 130px);overflow-y:auto;}
.slide-title{font-size:22px;color:var(--primary);margin-bottom:12px;}
.badge{display:inline-block;background:var(--yellow-light);color:#E6A000;padding:4px 12px;border-radius:20px;font-size:18px;margin-bottom:10px;}
.big-word{font-size:56px;color:var(--primary);margin:12px 0;line-height:1.2;}
.desc{font-size:24px;color:var(--text);margin:10px 0;line-height:1.5;}
.desc-sub{font-size:22px;color:var(--subtext);margin:6px 0;}
.emoji-big{font-size:80px;margin:10px 0;}
.options{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin-top:14px;}
.opt-btn{font-family:'Jua',sans-serif;font-size:48px;padding:14px 24px;border-radius:16px;border:3px solid var(--border);background:#fff;cursor:pointer;transition:all .2s;min-width:100px;}
.opt-btn:active{transform:scale(0.95);}
.opt-btn.correct{border-color:var(--green);background:var(--green-light);}
.opt-btn.wrong{border-color:var(--red);background:var(--red-light);animation:shake .4s;}
.opt-btn.disabled{pointer-events:none;opacity:.6;}
.opt-btn-sm{font-size:28px;padding:10px 18px;}
.col-options{display:flex;flex-direction:column;gap:10px;margin-top:14px;align-items:center;}
.col-btn{font-family:'Jua',sans-serif;font-size:26px;padding:12px 24px;border-radius:14px;border:3px solid var(--border);background:#fff;cursor:pointer;transition:all .2s;width:90%;max-width:420px;}
.col-btn:active{transform:scale(0.97);}
.col-btn.correct{border-color:var(--green);background:var(--green-light);}
.col-btn.wrong{border-color:var(--red);background:var(--red-light);animation:shake .4s;}
.col-btn.disabled{pointer-events:none;opacity:.6;}
.ox-row{display:flex;gap:16px;justify-content:center;margin-top:14px;}
.ox-btn{font-family:'Jua',sans-serif;font-size:64px;width:100px;height:100px;border-radius:50%;border:4px solid var(--border);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.ox-btn.correct{border-color:var(--green);background:var(--green-light);}
.ox-btn.wrong{border-color:var(--red);background:var(--red-light);animation:shake .4s;}
.blank-box{display:inline-block;min-width:100px;border-bottom:4px solid var(--primary);font-size:44px;padding:4px 8px;margin:0 4px;color:var(--primary);min-height:52px;}
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px;}
.match-item{font-family:'Jua',sans-serif;font-size:26px;padding:12px;border-radius:14px;border:3px solid var(--border);background:#fff;cursor:pointer;transition:all .2s;text-align:center;}
.match-item.selected{border-color:var(--primary);background:var(--primary-light);}
.match-item.matched{border-color:var(--green);background:var(--green-light);pointer-events:none;}
.match-item.wrong-match{animation:shake .4s;}
.feedback{margin-top:12px;font-size:22px;padding:10px;border-radius:14px;display:none;}
.feedback.show{display:block;}
.feedback.correct-fb{background:var(--green-light);color:var(--green);}
.feedback.wrong-fb{background:var(--red-light);color:var(--red);}
.char-speech{display:flex;align-items:flex-start;gap:12px;text-align:left;margin:12px 0;padding:14px;background:var(--primary-light);border-radius:16px;}
.char-img{font-size:48px;flex-shrink:0;}
.char-text{font-size:24px;line-height:1.5;}
.tts-btn{font-family:'Jua',sans-serif;font-size:22px;padding:8px 16px;border-radius:12px;border:2px solid var(--primary);background:var(--primary-light);color:var(--primary);cursor:pointer;margin:6px 4px;}
.combo-box{display:flex;align-items:center;justify-content:center;gap:6px;margin:14px 0;font-size:40px;flex-wrap:wrap;}
.combo-part{padding:8px 16px;border-radius:14px;background:var(--primary-light);color:var(--primary);}
.combo-plus{font-size:36px;color:var(--subtext);}
.combo-eq{font-size:36px;color:var(--subtext);}
.combo-result{padding:8px 16px;border-radius:14px;background:var(--yellow-light);color:#E6A000;}
.order-zone{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:14px;min-height:64px;border:3px dashed var(--border);border-radius:16px;padding:12px;background:var(--primary-light);}
.order-item{font-family:'Jua',sans-serif;font-size:32px;padding:10px 16px;border-radius:14px;background:#fff;border:3px solid var(--border);cursor:pointer;transition:all .2s;}
.order-item:active{transform:scale(0.95);}
.order-item.placed{opacity:.3;pointer-events:none;}
.answer-zone{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:12px 0;min-height:56px;}
.answer-slot{font-size:32px;padding:8px 16px;border-radius:14px;background:var(--yellow-light);border:2px solid var(--yellow);cursor:pointer;}
.score-display{font-size:28px;margin:14px 0;}
.score-bar{width:100%;height:20px;background:#eee;border-radius:10px;overflow:hidden;margin:8px 0;}
.score-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--secondary));border-radius:10px;transition:width .5s;}
.result-emoji{font-size:100px;margin:14px 0;}
.result-msg{font-size:30px;margin:8px 0;}
.result-detail{font-size:22px;color:var(--subtext);}
.nav{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:#fff;box-shadow:0 -2px 8px rgba(0,0,0,0.06);flex-shrink:0;}
.nav-btn{font-family:'Jua',sans-serif;font-size:22px;padding:10px 24px;border-radius:14px;border:none;cursor:pointer;transition:all .2s;}
.nav-prev{background:var(--primary-light);color:var(--primary);}
.nav-next{background:var(--primary);color:#fff;}
.nav-btn:disabled{opacity:.3;cursor:default;}
.page-info{font-size:18px;color:var(--subtext);}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.animate-in{animation:fadeUp .5s ease-out;}
</style>
</head>

let soundOn=true,audioCtx=null;
function getCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function playCorrect(){if(!soundOn)return;const c=getCtx();audioCtx.resume().then(()=>{[523,659,784].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=f;g.gain.value=.12;o.connect(g);g.connect(c.destination);o.start(c.currentTime+i*.12);o.stop(c.currentTime+i*.12+.12);});});}
function playWrong(){if(!soundOn)return;const c=getCtx();audioCtx.resume().then(()=>{[220,196].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.type='sawtooth';o.frequency.value=f;g.gain.value=.08;o.connect(g);g.connect(c.destination);o.start(c.currentTime+i*.15);o.stop(c.currentTime+i*.15+.15);});});}
function playClick(){if(!soundOn)return;const c=getCtx();audioCtx.resume().then(()=>{const o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=880;g.gain.value=.08;o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+.06);});}
function toggleSound(){soundOn=!soundOn;document.getElementById('soundToggle').textContent=soundOn?'🔊':'🔇';}
function speak(t){if(!soundOn)return;const u=new SpeechSynthesisUtterance(t);u.lang='en-US';u.rate=0.75;speechSynthesis.cancel();speechSynthesis.speak(u);}

function initQ(){
  // Q1
  mkBtns('q1opts',['sunroom','playroom','bedroom'],3,2,'q1fb','bed+room=bedroom! 🛏️','맞아! bedroom=침실! 🛏️');

function mkBtns(id,opts,si,correct,fbId,wm,rm){const el=document.getElementById(id);opts.forEach((t,i)=>{const b=document.createElement('button');b.className='opt-btn opt-btn-sm';b.textContent=t;b.onclick=()=>checkBtn(si,b,i,correct,fbId,wm,rm);el.appendChild(b);});}
function mkCol(id,opts,si,correct,fbId,wm,rm){const el=document.getElementById(id);opts.forEach((t,i)=>{const b=document.createElement('button');b.className='col-btn';b.textContent=t;b.onclick=()=>checkCol(si,b,i,correct,fbId,wm,rm);el.appendChild(b);});}

function initQ4(){
  const grid=document.getElementById('q4match');
  const pairs=[{l:'sun',r:'shine'},{l:'play',r:'ground'},{l:'rain',r:'bow'}];
  const rights=['ground','bow','shine'];
  let selL=null,matched=0;
  pairs.forEach((p,i)=>{
    const lD=document.createElement('div');lD.className='match-item';lD.textContent=p.l;lD.dataset.idx=i;lD.dataset.side='l';
    lD.onclick=()=>{if(lD.classList.contains('matched'))return;document.querySelectorAll('#q4match .match-item[data-side="l"]').forEach(e=>e.classList.remove('selected'));lD.classList.add('selected');selL=i;};
    const rD=document.createElement('div');rD.className='match-item';rD.textContent=rights[i];rD.dataset.rval=rights[i];rD.dataset.side='r';
    rD.onclick=()=>{if(rD.classList.contains('matched')||selL===null)return;if(rights[i]===pairs[selL].r){playCorrect();rD.classList.add('matched');document.querySelector(`#q4match .match-item[data-idx="${selL}"][data-side="l"]`).classList.add('matched');matched++;selL=null;speak(pairs[selL===null?0:selL]?'':pairs.find(p=>p.r===rights[i]).l+rights[i]);if(matched===3){if(!answered[6]){score+=25;answered[6]=true;}showFB('q4fb',true,'완벽! 모두 연결! 🎉');}}else{playWrong();rD.classList.add('wrong-match');setTimeout(()=>rD.classList.remove('wrong-match'),400);}};
    grid.appendChild(lD);grid.appendChild(rD);
  });
}

function initQ6(){
  const pieces=['fly','butter'];
  const correct=['butter','fly'];
  const shuffled=[...pieces].sort(()=>Math.random()-.5);
  const zone=document.getElementById('q6opts');const ans=document.getElementById('q6ans');let placed=[];
  shuffled.forEach(p=>{const d=document.createElement('div');d.className='order-item';d.textContent=p;d.onclick=()=>{if(d.classList.contains('placed'))return;playClick();d.classList.add('placed');placed.push(p);const s=document.createElement('div');s.className='answer-slot';s.textContent=p;s.onclick=()=>{placed=placed.filter(x=>x!==p);d.classList.remove('placed');s.remove();};ans.appendChild(s);if(placed.length===2){if(placed.join('')===correct.join('')){playCorrect();speak('butterfly');if(!answered[8]){score+=25;answered[8]=true;}showFB('q6fb',true,'완벽! butter+fly=butterfly! 🦋');}else{playWrong();showFB('q6fb',false,'다시 해봐! butter가 먼저야! 🦋');setTimeout(()=>{placed=[];ans.innerHTML='';document.querySelectorAll('#q6opts .order-item').forEach(e=>e.classList.remove('placed'));document.getElementById('q6fb').className='feedback';},1200);}}};zone.appendChild(d);});
}

function checkBtn(si,btn,p,c,fb,wm,rm){if(answered[si])return;playClick();if(p===c){playCorrect();btn.classList.add('correct');btn.parentElement.querySelectorAll('.opt-btn,.opt-btn-sm').forEach(b=>b.classList.add('disabled'));score+=parseInt(slides[si].dataset.score);answered[si]=true;showFB(fb,true,rm);}else{playWrong();btn.classList.add('wrong');setTimeout(()=>btn.classList.remove('wrong'),500);showFB(fb,false,wm);}}
function checkOX(si,btn,p,c,fb,wm,rm){if(answered[si])return;playClick();if(p===c){playCorrect();btn.classList.add('correct');score+=parseInt(slides[si].dataset.score);answered[si]=true;showFB(fb,true,rm);}else{playWrong();btn.classList.add('wrong');setTimeout(()=>btn.classList.remove('wrong'),500);showFB(fb,false,wm);}}
function checkCol(si,btn,p,c,fb,wm,rm){if(answered[si])return;playClick();if(p===c){playCorrect();btn.classList.add('correct');btn.parentElement.querySelectorAll('.col-btn').forEach(b=>b.classList.add('disabled'));score+=parseInt(slides[si].dataset.score);answered[si]=true;showFB(fb,true,rm);}else{playWrong();btn.classList.add('wrong');setTimeout(()=>btn.classList.remove('wrong'),500);showFB(fb,false,wm);}}
function showFB(id,ok,msg){const f=document.getElementById(id);f.textContent=msg;f.className='feedback show '+(ok?'correct-fb':'wrong-fb');}

function go(d){const prev=cur;cur=Math.max(0,Math.min(slides.length-1,cur+d));if(cur===prev)return;slides[prev].classList.remove('active');slides[prev].classList.add(d>0?'left':'right');slides[cur].classList.remove('left','right');slides[cur].classList.add('active');if(cur===slides.length-1)showResult();updateNav();}
function updateNav(){document.getElementById('prevBtn').disabled=cur===0;document.getElementById('nextBtn').disabled=cur===slides.length-1;document.getElementById('pageInfo').textContent=`${cur+1} / ${slides.length}`;}
function showResult(){const pct=Math.round(score/total*100);document.getElementById('finalScore').textContent=score;document.getElementById('scoreFill').style.width=pct+'%';let e='🌟',m='잘했어요!',k='복합어 잘 배웠어!';if(pct>=90){e='🏆';m='완벽해요!';k='복합어 마스터! 🧩';}else if(pct>=70){e='🌟';m='훌륭해요!';k='거의 다 맞았어!';}else if(pct>=50){e='💪';m='좋아요!';k='복습하면 완벽!';}else{e='🤗';m='괜찮아요!';k='다시 도전! 💪';}document.getElementById('resultEmoji').textContent=e;document.getElementById('resultMsg').textContent=m;document.getElementById('resultDetail').textContent=`총점: ${score}/${total}점 (${pct}%)`;document.getElementById('resultKay').textContent=k;}
let sx=0;document.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;});document.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-sx;if(Math.abs(dx)>50){dx<0?go(1):go(-1);}});
buildSlides();
</script>
