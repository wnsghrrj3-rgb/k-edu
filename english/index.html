const content = document.getElementById('content');
UNITS.forEach((unit, i) => {
  const section = document.createElement('div');
  section.className = 'unit-section';
  const id = 'level-' + i;
  section.innerHTML = `
    <div class="unit-toggle" style="--uc:${unit.color}" onclick="toggleLevel('${id}',this)">
      <div class="unit-emoji">${unit.emoji}</div>
      <div class="unit-info">
        <div class="unit-name" style="color:${unit.color}">Level ${i+1} · ${unit.name}</div>
        <div class="unit-desc">${unit.desc}</div>
      </div>
      <div class="unit-meta">
        <div class="unit-star">${unit.star}</div>
        <div class="unit-count">${unit.lessons.length}개</div>
      </div>
      <div class="unit-arrow" id="arrow-${id}">›</div>
    </div>
    <div class="lesson-list" id="${id}">
      ${unit.lessons.map(l => `
        <a class="lesson-card" href="${l.file}" style="--uc:${unit.color}">
          <div class="lesson-num">${l.n}</div>
          <div class="lesson-title">${l.title}</div>
          <div class="lesson-arrow">›</div>
        </a>
      `).join('')}
    </div>
  `;
  content.appendChild(section);
});

function toggleLevel(id, el) {
  const list = document.getElementById(id);
  const arrow = document.getElementById('arrow-' + id);
  list.classList.toggle('open');
  arrow.classList.toggle('open');
}
