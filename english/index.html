.area-count{font-size:12px;color:#A0AEC0;font-weight:400;margin-left:auto}
.area-arrow{font-size:14px;color:#CBD5E0;transition:transform .2s}
.area-arrow.open{transform:rotate(90deg)}

footer{text-align:center;padding:18px 24px;border-top:1px solid #E2E8F0;background:#fff}

const content = document.getElementById('content');
GRADES.forEach((grade, gi) => {
  const totalLessons = grade.areas.reduce((s,a) => s + a.lessons.length, 0);
  const gradeId = 'grade-' + gi;
  const section = document.createElement('div');
  section.className = 'grade-section';

  let areasHTML = '';
  grade.areas.forEach((area, ai) => {
    const areaId = `area-${gi}-${ai}`;
    const lessonsHTML = area.lessons.map(l => `
      <a class="lesson-card" href="${l.file}" style="--gc:${grade.color}">
        <div class="lesson-num">${l.n}</div>
        <div class="lesson-title">${l.title}</div>
        <div class="lesson-arrow">›</div>
      </a>
    `).join('');

    areasHTML += `
      <div class="area-block">
        <div class="area-header" style="--gc:${grade.color}" onclick="toggleArea('${areaId}')">
          <span class="area-emoji">${area.emoji}</span>
          <span>${area.name}</span>
          <span class="area-count">${area.lessons.length}개</span>
          <span class="area-arrow" id="arrow-${areaId}">›</span>
        </div>
        <div class="lesson-list" id="${areaId}">
          ${lessonsHTML}
        </div>
      </div>
    `;
  });

  section.innerHTML = `
    <div class="grade-toggle" style="--gc:${grade.color}" onclick="toggleGrade('${gradeId}')">
      <div class="grade-emoji">${grade.emoji}</div>
      <div class="grade-info">
        <div class="grade-name" style="color:${grade.color}">${grade.name}</div>
        <div class="grade-desc">${grade.desc}</div>
      </div>
      <div class="grade-count">${totalLessons}개</div>
      <div class="grade-arrow" id="arrow-${gradeId}">›</div>
    </div>
    <div class="grade-body" id="${gradeId}">
      ${areasHTML}
    </div>
  `;
  content.appendChild(section);
});

function toggleGrade(id) {
  document.getElementById(id).classList.toggle('open');
  document.getElementById('arrow-' + id).classList.toggle('open');
}
function toggleArea(id) {
  document.getElementById(id).classList.toggle('open');
  document.getElementById('arrow-' + id).classList.toggle('open');
}
</script>
