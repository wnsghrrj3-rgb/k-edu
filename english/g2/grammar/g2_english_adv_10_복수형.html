<!DOCTYPE html>
<html lang="ko">
<head>
<script src="/kedu_config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/kedu_tracker.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-edu 2학년 영어 심화 10 - 복수형</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
<style>
:root{--bg:#F0FFF4;--card:#FFFFFF;--primary:#2E7D32;--primary-light:#E0F2E0;--secondary:#43A047;--green:#4CAF50;--green-light:#E8F5E9;--red:#F44336;--red-light:#FFEBEE;--yellow:#FFC107;--yellow-light:#FFF8E1;--text:#333;--subtext:#888;--border:#A8D5A8;--shadow:0 4px 16px rgba(0,0,0,0.08);--radius:20px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Jua',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column;user-select:none;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,0.08);flex-shrink:0;}
.topbar-left{display:flex;align-items:center;gap:10px;}
.sound-btn{background:none;border:none;cursor:pointer;font-size:24px;padding:4px 8px;border-radius:10px;}
.topbar-title{font-size:20px;color:var(--primary);}
.logo{width:32px;height:32px;background:linear-gradient(135deg,#2196F3,#1565C0);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:bold;position:relative;}
.logo::after{content:'⭐';position:absolute;top:-2px;right:-4px;font-size:10px;}
.slide-area{flex:1;overflow:hidden;position:relative;}
.slide{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .4s,transform .4s;}
.slide.active{opacity:1;pointer-events:auto;}.slide.left{transform:translateX(-60px);}.slide.right{transform:translateX(60px);}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px 20px;max-width:600px;width:100%;text-align:center;max-height:calc(100vh - 130px);overflow-y:auto;}
.slide-title{font-size:22px;color:var(--primary);margin-bottom:12px;}
.badge{display:inline-block;background:var(--yellow-light);color:#E6A000;padding:4px 12px;border-radius:20px;font-size:18px;margin-bottom:10px;}
.big-word{font-size:56px;color:var(--primary);margin:12px 0;}
.hl{color:var(--red);font-weight:bold;}
.desc{font-size:24px;margin:10px 0;line-height:1.5;}
.desc-sub{font-size:22px;color:var(--subtext);margin:6px 0;}
.emoji-big{font-size:80px;margin:10px 0;}
.rule-box{background:var(--primary-light);border-radius:16px;padding:16px;margin:12px 0;text-align:left;}
.rule-box .rule{font-size:24px;margin:6px 0;line-height:1.6;}
.options{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin-top:14px;}
.opt-btn{font-family:'Jua',sans-serif;font-size:48px;padding:14px 24px;border-radius:16px;border:3px solid var(--border);background:#fff;cursor:pointer;transition:all .2s;min-width:100px;}
.opt-btn:active{transform:scale(0.95);}
.opt-btn.correct{border-color:var(--green);background:var(--green-light);}
.opt-btn.wrong{border-color:var(--red);background:var(--red-light);animation:shake .4s;}
.opt-btn.disabled{pointer-events:none;opacity:.6;}
.opt-btn-sm{font-size:28px;padding:10px 18px;}
.col-options{display:flex;flex-direction:column;gap:10px;margin-top:14px;align-items:center;}
.col-btn{font-family:'Jua',sans-serif;font-size:26px;padding:12px 22px;border-radius:14px;border:3px solid var(--border);background:#fff;cursor:pointer;transition:all .2s;width:90%;max-width:420px;}
.col-btn:active{transform:scale(0.97);}.col-btn.correct{border-color:var(--green);background:var(--green-light);}.col-btn.wrong{border-color:var(--red);background:var(--red-light);animation:shake .4s;}.col-btn.disabled{pointer-events:none;opacity:.6;}
.ox-row{display:flex;gap:16px;justify-content:center;margin-top:14px;}
.ox-btn{font-family:'Jua',sans-serif;font-size:64px;width:100px;height:100px;border-radius:50%;border:4px solid var(--border);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.ox-btn.correct{border-color:var(--green);background:var(--green-light);}.ox-btn.wrong{border-color:var(--red);background:var(--red-light);animation:shake .4s;}
.blank-box{display:inline-block;min-width:100px;border-bottom:4px solid var(--primary);font-size:44px;padding:4px 8px;margin:0 4px;color:var(--primary);min-height:52px;}
.feedback{margin-top:12px;font-size:22px;padding:10px;border-radius:14px;display:none;}.feedback.show{display:block;}.feedback.correct-fb{background:var(--green-light);color:var(--green);}.feedback.wrong-fb{background:var(--red-light);color:var(--red);}
.char-speech{display:flex;align-items:flex-start;gap:12px;text-align:left;margin:12px 0;padding:14px;background:var(--primary-light);border-radius:16px;}
.char-img{font-size:48px;flex-shrink:0;}.char-text{font-size:24px;line-height:1.5;}
.tts-btn{font-family:'Jua',sans-serif;font-size:22px;padding:8px 16px;border-radius:12px;border:2px solid var(--primary);background:var(--primary-light);color:var(--primary);cursor:pointer;margin:6px 4px;}
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px;}
.match-item{font-family:'Jua',sans-serif;font-size:24px;padding:12px;border-radius:14px;border:3px solid var(--border);background:#fff;cursor:pointer;transition:all .2s;text-align:center;}
.match-item.selected{border-color:var(--primary);background:var(--primary-light);}.match-item.matched{border-color:var(--green);background:var(--green-light);pointer-events:none;}.match-item.wrong-match{animation:shake .4s;}
.score-bar{width:100%;height:20px;background:#eee;border-radius:10px;overflow:hidden;margin:8px 0;}.score-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--secondary));border-radius:10px;transition:width .5s;}
.result-emoji{font-size:100px;margin:14px 0;}.result-msg{font-size:30px;margin:8px 0;}.result-detail{font-size:22px;color:var(--subtext);}
.nav{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:#fff;box-shadow:0 -2px 8px rgba(0,0,0,0.06);flex-shrink:0;}
.nav-btn{font-family:'Jua',sans-serif;font-size:22px;padding:10px 24px;border-radius:14px;border:none;cursor:pointer;}.nav-prev{background:var(--primary-light);color:var(--primary);}.nav-next{background:var(--primary);color:#fff;}.nav-btn:disabled{opacity:.3;cursor:default;}
.page-info{font-size:18px;color:var(--subtext);}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.animate-in{animation:fadeUp .5s ease-out;}
</style>
</head>
<body>
<div class="topbar"><div class="topbar-left"><button class="sound-btn" id="soundToggle" onclick="toggleSound()">🔊</button><span class="topbar-title">복수형 Plurals</span></div><div class="logo">K</div></div>
<div class="slide-area" id="slideArea"></div>
<div class="nav"><button class="nav-btn nav-prev" id="prevBtn" onclick="go(-1)" disabled>◀ 이전</button><span class="page-info" id="pageInfo">1/14</span><button class="nav-btn nav-next" id="nextBtn" onclick="go(1)">다음 ▶</button></div>
<script>
let soundOn=true,audioCtx=null;
function getCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function playCorrect(){if(!soundOn)return;const c=getCtx();audioCtx.resume().then(()=>{[523,659,784].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=f;g.gain.value=.12;o.connect(g);g.connect(c.destination);o.start(c.currentTime+i*.12);o.stop(c.currentTime+i*.12+.12);});});}
function playWrong(){if(!soundOn)return;const c=getCtx();audioCtx.resume().then(()=>{[220,196].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.type='sawtooth';o.frequency.value=f;g.gain.value=.08;o.connect(g);g.connect(c.destination);o.start(c.currentTime+i*.15);o.stop(c.currentTime+i*.15+.15);});});}
function playClick(){if(!soundOn)return;const c=getCtx();audioCtx.resume().then(()=>{const o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=880;g.gain.value=.08;o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+.06);});}
function toggleSound(){soundOn=!soundOn;document.getElementById('soundToggle').textContent=soundOn?'🔊':'🔇';}
function speak(t){if(!soundOn)return;const u=new SpeechSynthesisUtterance(t);u.lang='en-US';u.rate=0.75;speechSynthesis.cancel();speechSynthesis.speak(u);}
let cur=0,score=0,total=0,answered={};const slides=[];

function buildSlides(){
const area=document.getElementById('slideArea');
const data=[
{type:'concept',html:`<div class="card animate-in">
  <div class="emoji-big">🐱🐱🐱</div>
  <div class="big-word" style="font-size:44px;">복수형을 배워요!</div>
  <div class="desc">하나 → 여러 개! 어떻게 바꿀까?</div>
  <div class="char-speech"><div class="char-img">🐶</div><div class="char-text">cat 하나 → cat<span class="hl">s</span> 여러 마리! 🐾<br>영어는 2개 이상이면 뒤에 뭔가를 붙여!</div></div>
</div>`},

{type:'concept',html:`<div class="card animate-in">
  <div class="slide-title">📌 규칙 1: 대부분 +s</div>
  <div class="rule-box">
    <div class="rule">🐱 cat → cat<span class="hl">s</span></div>
    <div class="rule">🐶 dog → dog<span class="hl">s</span></div>
    <div class="rule">📚 book → book<span class="hl">s</span></div>
    <div class="rule">🍎 apple → apple<span class="hl">s</span></div>
  </div>
  <div class="desc-sub">대부분의 단어는 뒤에 s만 붙이면 돼!</div>
</div>`},

{type:'concept',html:`<div class="card animate-in">
  <div class="slide-title">📌 규칙 2~3: +es / y→ies</div>
  <div class="rule-box">
    <div class="rule">📦 box → box<span class="hl">es</span> (x, s, sh, ch 끝)</div>
    <div class="rule">🥪 sandwich → sandwich<span class="hl">es</span></div>
    <div class="rule">👶 baby → bab<span class="hl">ies</span> (자음+y → ies)</div>
    <div class="rule">🍓 strawberry → strawberr<span class="hl">ies</span></div>
  </div>
  <div class="desc-sub">💡 boy → boys (모음+y는 그냥 s!)</div>
</div>`},

{type:'concept',html:`<div class="card animate-in">
  <div class="slide-title">📌 불규칙 복수형!</div>
  <div class="rule-box">
    <div class="rule">👨 man → <span class="hl">men</span></div>
    <div class="rule">👩 woman → <span class="hl">women</span></div>
    <div class="rule">👶 child → <span class="hl">children</span></div>
    <div class="rule">🦷 tooth → <span class="hl">teeth</span></div>
    <div class="rule">🐭 mouse → <span class="hl">mice</span></div>
    <div class="rule">🐟 fish → <span class="hl">fish</span> (그대로!)</div>
  </div>
</div>`},

// Q1 ⭐
{type:'q',correct:0,score:10,html:`<div class="card animate-in"><div class="badge">⭐ 기본</div><div class="slide-title">Q1. cat의 복수형은?</div><div style="font-size:52px;">🐱 → 🐱🐱🐱 = ?</div><div class="options" id="q1opts"></div><div class="feedback" id="q1fb"></div></div>`},

// Q2 ⭐ O/X
{type:'q',correct:1,score:10,html:`<div class="card animate-in"><div class="badge">⭐ 기본</div><div class="slide-title">Q2. O/X 퀴즈!</div><div class="desc" style="background:var(--yellow-light);padding:14px;border-radius:14px;">"box의 복수형은 boxs이다"</div><div class="ox-row" id="q2ox"></div><div class="feedback" id="q2fb"></div></div>`},

// Q3 ⭐
{type:'q',correct:2,score:10,html:`<div class="card animate-in"><div class="badge">⭐ 기본</div><div class="slide-title">Q3. baby의 복수형은?</div><div style="font-size:52px;">👶 → 👶👶 = ?</div><div class="options" id="q3opts"></div><div class="feedback" id="q3fb"></div></div>`},

// Q4 ⭐⭐ 매칭
{type:'q',correct:-1,score:25,html:`<div class="card animate-in"><div class="badge">⭐⭐ 발전</div><div class="slide-title">Q4. 단수와 복수를 연결해요!</div><div class="match-grid" id="q4match"></div><div class="feedback" id="q4fb"></div></div>`},

// Q5 ⭐⭐ 빈칸
{type:'q',correct:1,score:25,html:`<div class="card animate-in"><div class="badge">⭐⭐ 발전</div><div class="slide-title">Q5. 빈칸을 채워요!</div><div class="desc">I have three <span class="blank-box" id="q5blank"></span>.</div><div class="desc-sub">🐟🐟🐟 물고기 3마리!</div><div class="options" id="q5opts"></div><div class="feedback" id="q5fb"></div></div>`},

// Q6 ⭐⭐ 터치토글
{type:'q',correct:-1,score:25,html:`<div class="card animate-in"><div class="badge">⭐⭐ 발전</div><div class="slide-title">Q6. 올바른 복수형만 골라요!</div><div class="options" id="q6opts" style="flex-wrap:wrap;"></div><div style="margin-top:10px;"><button class="tts-btn" onclick="checkQ6()">✅ 확인</button></div><div class="feedback" id="q6fb"></div></div>`},

// Q7 ⭐⭐⭐
{type:'q',correct:0,score:50,html:`<div class="card animate-in"><div class="badge">⭐⭐⭐ 심화</div><div class="slide-title">Q7. 틀린 복수형을 찾아요!</div><div class="col-options" id="q7opts"></div><div class="feedback" id="q7fb"></div></div>`},

// Q8 ⭐⭐⭐
{type:'q',correct:2,score:50,html:`<div class="card animate-in"><div class="badge">⭐⭐⭐ 심화</div><div class="slide-title">Q8. 문장에 알맞은 것은?</div><div class="desc" style="background:var(--primary-light);padding:14px;border-radius:14px;">"Two ______ are playing in the park."</div><div class="desc-sub">👶👶 아이 두 명!</div><div class="col-options" id="q8opts"></div><div class="feedback" id="q8fb"></div></div>`},

// Q9 ⭐⭐⭐⭐
{type:'q',correct:1,score:100,html:`<div class="card animate-in"><div class="badge">⭐⭐⭐⭐ 최심화</div><div class="slide-title">Q9. 모두 맞는 문장은?</div><div class="char-speech"><div class="char-img">🐱</div><div class="char-text">복수형이 전부 올바른 문장을 찾아봐!</div></div><div class="col-options" id="q9opts"></div><div class="feedback" id="q9fb"></div></div>`},

{type:'result',html:`<div class="card animate-in"><div class="slide-title">🎉 학습 완료!</div><div class="result-emoji" id="resultEmoji">🌟</div><div class="result-msg" id="resultMsg"></div><div style="font-size:28px;margin:14px 0;">점수: <b id="finalScore">0</b>점</div><div class="score-bar"><div class="score-fill" id="scoreFill" style="width:0%"></div></div><div class="result-detail" id="resultDetail"></div><div class="char-speech" style="margin-top:14px;"><div class="char-img">🐶</div><div class="char-text" id="resultKay"></div></div></div>`}
];
data.forEach((d,i)=>{const div=document.createElement('div');div.className='slide'+(i===0?' active':'');div.dataset.type=d.type;if(d.score!==undefined){div.dataset.score=d.score;total+=d.score;}div.innerHTML=d.html;area.appendChild(div);slides.push(div);});
initQ();updateNav();
}

function initQ(){
  mkBtns('q1opts',['cats','cates','caties'],4,0,'q1fb','cat+s=cats!','맞아! cats! 🐱🐱');
  const q2=document.getElementById('q2ox');['⭕','❌'].forEach((t,i)=>{const b=document.createElement('button');b.className='ox-btn';b.textContent=t;b.onclick=()=>checkOX(5,b,i,1,'q2fb','box는 x끝! boxes가 맞아!','맞아! boxs ❌ → boxes ⭕!');q2.appendChild(b);});
  mkBtns('q3opts',['babys','babyes','babies'],6,2,'q3fb','자음+y → ies! babies!','맞아! baby → babies! 👶👶');

  // Q4 매칭
  const grid=document.getElementById('q4match');
  const pairs=[{l:'man',r:'men'},{l:'child',r:'children'},{l:'tooth',r:'teeth'},{l:'mouse',r:'mice'}];
  const rights=['children','mice','men','teeth'];
  let selL=null,matched=0;
  pairs.forEach((p,i)=>{
    const lD=document.createElement('div');lD.className='match-item';lD.textContent=p.l;lD.dataset.idx=i;lD.dataset.side='l';
    lD.onclick=()=>{if(lD.classList.contains('matched'))return;document.querySelectorAll('#q4match .match-item[data-side="l"]').forEach(e=>e.classList.remove('selected'));lD.classList.add('selected');selL=i;};
    const rD=document.createElement('div');rD.className='match-item';rD.textContent=rights[i];rD.dataset.rval=rights[i];rD.dataset.side='r';
    rD.onclick=()=>{if(rD.classList.contains('matched')||selL===null)return;if(rights[i]===pairs[selL].r){playCorrect();rD.classList.add('matched');document.querySelector(`#q4match .match-item[data-idx="${selL}"][data-side="l"]`).classList.add('matched');matched++;selL=null;if(matched===4){if(!answered[7]){score+=25;answered[7]=true;}showFB('q4fb',true,'완벽! 불규칙 복수형 마스터! 🎉');}}else{playWrong();rD.classList.add('wrong-match');setTimeout(()=>rD.classList.remove('wrong-match'),400);}};
    grid.appendChild(lD);grid.appendChild(rD);
  });

  // Q5
  const q5=document.getElementById('q5opts');['fishes','fish','fishs'].forEach((t,i)=>{const b=document.createElement('button');b.className='opt-btn opt-btn-sm';b.textContent=t;b.onclick=()=>{document.getElementById('q5blank').textContent=t;checkBtn(8,b,i,1,'q5fb','fish는 단복수 같아! fish!','맞아! fish → fish! 🐟');};q5.appendChild(b);});

  // Q6
  const q6words=[{w:'dogs ✅',ok:true},{w:'boxs ❌',ok:false},{w:'babies ✅',ok:true},{w:'childs ❌',ok:false},{w:'teeth ✅',ok:true},{w:'mouses ❌',ok:false}];
  const q6=document.getElementById('q6opts');
  q6words.forEach(wd=>{const b=document.createElement('button');b.className='opt-btn opt-btn-sm';b.textContent=wd.w.split(' ')[0];b.dataset.ok=wd.ok;b.dataset.on='0';b.onclick=()=>{playClick();if(b.dataset.on==='0'){b.dataset.on='1';b.style.borderColor='var(--primary)';b.style.background='var(--primary-light)';}else{b.dataset.on='0';b.style.borderColor='var(--border)';b.style.background='#fff';}};q6.appendChild(b);});

  mkCol('q7opts',['childs (child의 복수형)','men (man의 복수형)','books (book의 복수형)'],10,0,'q7fb','child → children! childs는 틀려!','맞아! childs ❌ → children ⭕!');
  mkCol('q8opts',['childs','child','children'],11,2,'q8fb','child → children!','맞아! Two children! 👶👶');
  mkCol('q9opts',['I saw three mouses and two gooses.','I saw three mice and five fish.','I saw three mices and two childs.'],12,1,'q9fb','mice(맞음)+fish(맞음)!','대단해! 🎉 mice + fish 완벽!');
}

function checkQ6(){
  if(answered[9])return;
  const btns=document.querySelectorAll('#q6opts .opt-btn-sm');
  let ok=true;
  btns.forEach(b=>{const isOk=b.dataset.ok==='true';const sel=b.dataset.on==='1';if(isOk&&sel)b.classList.add('correct');else if(!isOk&&!sel){}else{ok=false;if(sel&&!isOk)b.classList.add('wrong');if(!sel&&isOk)b.style.border='3px solid var(--yellow)';}});
  if(ok){playCorrect();score+=25;answered[9]=true;showFB('q6fb',true,'완벽! dogs, babies, teeth가 올바른 복수형! 🎉');}
  else{playWrong();showFB('q6fb',false,'올바른 복수형: dogs, babies, teeth!');answered[9]=true;}
}

function mkBtns(id,opts,si,c,fb,wm,rm){const el=document.getElementById(id);opts.forEach((t,i)=>{const b=document.createElement('button');b.className='opt-btn opt-btn-sm';b.textContent=t;b.onclick=()=>checkBtn(si,b,i,c,fb,wm,rm);el.appendChild(b);});}
function mkCol(id,opts,si,c,fb,wm,rm){const el=document.getElementById(id);opts.forEach((t,i)=>{const b=document.createElement('button');b.className='col-btn';b.textContent=t;b.onclick=()=>checkCol(si,b,i,c,fb,wm,rm);el.appendChild(b);});}
function checkBtn(si,btn,p,c,fb,wm,rm){if(answered[si])return;playClick();if(p===c){playCorrect();btn.classList.add('correct');btn.parentElement.querySelectorAll('.opt-btn,.opt-btn-sm').forEach(b=>b.classList.add('disabled'));score+=parseInt(slides[si].dataset.score);answered[si]=true;showFB(fb,true,rm);}else{playWrong();btn.classList.add('wrong');setTimeout(()=>btn.classList.remove('wrong'),500);showFB(fb,false,wm);}}
function checkOX(si,btn,p,c,fb,wm,rm){if(answered[si])return;playClick();if(p===c){playCorrect();btn.classList.add('correct');score+=parseInt(slides[si].dataset.score);answered[si]=true;showFB(fb,true,rm);}else{playWrong();btn.classList.add('wrong');setTimeout(()=>btn.classList.remove('wrong'),500);showFB(fb,false,wm);}}
function checkCol(si,btn,p,c,fb,wm,rm){if(answered[si])return;playClick();if(p===c){playCorrect();btn.classList.add('correct');btn.parentElement.querySelectorAll('.col-btn').forEach(b=>b.classList.add('disabled'));score+=parseInt(slides[si].dataset.score);answered[si]=true;showFB(fb,true,rm);}else{playWrong();btn.classList.add('wrong');setTimeout(()=>btn.classList.remove('wrong'),500);showFB(fb,false,wm);}}
function showFB(id,ok,msg){const f=document.getElementById(id);f.textContent=msg;f.className='feedback show '+(ok?'correct-fb':'wrong-fb');}
function go(d){const prev=cur;cur=Math.max(0,Math.min(slides.length-1,cur+d));if(cur===prev)return;slides[prev].classList.remove('active');slides[prev].classList.add(d>0?'left':'right');slides[cur].classList.remove('left','right');slides[cur].classList.add('active');if(cur===slides.length-1)showResult();updateNav();}
function updateNav(){document.getElementById('prevBtn').disabled=cur===0;document.getElementById('nextBtn').disabled=cur===slides.length-1;document.getElementById('pageInfo').textContent=`${cur+1} / ${slides.length}`;}
function showResult(){const pct=Math.round(score/total*100);document.getElementById('finalScore').textContent=score;document.getElementById('scoreFill').style.width=pct+'%';let e='🌟',m='잘했어요!',k='복수형 잘 배웠어!';if(pct>=90){e='🏆';m='완벽해요!';k='복수형 마스터!';}else if(pct>=70){e='🌟';m='훌륭해요!';k='거의 다 맞았어!';}else if(pct>=50){e='💪';m='좋아요!';k='복습하면 완벽!';}else{e='🤗';m='괜찮아요!';k='다시 도전!';}document.getElementById('resultEmoji').textContent=e;document.getElementById('resultMsg').textContent=m;document.getElementById('resultDetail').textContent=`총점: ${score}/${total}점 (${pct}%)`;document.getElementById('resultKay').textContent=k;}
let sx=0;document.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;});document.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-sx;if(Math.abs(dx)>50){dx<0?go(1):go(-1);}});
buildSlides();
</script>
</body>
</html>
