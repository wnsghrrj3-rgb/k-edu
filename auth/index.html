<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인 | K-edu</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/kedu_config.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:#F5F7FA;min-height:100vh;display:flex;align-items:center;justify-content:center;color:#1A202C}

.auth-wrap{width:100%;max-width:400px;padding:24px}

/* 로고 */
.logo{text-align:center;margin-bottom:36px;cursor:pointer}
.logo-title{font-family:'Jua',sans-serif;font-size:52px;letter-spacing:-2px;background:linear-gradient(135deg,#5B8EF8 0%,#FF85A1 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo-sub{font-family:'Jua',sans-serif;font-size:13px;color:#A0AEC0;letter-spacing:2px;margin-top:2px}

/* 카드 */
.auth-card{background:#fff;border-radius:24px;padding:36px 28px;box-shadow:0 4px 24px rgba(0,0,0,.08)}
.auth-card h2{font-family:'Jua',sans-serif;font-size:22px;text-align:center;margin-bottom:24px}

/* 탭 */
.tab-bar{display:flex;gap:4px;background:#F5F7FA;border-radius:12px;padding:4px;margin-bottom:24px}
.tab-btn{flex:1;padding:10px 0;border:none;border-radius:10px;font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:500;cursor:pointer;background:transparent;color:#718096;transition:all .2s}
.tab-btn.active{background:#fff;color:#1A202C;box-shadow:0 1px 4px rgba(0,0,0,.08)}

/* 폼 */
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:500;color:#4A5568;margin-bottom:6px}
.form-group input,.form-group select{width:100%;height:46px;border:1.5px solid #E2E8F0;border-radius:12px;padding:0 14px;font-size:15px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .2s}
.form-group input:focus,.form-group select:focus{border-color:#5B8EF8}
.form-group input::placeholder{color:#CBD5E0}

/* 역할 선택 */
.role-picker{display:flex;gap:10px;margin-bottom:20px}
.role-btn{flex:1;padding:14px 0;border:2px solid #E2E8F0;border-radius:14px;background:#fff;cursor:pointer;text-align:center;transition:all .2s;font-family:'Noto Sans KR',sans-serif}

/* 학생 안내 박스 — 처리방침 v2.1 제2조 3 "교사 일괄 부여 방식" 정합 */
.student-notice{margin-bottom:18px;padding:14px 16px;background:#F0FFF4;border:1px solid #C6F6D5;border-radius:12px;font-size:13px;line-height:1.6;color:#22543D;text-align:center}
.student-notice b{color:#1C4532;font-weight:700}
.student-notice span{font-size:12.5px;color:#2F855A;display:block;margin-top:4px}
.student-notice-link{display:inline-block;margin-top:8px;padding:5px 14px;background:#38A169;color:#fff;border-radius:50px;text-decoration:none;font-size:12px;font-weight:600;transition:background .15s}
.student-notice-link:hover{background:#2F855A}
.role-btn:hover{border-color:#5B8EF8}
.role-btn.selected{border-color:#5B8EF8;background:#EBF4FF}
.role-emoji{font-size:28px;display:block;margin-bottom:4px}
.role-label{font-size:14px;font-weight:500;color:#2D3748}

/* 버튼 */
.submit-btn{width:100%;height:48px;background:#5B8EF8;color:#fff;border:none;border-radius:12px;font-family:'Jua',sans-serif;font-size:18px;cursor:pointer;transition:opacity .15s;margin-top:8px}
.submit-btn:hover{opacity:.88}
.submit-btn:disabled{opacity:.5;cursor:not-allowed}

/* 에러/메시지 */
.msg{font-size:13px;text-align:center;margin-top:12px;min-height:20px}
.msg.error{color:#E53E3E}
.msg.success{color:#38A169}

/* 하단 링크 */
.bottom-link{text-align:center;margin-top:20px;font-size:13px;color:#A0AEC0}
.bottom-link a{color:#5B8EF8;text-decoration:none;font-weight:500}
.bottom-link a:hover{text-decoration:underline}

/* 닉네임 스텝 (회원가입 후) */
.step-nickname{display:none}
.step-nickname h2{margin-bottom:8px}
.step-nickname p{font-size:14px;color:#718096;text-align:center;margin-bottom:20px;line-height:1.5}

/* 동의 체크박스 (T05) */
.consent-box{margin:18px 0 8px;padding:14px 14px;background:#F7FAFC;border:1px solid #E2E8F0;border-radius:12px}
.consent-row{display:flex;align-items:flex-start;gap:9px;font-size:13px;color:#2D3748;line-height:1.55;cursor:pointer;padding:5px 0}
.consent-row + .consent-row{border-top:1px solid #EDF2F7;margin-top:4px;padding-top:9px}
.consent-row input[type="checkbox"]{margin-top:3px;width:16px;height:16px;flex-shrink:0;accent-color:#5B8EF8;cursor:pointer}
.consent-row strong{color:#E53E3E;font-weight:700;margin-right:4px}
.consent-row a{color:#5B8EF8;text-decoration:underline}
.submit-btn:disabled{opacity:.4;cursor:not-allowed;background:#A0AEC0}

/* FOOTER */
footer{margin-top:32px;text-align:center;padding:14px 24px;font-size:12px;color:#A0AEC0;letter-spacing:.3px}
footer a{color:#5B8EF8;text-decoration:none;margin-left:10px}
footer a:hover{text-decoration:underline}
footer strong{color:#718096;font-weight:500}

/* 토스트 */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#1A202C;color:#fff;padding:12px 24px;border-radius:50px;font-size:14px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

@media(max-width:440px){
  .auth-wrap{padding:16px}
  .auth-card{padding:28px 20px}
  .logo-title{font-size:44px}
}
</style>
<script src="/kedu_ga.js"></script>
</head>
<body>

<div class="auth-wrap">
  <div class="logo" onclick="location.href='/'">
    <div class="logo-title">K-edu</div>
    <div class="logo-sub">케이에듀 · 초등 학습 플랫폼</div>
  </div>

  <!-- ===== 로그인/회원가입 카드 ===== -->
  <div class="auth-card" id="card-auth">
    <div class="tab-bar">
      <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">로그인</button>
      <button class="tab-btn" id="tab-signup" onclick="switchTab('signup')">회원가입</button>
    </div>

    <!-- 로그인 폼 -->
    <div id="form-login">
      <div class="form-group">
        <label>이메일</label>
        <input type="email" id="login-email" placeholder="example@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>비밀번호</label>
        <input type="password" id="login-pw" placeholder="비밀번호 입력" autocomplete="current-password">
      </div>
      <button class="submit-btn" id="btn-login" onclick="doLogin()">로그인</button>
      <div class="msg" id="login-msg"></div>
    </div>

    <!-- 회원가입 폼 -->
    <div id="form-signup" style="display:none">
      <!-- 학생은 처리방침 v2.1 제2조 3 "교사 일괄 부여 방식"에 따라 셀프 회원가입 차단.
           학급코드+닉네임은 교사가 학급 생성 시 부여 → 학생은 메인 페이지에서 진입 -->
      <div class="student-notice">
        🎒 <b>학생은 별도 회원가입이 필요하지 않습니다</b><br>
        <span>메인 페이지에서 교사가 부여한 <b>학급코드와 닉네임</b>으로 학습을 시작할 수 있어요.</span>
        <a href="/" class="student-notice-link">메인으로 가기 →</a>
      </div>

      <div class="role-picker">
        <div class="role-btn selected" id="role-teacher" onclick="pickRole('teacher')">
          <span class="role-emoji">🍎</span>
          <span class="role-label">교사</span>
        </div>
        <div class="role-btn" id="role-parent" onclick="pickRole('parent')">
          <span class="role-emoji">👨‍👧</span>
          <span class="role-label">학부모</span>
        </div>
      </div>
      <div class="form-group">
        <label>이메일</label>
        <input type="email" id="signup-email" placeholder="example@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>비밀번호 (6자 이상)</label>
        <input type="password" id="signup-pw" placeholder="비밀번호 입력" autocomplete="new-password">
      </div>
      <!-- [처리방침 v2.1 제2조 3 정합] 학생 닉네임 input은 회원가입 시 사용 안 함 — 영구 숨김.
           학생 닉네임은 교사가 학급 생성 시 일괄 부여. 교사·학부모만 회원가입 가능. -->
      <div class="form-group" id="group-nickname" style="display:none">
        <label>닉네임</label>
        <input type="text" id="signup-nickname" placeholder="친구들에게 보이는 이름" maxlength="10">
      </div>
      <div class="form-group" id="group-teacher-name" style="display:none">
        <label>이름 (교사)</label>
        <input type="text" id="signup-teacher-name" placeholder="실명 입력" maxlength="20">
      </div>
      <div class="form-group" id="group-teacher-school" style="display:none">
        <label>학교명</label>
        <input type="text" id="signup-teacher-school" placeholder="소속 학교" maxlength="30">
      </div>

      <!-- 동의 체크박스 (T05 — 처리방침 v2 시행 가능 조건) -->
      <div class="consent-box">
        <label class="consent-row">
          <input type="checkbox" id="consent-privacy" onchange="updateSignupBtn()">
          <span><strong>[필수]</strong> <a href="/privacy/" target="_blank">개인정보 처리방침</a>의 수집·이용에 동의합니다.</span>
        </label>
        <label class="consent-row">
          <input type="checkbox" id="consent-overseas" onchange="updateSignupBtn()">
          <span><strong>[필수]</strong> 개인정보 처리업무 위탁 및 국외 이전(미국 Supabase, 글로벌 Vercel)에 동의합니다.</span>
        </label>
      </div>

      <button class="submit-btn" id="btn-signup" onclick="doSignup()" disabled>회원가입</button>
      <div class="msg" id="signup-msg"></div>
    </div>
  </div>

  <!-- ===== 닉네임 설정 (소셜 로그인 등 닉네임 없을 때) ===== -->
  <div class="auth-card step-nickname" id="card-nickname">
    <h2>👋 닉네임을 정해주세요!</h2>
    <p>수업에서 사용할 이름이에요.<br>친구들에게 보여요.</p>
    <div class="form-group">
      <input type="text" id="late-nickname" placeholder="닉네임 입력" maxlength="10">
    </div>
    <button class="submit-btn" onclick="saveNickname()">시작하기 🐾</button>
    <div class="msg" id="nickname-msg"></div>
  </div>

  <div class="bottom-link" id="link-home">
    <a href="/">← K-edu 홈으로</a>
  </div>

  <footer>
    <p>
      Copyright © 2025 <strong>K-edu</strong> · All rights reserved.
      <a href="/privacy/">개인정보 처리방침</a>
    </p>
  </footer>
</div>

<div class="toast" id="toast"></div>

<script>
// =============================================
// Supabase 초기화
// =============================================
const db = getKeduDb();

// redirect 파라미터 추출
const params = new URLSearchParams(location.search);
const redirectTo = params.get('redirect') || '/';

// 회원가입 역할 — 'teacher' 또는 'parent' (학생은 처리방침 v2.1 제2조 3 정합으로 차단)
let selectedRole = 'teacher';

// =============================================
// 이미 로그인 상태면 바로 이동
// =============================================
(async function checkSession(){
  const { data:{ session } } = await db.auth.getSession();
  if(session){
    // 프로필 존재 여부 확인
    const hasProfile = await ensureProfile(session.user);
    if(hasProfile) {
      location.href = redirectTo;
    }
    // 프로필 없으면 닉네임 카드 보여줌 (ensureProfile에서 처리)
  }
})();

// =============================================
// 탭 전환
// =============================================
function switchTab(tab){
  document.getElementById('tab-login').classList.toggle('active', tab==='login');
  document.getElementById('tab-signup').classList.toggle('active', tab==='signup');
  document.getElementById('form-login').style.display = tab==='login' ? 'block' : 'none';
  document.getElementById('form-signup').style.display = tab==='signup' ? 'block' : 'none';
  if(tab==='signup') updateSignupBtn();
  clearMsgs();
}

// =============================================
// 역할 선택
// =============================================
function pickRole(role){
  // 처리방침 v2.1 제2조 3 정합: 학생 셀프 가입 차단 — 'teacher' 또는 'parent'만 허용
  if(role !== 'teacher' && role !== 'parent') return;
  selectedRole = role;
  document.getElementById('role-teacher').classList.toggle('selected', role==='teacher');
  document.getElementById('role-parent').classList.toggle('selected', role==='parent');

  const isTeacher = role==='teacher';
  // 학생 닉네임 group은 항상 숨김 (회원가입 시 사용 안 함)
  document.getElementById('group-nickname').style.display = 'none';
  document.getElementById('group-teacher-name').style.display = isTeacher ? 'block' : 'none';
  document.getElementById('group-teacher-school').style.display = isTeacher ? 'block' : 'none';
}

// =============================================
// 로그인
// =============================================
async function doLogin(){
  const email = document.getElementById('login-email').value.trim();
  const pw = document.getElementById('login-pw').value;
  if(!email || !pw){ showMsg('login-msg','이메일과 비밀번호를 입력해주세요.','error'); return; }

  const btn = document.getElementById('btn-login');
  btn.disabled = true; btn.textContent = '로그인 중...';

  const { data, error } = await db.auth.signInWithPassword({ email, password: pw });
  btn.disabled = false; btn.textContent = '로그인';

  if(error){
    showMsg('login-msg', '이메일 또는 비밀번호가 올바르지 않습니다.', 'error');
    return;
  }

  // 프로필 확인 후 이동
  const hasProfile = await ensureProfile(data.user);
  if(hasProfile){
    location.href = redirectTo;
  }
}

// =============================================
// 동의 체크박스 토글 (T05)
// =============================================
function updateSignupBtn(){
  const p = document.getElementById('consent-privacy').checked;
  const o = document.getElementById('consent-overseas').checked;
  document.getElementById('btn-signup').disabled = !(p && o);
}

// =============================================
// 회원가입
// =============================================
async function doSignup(){
  const email = document.getElementById('signup-email').value.trim();
  const pw = document.getElementById('signup-pw').value;

  if(!email || !pw){ showMsg('signup-msg','이메일과 비밀번호를 입력해주세요.','error'); return; }
  if(pw.length < 6){ showMsg('signup-msg','비밀번호는 6자 이상이어야 합니다.','error'); return; }

  // 동의 검증 (T05 — 처리방침 v2 시행 가능 조건)
  const consentPrivacy = document.getElementById('consent-privacy').checked;
  const consentOverseas = document.getElementById('consent-overseas').checked;
  if(!consentPrivacy || !consentOverseas){
    showMsg('signup-msg','개인정보 처리방침 및 국외 이전에 모두 동의해주세요.','error');
    return;
  }

  // 처리방침 v2.1 제2조 3 정합 안전망: 학생 셀프 회원가입 차단
  // (UI에서는 학생 역할 버튼 제거되었으나 직접 selectedRole 우회 시도 차단)
  if(selectedRole === 'student'){
    showMsg('signup-msg','학생은 별도 회원가입이 필요하지 않습니다. 메인 페이지에서 학급코드로 진입해주세요.','error');
    return;
  }

  if(selectedRole === 'teacher'){
    const tName = document.getElementById('signup-teacher-name').value.trim();
    if(!tName){ showMsg('signup-msg','이름을 입력해주세요.','error'); return; }
  }
  // 학부모: 추가 입력 없음 (이메일+비번+동의만)

  const btn = document.getElementById('btn-signup');
  btn.disabled = true; btn.textContent = '가입 중...';

  // 학부모는 user_metadata.role='parent' 저장 (ensureProfile 식별용)
  const signUpOpts = selectedRole === 'parent'
    ? { email, password: pw, options: { data: { role: 'parent' } } }
    : { email, password: pw };
  const { data, error } = await db.auth.signUp(signUpOpts);
  btn.disabled = false; btn.textContent = '회원가입';

  if(error){
    if(error.message.includes('already registered')){
      showMsg('signup-msg', '이미 가입된 이메일입니다. 로그인해주세요.', 'error');
    } else {
      showMsg('signup-msg', '회원가입 실패: ' + error.message, 'error');
    }
    return;
  }

  // Supabase 이메일 확인이 꺼져 있으면 바로 세션 생성됨
  if(data.session){
    if(selectedRole === 'teacher'){
      const tName = document.getElementById('signup-teacher-name').value.trim();
      const tSchool = document.getElementById('signup-teacher-school').value.trim();
      await createTeacherProfile(data.user.id, tName, tSchool);
      showToast('🎉 가입 완료! 환영합니다.');
      setTimeout(()=>{ location.href = redirectTo; }, 800);
    } else {
      // 학부모: 별도 프로필 테이블 없음. parent/index.html에서 자녀 매핑 신청
      showToast('🎉 가입 완료! 자녀 정보를 등록해주세요.');
      setTimeout(()=>{ location.href = '/parent/'; }, 800);
    }
  } else {
    // 이메일 확인 필요한 경우
    showMsg('signup-msg', '✉️ 이메일로 인증 링크를 보냈습니다. 확인 후 로그인해주세요.', 'success');
  }
}

// =============================================
// 프로필 존재 확인 (로그인 후)
// =============================================
async function ensureProfile(user){
  // 1) 교사인지 확인
  const { data: teacher } = await db
    .from('teachers')
    .select('id')
    .eq('user_id', user.id)
    .maybeSingle();

  if(teacher) return true; // 교사면 프로필 OK

  // 2) 학부모 식별 — user_metadata.role === 'parent' 또는 parent_student_links 매핑 보유
  // 학부모는 별도 프로필 테이블 없음. signUp 시 user_metadata.role='parent' 저장됨.
  const isParentByMeta = user.user_metadata && user.user_metadata.role === 'parent';
  if(isParentByMeta){
    location.href = '/parent/';
    return true;
  }

  // 3) 학생 프로필 확인
  const { data: profile } = await db
    .from('student_profiles')
    .select('id, nickname')
    .eq('user_id', user.id)
    .maybeSingle();

  if(profile) return true;

  // 4) 학부모 매핑 보유 시 학부모로 간주 (user_metadata 누락 케이스 대비)
  const { data: pslRows } = await db
    .from('parent_student_links')
    .select('id')
    .eq('parent_id', user.id)
    .limit(1);
  if(pslRows && pslRows.length > 0){
    location.href = '/parent/';
    return true;
  }

  // 5) 프로필 없으면 닉네임 카드 표시
  document.getElementById('card-auth').style.display = 'none';
  document.getElementById('card-nickname').style.display = 'block';
  return false;
}

// =============================================
// 학생 프로필 생성
// =============================================
async function createStudentProfile(userId, nickname){
  await db.from('student_profiles').insert({
    user_id: userId,
    nickname: nickname
  });
}

// =============================================
// 교사 프로필 생성
// =============================================
async function createTeacherProfile(userId, name, school){
  await db.from('teachers').insert({
    user_id: userId,
    name: name,
    school: school || ''
  });
}

// =============================================
// 닉네임 후속 저장 (프로필 없을 때)
// =============================================
async function saveNickname(){
  const nick = document.getElementById('late-nickname').value.trim();
  if(!nick){ showMsg('nickname-msg','닉네임을 입력해주세요.','error'); return; }

  const { data:{ session } } = await db.auth.getSession();
  if(!session){ showMsg('nickname-msg','세션이 만료되었습니다. 다시 로그인해주세요.','error'); return; }

  const { error } = await db.from('student_profiles').insert({
    user_id: session.user.id,
    nickname: nick
  });

  if(error){
    showMsg('nickname-msg','저장 실패: ' + error.message, 'error');
    return;
  }

  showToast('🐾 ' + nick + '님, 환영해요!');
  setTimeout(()=>{ location.href = redirectTo; }, 800);
}

// =============================================
// 유틸
// =============================================
function showMsg(id, text, type){
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg ' + type;
}
function clearMsgs(){
  document.querySelectorAll('.msg').forEach(m=>{ m.textContent=''; m.className='msg'; });
}
let toastTimer;
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2800);
}

// Enter 키 지원
document.addEventListener('keydown', e=>{
  if(e.key !== 'Enter') return;
  if(document.getElementById('form-login').style.display !== 'none'){
    doLogin();
  } else if(document.getElementById('form-signup').style.display !== 'none'){
    doSignup();
  } else if(document.getElementById('card-nickname').style.display !== 'none'){
    saveNickname();
  }
});
</script>
