<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>학년 종합 리포트 | K-edu 학부모</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../kedu_config.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#5B8EF8;--primary-light:#EBF4FF;--primary-dark:#3B6FD8;
  --pink:#FF85A1;--green:#38A169;--orange:#FFB347;--red:#E53E3E;--purple:#9F7AEA;
  --bg:#F5F7FA;--card:#fff;--text:#1A202C;--sub:#718096;--border:#E2E8F0;
  --radius:16px;--shadow:0 2px 16px rgba(0,0,0,.06);
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);min-height:100vh;color:var(--text);-webkit-tap-highlight-color:transparent}

/* TOPBAR (인쇄 시 숨김) */
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-back{font-size:13px;color:var(--sub);text-decoration:none;display:inline-flex;align-items:center;gap:4px;padding:6px 10px;border-radius:8px;transition:all .15s}
.topbar-back:hover{background:var(--primary-light);color:var(--primary)}
.topbar-title{font-family:'Jua',sans-serif;font-size:16px}
.topbar-right{display:flex;gap:8px}
.topbar-btn{padding:8px 16px;border-radius:10px;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--sub);transition:all .15s}
.topbar-btn:hover{border-color:var(--primary);color:var(--primary)}
.topbar-btn.primary{background:var(--purple);color:#fff;border-color:var(--purple)}
.topbar-btn.primary:hover{background:#7B5FCC;border-color:#7B5FCC;color:#fff}

/* HINT (인쇄 시 숨김) */
.print-hint{max-width:800px;margin:18px auto 0;padding:14px 20px;background:#FFFBEA;border:1px solid #F6E05E;border-radius:12px;font-size:13px;line-height:1.6;color:#7A5A1A;display:flex;align-items:flex-start;gap:10px}
.print-hint .hint-icon{font-size:20px;flex-shrink:0;margin-top:1px}
.print-hint b{color:#5C4308}
.print-hint .hint-key{display:inline-block;background:#fff;border:1px solid #E0C97D;border-radius:6px;padding:1px 6px;font-family:monospace;font-size:12px;margin:0 2px}

/* PAPER (인쇄 시 페이지 형태) */
.paper{max-width:800px;margin:18px auto 60px;background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:42px 48px}

/* HEADER */
.report-header{border-bottom:3px double var(--primary);padding-bottom:18px;margin-bottom:24px}
.report-brand{display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:8px}
.report-logo{font-family:'Jua',sans-serif;font-size:32px;letter-spacing:-1px;background:linear-gradient(135deg,var(--primary),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.report-issued{font-size:12px;color:var(--sub);font-weight:500}
.report-issued b{color:var(--text)}
.report-title{font-family:'Jua',sans-serif;font-size:24px;color:var(--text)}
.report-subtitle{font-size:13px;color:var(--sub);margin-top:4px;line-height:1.5}

/* STUDENT META */
.student-meta{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:28px}
.meta-cell{background:var(--bg);border-radius:10px;padding:12px 14px}
.meta-label{font-size:11px;color:var(--sub);font-weight:600;letter-spacing:.4px;text-transform:uppercase;margin-bottom:4px}
.meta-value{font-size:15px;font-weight:600;color:var(--text)}
.meta-value .accent{color:var(--purple)}

/* SECTION */
.section{margin-bottom:28px}
.section-title{font-family:'Jua',sans-serif;font-size:18px;display:flex;align-items:center;gap:8px;margin-bottom:12px;color:var(--text);padding-bottom:6px;border-bottom:1.5px solid var(--border)}
.section-title .badge{font-size:13px;color:var(--sub);font-weight:400}

/* STAT GRID */
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.stat-row{display:flex;justify-content:space-between;align-items:center;background:var(--bg);border-radius:10px;padding:12px 14px}
.stat-row .label{font-size:13px;color:var(--sub);font-weight:500}
.stat-row .value{font-size:14px;font-weight:600;color:var(--text)}
.stat-row .value .acc-good{color:var(--green)}
.stat-row .value .acc-mid{color:#B7791F}
.stat-row .value .acc-low{color:var(--red)}

/* WEAK LIST */
.weak-list{display:grid;gap:8px}
.weak-row{background:#FFFBEA;border:1px solid #F6E05E;border-radius:10px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;gap:12px}
.weak-row.supplement{background:#FFF5F5;border-color:#FBB}
.weak-lesson{font-size:13px;font-weight:600;color:var(--text)}
.weak-lesson .meta{font-size:11px;color:var(--sub);font-weight:500;margin-top:2px}
.weak-acc{display:flex;align-items:center;gap:8px;flex-shrink:0}
.weak-acc .pct{font-size:14px;font-weight:700}
.weak-acc .pct.acc-low{color:var(--red)}
.weak-acc .pct.acc-mid{color:#B7791F}
.weak-acc .pill{font-size:10px;font-weight:700;padding:3px 8px;border-radius:50px;letter-spacing:.3px}
.weak-acc .pill.supplement{background:#FFF5F5;color:#9B2C2C;border:1px solid #FBB}
.weak-acc .pill.try_again{background:#FFFBEA;color:#7A5A1A;border:1px solid #F6E05E}
.weak-empty{background:#F0FFF4;border:1px solid #C6F6D5;border-radius:10px;padding:14px 16px;font-size:13px;color:#22543D;line-height:1.55;text-align:center}

/* LESSON TABLE */
.lesson-table{width:100%;border-collapse:collapse;font-size:12px}
.lesson-table th{background:var(--bg);padding:10px 12px;text-align:left;font-weight:700;color:var(--sub);border-bottom:1.5px solid var(--border);font-size:11px;letter-spacing:.3px;text-transform:uppercase}
.lesson-table td{padding:9px 12px;border-bottom:1px solid var(--border);color:var(--text)}
.lesson-table .l-id{font-weight:600;font-family:monospace;font-size:11px}
.lesson-table .l-acc{font-weight:600}
.lesson-table .l-acc.acc-good{color:var(--green)}
.lesson-table .l-acc.acc-mid{color:#B7791F}
.lesson-table .l-acc.acc-low{color:var(--red)}
.lesson-table .l-status{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:50px;letter-spacing:.3px}
.lesson-table .l-status.perfect{background:#F0FFF4;color:#22543D}
.lesson-table .l-status.good{background:#EBF4FF;color:#2C5282}
.lesson-table .l-status.try_again{background:#FFFBEA;color:#7A5A1A}
.lesson-table .l-status.supplement{background:#FFF5F5;color:#9B2C2C}
.lesson-table tr:last-child td{border-bottom:none}
.lesson-empty{text-align:center;padding:24px 16px;background:var(--bg);border-radius:10px;font-size:13px;color:var(--sub);line-height:1.55}

/* NOTES (자존감 보호 + 와이프 안내) */
.notes{margin-top:30px;padding-top:18px;border-top:1.5px dashed var(--border)}
.note-block{background:#F3E8FF;border:1px solid #E9D5FF;border-radius:10px;padding:11px 14px;font-size:11px;line-height:1.6;color:#553C9A;margin-bottom:8px}
.note-block.warn{background:#FFFBEA;border-color:#F6E05E;color:#7A5A1A}
.note-block b{color:#3B176F;font-weight:700}
.note-block.warn b{color:#5C4308}

/* FOOTER */
.report-footer{margin-top:24px;padding-top:14px;border-top:1.5px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--sub);flex-wrap:wrap;gap:6px}
.report-footer .brand{font-family:'Jua',sans-serif;color:var(--purple);font-size:13px}

/* LOADING / ERROR */
.center-state{max-width:500px;margin:80px auto;background:#fff;border-radius:18px;box-shadow:var(--shadow);padding:40px 30px;text-align:center}
.center-state .icon{font-size:48px;margin-bottom:14px}
.center-state .ttl{font-family:'Jua',sans-serif;font-size:22px;margin-bottom:8px}
.center-state .desc{font-size:14px;color:var(--sub);line-height:1.6;margin-bottom:18px}
.center-state .desc b{color:var(--text)}
.center-state .cta{display:inline-block;padding:11px 24px;background:var(--purple);color:#fff;border-radius:12px;text-decoration:none;font-family:'Jua',sans-serif;font-size:15px}
.center-state .cta:hover{background:#7B5FCC}
.center-state .cta.ghost{background:#fff;color:var(--sub);border:1px solid var(--border);margin-left:8px}
.center-state .cta.ghost:hover{border-color:var(--primary);color:var(--primary)}

/* SPINNER */
.spin{display:inline-block;width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--purple);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===========================
   PRINT (PDF 저장 시) 스타일
   =========================== */
@media print {
  @page{size:A4;margin:14mm}
  html,body{background:#fff !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .topbar,.print-hint{display:none !important}
  .paper{max-width:100%;margin:0;padding:0;border-radius:0;box-shadow:none}
  .center-state{display:none !important}
  /* 페이지 break: 차시 표 / 약점 차시 / 안내 자연스럽게 */
  .section{page-break-inside:auto}
  .lesson-table{page-break-inside:auto}
  .lesson-table tr{page-break-inside:avoid;page-break-after:auto}
  .lesson-table thead{display:table-header-group}
  .notes{page-break-inside:avoid}
  /* 약점/통계는 가능한 한 함께 */
  .stat-grid,.weak-list,.weak-empty{page-break-inside:avoid}
}
</style>
</head>
<body>

<!-- TOPBAR (화면 전용) -->
<div class="topbar">
  <div class="topbar-left">
    <a href="/parent/" class="topbar-back">← 학부모 화면으로</a>
    <span class="topbar-title">📄 학년 종합 리포트</span>
  </div>
  <div class="topbar-right">
    <button class="topbar-btn primary" onclick="doPrint()">🖨️ PDF 저장 / 인쇄</button>
  </div>
</div>

<!-- 안내 (화면 전용) -->
<div class="print-hint" id="print-hint" style="display:none">
  <span class="hint-icon">💡</span>
  <div>
    <b>PDF로 저장하려면</b> [🖨️ PDF 저장 / 인쇄] 버튼을 누르거나 키보드 <span class="hint-key">Ctrl</span>+<span class="hint-key">P</span> (Mac은 <span class="hint-key">⌘</span>+<span class="hint-key">P</span>)을 누르세요.
    인쇄 다이얼로그에서 <b>대상 = "PDF로 저장"</b>을 선택하면 컴퓨터에 PDF 파일로 저장됩니다.
  </div>
</div>

<!-- 본문 — 로딩/에러/리포트 중 하나 표시 -->
<div id="root">
  <div class="center-state">
    <div class="icon"><span class="spin"></span></div>
    <div class="ttl">자녀 학습 데이터를 불러오는 중…</div>
    <div class="desc">잠시만 기다려 주세요.</div>
  </div>
</div>

<script>
const db = getKeduDb();

function getQueryParam(name){
  const url = new URL(location.href);
  return url.searchParams.get(name);
}

function escapeHtml(s){
  if(s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function fmtDate(s){
  if(!s) return '—';
  const d = new Date(s);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
}

function fmtDuration(sec){
  const n = Number(sec || 0);
  if(n <= 0) return '—';
  if(n < 60) return `${n}초`;
  const m = Math.floor(n / 60);
  const h = Math.floor(m / 60);
  if(h > 0) return `${h}시간 ${m % 60}분`;
  return `${m}분`;
}

function fmtAccuracy(correct, total){
  const c = Number(correct || 0), t = Number(total || 0);
  if(t === 0) return { text: '—', cls: '' };
  const pct = Math.round(100 * c / t);
  return { text: `${pct}%`, cls: accClass(pct) };
}

function accClass(pct){
  if(pct >= 80) return 'acc-good';
  if(pct >= 60) return 'acc-mid';
  return 'acc-low';
}

function statusLabel(status){
  switch(status){
    case 'perfect':    return '완벽';
    case 'good':       return '양호';
    case 'try_again':  return '재도전';
    case 'supplement': return '보충 필요';
    default:           return status || '—';
  }
}

function doPrint(){
  window.print();
}

function showError(icon, ttl, desc, ctaText, ctaHref){
  document.getElementById('root').innerHTML = `
    <div class="center-state">
      <div class="icon">${icon}</div>
      <div class="ttl">${escapeHtml(ttl)}</div>
      <div class="desc">${desc}</div>
      <a href="${escapeHtml(ctaHref || '/parent/')}" class="cta">${escapeHtml(ctaText || '학부모 화면으로')}</a>
    </div>
  `;
}

// =============================================
// 진입 — 인증 + 자녀 매핑 검증 + 데이터 로드
// =============================================
async function init(){
  const studentId = getQueryParam('student_id');
  if(!studentId){
    showError('⚠️', '학생 정보가 누락되었습니다', '리포트를 출력할 자녀를 학부모 화면에서 선택해 주세요.', '학부모 화면으로', '/parent/');
    return;
  }

  // 세션 확인
  const { data: { session } } = await db.auth.getSession();
  if(!session){
    location.href = `/auth/?redirect=${encodeURIComponent('/parent/report.html?student_id=' + studentId)}`;
    return;
  }
  const _user = session.user;

  // 교사·학생 차단
  const { data: t } = await db.from('teachers').select('id').eq('user_id', _user.id).maybeSingle();
  if(t){ location.href = '/teacher/'; return; }
  const { data: s } = await db.from('student_profiles').select('id').eq('user_id', _user.id).maybeSingle();
  if(s){ location.href = '/'; return; }

  // 데이터 로드 — RLS sp_parent_read + scores_parent_read 등이 verified_at 검증 자동 수행
  // 권한 없는 student_id 입력 시 빈 결과 반환
  const [{ data: summaryRows, error: e1 }, { data: lessons, error: e2 }] = await Promise.all([
    db.from('student_data_summary').select('*').eq('student_id', studentId).limit(1),
    db.from('student_lesson_progress').select('*').eq('student_id', studentId).order('lesson_id', { ascending: true })
  ]);

  if(e1 || e2){
    const msg = (e1 && e1.message) || (e2 && e2.message) || '알 수 없는 오류';
    showError('⚠️', '학습 데이터를 불러올 수 없습니다', escapeHtml(msg), '학부모 화면으로', '/parent/');
    return;
  }

  const summary = (summaryRows && summaryRows[0]) || null;
  if(!summary){
    showError('🔒',
      '조회 권한이 없거나 데이터가 없습니다',
      '본인 자녀이며 매핑이 검증된 경우에만 학년 종합 리포트를 조회할 수 있습니다.<br><b>검증 대기 중</b>이면 담임 교사에게 문의하세요.',
      '학부모 화면으로', '/parent/');
    return;
  }

  renderReport(summary, lessons || []);
}

function renderReport(s, lessons){
  const acc = fmtAccuracy(s.correct_questions, s.total_questions);
  // 약점 차시 = supplement(60% 미만) + try_again(60~79%) — accuracy 오름차순 상위 10
  const weakLessons = (lessons || [])
    .filter(l => l.status === 'supplement' || l.status === 'try_again')
    .slice()
    .sort((a, b) => Number(a.accuracy || 0) - Number(b.accuracy || 0))
    .slice(0, 10);

  const today = new Date();
  const todayStr = `${today.getFullYear()}.${String(today.getMonth()+1).padStart(2,'0')}.${String(today.getDate()).padStart(2,'0')}`;

  // 약점 차시 HTML
  let weakHtml;
  if(weakLessons.length === 0){
    weakHtml = `<div class="weak-empty">✨ 약점 차시가 없습니다. 자녀가 잘 따라가고 있습니다.</div>`;
  } else {
    weakHtml = `<div class="weak-list">${weakLessons.map(l => {
      const cls = l.status === 'supplement' ? 'supplement' : 'try_again';
      const accCls = accClass(Number(l.accuracy || 0));
      return `
        <div class="weak-row ${cls}">
          <div>
            <div class="weak-lesson">${escapeHtml(l.lesson_id || '-')}</div>
            <div class="meta">${l.attempts || 0}회 시도 · ${fmtDuration(l.total_time_sec)}</div>
          </div>
          <div class="weak-acc">
            <span class="pct ${accCls}">${l.accuracy || 0}%</span>
            <span class="pill ${cls}">${statusLabel(l.status)}</span>
          </div>
        </div>`;
    }).join('')}</div>`;
  }

  // 차시 표 HTML — lesson_id ASC 그대로
  let lessonHtml;
  if(!lessons || !lessons.length){
    lessonHtml = `<div class="lesson-empty">아직 학습한 차시가 없습니다.</div>`;
  } else {
    lessonHtml = `
      <table class="lesson-table">
        <thead>
          <tr>
            <th style="width:32%">차시</th>
            <th style="width:14%;text-align:center">시도</th>
            <th style="width:18%;text-align:right">정답률</th>
            <th style="width:18%;text-align:right">학습 시간</th>
            <th style="width:18%;text-align:center">상태</th>
          </tr>
        </thead>
        <tbody>
          ${lessons.map(l => {
            const accCls = accClass(Number(l.accuracy || 0));
            return `
              <tr>
                <td class="l-id">${escapeHtml(l.lesson_id || '-')}</td>
                <td style="text-align:center">${l.attempts || 0}회</td>
                <td style="text-align:right" class="l-acc ${accCls}">${l.accuracy || 0}%</td>
                <td style="text-align:right">${fmtDuration(l.total_time_sec)}</td>
                <td style="text-align:center"><span class="l-status ${l.status || ''}">${statusLabel(l.status)}</span></td>
              </tr>`;
          }).join('')}
        </tbody>
      </table>
    `;
  }

  document.getElementById('root').innerHTML = `
    <div class="paper">
      <!-- HEADER -->
      <div class="report-header">
        <div class="report-brand">
          <div class="report-logo">K-edu</div>
          <div class="report-issued">출력일 <b>${todayStr}</b></div>
        </div>
        <div class="report-title">📄 학년 종합 리포트</div>
        <div class="report-subtitle">학부모(법정대리인)에게 제공되는 자녀의 한 학년 학습 결과 요약입니다.</div>
      </div>

      <!-- STUDENT META -->
      <div class="student-meta">
        <div class="meta-cell">
          <div class="meta-label">자녀 닉네임</div>
          <div class="meta-value"><span class="accent">🎒 ${escapeHtml(s.nickname || '—')}</span></div>
        </div>
        <div class="meta-cell">
          <div class="meta-label">학급코드</div>
          <div class="meta-value">${escapeHtml(s.class_code || '—')}</div>
        </div>
        <div class="meta-cell">
          <div class="meta-label">학년</div>
          <div class="meta-value">${s.grade ? s.grade + '학년' : '—'}</div>
        </div>
        <div class="meta-cell">
          <div class="meta-label">마지막 접속</div>
          <div class="meta-value">${fmtDate(s.last_seen_at)}</div>
        </div>
      </div>

      <!-- SECTION 1: 학습 진척도 -->
      <div class="section">
        <div class="section-title">📈 학습 진척도</div>
        <div class="stat-grid">
          <div class="stat-row">
            <span class="label">📚 풀이한 문제</span>
            <span class="value">${s.total_questions || 0}문제</span>
          </div>
          <div class="stat-row">
            <span class="label">🎯 정답률</span>
            <span class="value">${s.correct_questions || 0} / ${s.total_questions || 0} <span class="${acc.cls}">(${acc.text})</span></span>
          </div>
          <div class="stat-row">
            <span class="label">📖 학습한 차시</span>
            <span class="value">${s.lessons_attempted || 0}차시</span>
          </div>
          <div class="stat-row">
            <span class="label">⏱️ 누적 학습 시간</span>
            <span class="value">${fmtDuration(s.total_time_sec)}</span>
          </div>
          <div class="stat-row">
            <span class="label">📝 미해결 오답 (개수만)</span>
            <span class="value">${s.unresolved_wrong_count || 0}문제</span>
          </div>
          <div class="stat-row">
            <span class="label">✅ 완료한 숙제</span>
            <span class="value">${s.homework_completed_count || 0}건</span>
          </div>
        </div>
      </div>

      <!-- SECTION 2: 약점 차시 -->
      <div class="section">
        <div class="section-title">🎯 약점 차시 <span class="badge">${weakLessons.length ? `상위 ${weakLessons.length}개` : '없음'}</span></div>
        ${weakHtml}
      </div>

      <!-- SECTION 3: 차시별 진척도 -->
      <div class="section">
        <div class="section-title">📋 차시별 진척도 <span class="badge">${(lessons && lessons.length) || 0}차시</span></div>
        ${lessonHtml}
      </div>

      <!-- NOTES -->
      <div class="notes">
        <div class="note-block">
          <b>📌 자존감 보호 원칙</b> — 본 리포트는 학부모(법정대리인)만 볼 수 있습니다. 오답노트의 개별 문제 본문은 비공개되며, 개수만 표시됩니다 (처리방침 제3조 4).
        </div>
        <div class="note-block warn">
          <b>📌 학년 데이터 격리 안내</b> — 본 리포트의 학습 데이터는 매년 2월 28일 자정(KST 평년 3월 1일·윤년 2월 29일)에 자동으로 영구 삭제됩니다 (처리방침 제4조). 다음 학년 시작 전에 본 리포트를 PDF로 저장하거나 인쇄해 보존해 주세요.
        </div>
        <div class="note-block">
          <b>📌 직접 열람 vs 권리 행사</b> — 본 리포트는 본인 자녀에 대한 직접 열람입니다. 「개인정보 보호법」 제35조 정식 열람권 행사를 원하시면 학부모 화면의 자녀 카드 [📋 열람] 버튼을 사용하세요(10일 이내 처리·통보).
        </div>
      </div>

      <!-- FOOTER -->
      <div class="report-footer">
        <span class="brand">K-edu 학년 종합 리포트</span>
        <span>처리방침 v2.1 · 출력 ${todayStr} · 자녀: ${escapeHtml(s.nickname || '—')}</span>
      </div>
    </div>
  `;

  // 안내 표시 (인쇄 시에는 숨김)
  document.getElementById('print-hint').style.display = '';
}

// 시작
init();
</script>

</body>
</html>
